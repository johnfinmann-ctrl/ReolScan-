<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ReolScan Pro · Drift &amp; Sikkerhed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --navy:#0E2A45;
  --navy-2:#16385A;
  --navy-soft:#EAF0F6;
  --grey:#F4F6F8;
  --grey-line:#D7DEE5;
  --grey-mid:#7C8A99;
  --ink:#16222E;
  --white:#FFFFFF;
  --green:#2E9E5B;
  --green-bg:#E5F6EC;
  --yellow:#F2B705;
  --yellow-bg:#FFF6DD;
  --red:#D6334A;
  --red-bg:#FBE6EA;
  --radius:16px;
  --radius-sm:10px;
  --shadow:0 2px 10px rgba(14,42,69,.08);
  --shadow-lg:0 12px 30px rgba(14,42,69,.18);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--grey);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
h1,h2,h3,.display{font-family:'Oswald',sans-serif;letter-spacing:.02em;text-transform:uppercase;}
.mono{font-family:'JetBrains Mono',monospace;}

/* ===== App shell ===== */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

header.topbar{
  background:var(--navy);
  color:#fff;
  display:flex;align-items:center;gap:14px;
  padding:14px 20px;
  flex-shrink:0;
  box-shadow:var(--shadow);
  z-index:20;
}
header.topbar .brand{
  display:flex;align-items:center;gap:10px;
  font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;letter-spacing:.06em;
  text-transform:uppercase;
}
header.topbar .brand .mark{
  width:34px;height:34px;border-radius:8px;
  background:linear-gradient(135deg,var(--yellow) 0 50%, var(--green) 50% 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--navy);font-size:13px;
  flex-shrink:0;
}
header.topbar .brand small{
  display:block;font-family:'Inter',sans-serif;text-transform:none;letter-spacing:0;
  font-size:11px;font-weight:500;color:#9FB3C8;
}
header.topbar .spacer{flex:1;}
header.topbar .crumb{
  font-size:13px;color:#AFC2D6;font-weight:500;
  display:none;
}
.topbtn{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.18);
  color:#fff;border-radius:10px;
  padding:10px 16px;font-size:14px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:.15s;
}
.topbtn:hover{background:rgba(255,255,255,.18);}
.topbtn.primary{background:var(--green);border-color:var(--green);}
.topbtn.primary:hover{background:#268a4f;}

main{flex:1;overflow-y:auto;padding:24px;}
.wrap{max-width:1100px;margin:0 auto;}

/* ===== Home grid ===== */
.home-hero{
  background:linear-gradient(120deg,var(--navy) 0%, var(--navy-2) 100%);
  color:#fff;border-radius:var(--radius);
  padding:28px 32px;margin-bottom:24px;
  display:flex;justify-content:space-between;align-items:center;gap:24px;
  flex-wrap:wrap;
}
.home-hero h1{margin:0 0 6px;font-size:26px;}
.home-hero p{margin:0;color:#AFC2D6;font-size:14px;max-width:520px;line-height:1.5;}
.home-hero .stat-strip{display:flex;gap:18px;}
.home-hero .stat-strip div{text-align:center;}
.home-hero .stat-strip .n{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;}
.home-hero .stat-strip .l{font-size:11px;color:#AFC2D6;text-transform:uppercase;letter-spacing:.08em;}

.section-label{
  font-size:12px;font-weight:700;color:var(--grey-mid);
  text-transform:uppercase;letter-spacing:.12em;
  margin:28px 0 12px;
}
.tile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
@media (max-width:900px){.tile-grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:560px){.tile-grid{grid-template-columns:1fr;}}
.tile{
  background:#fff;border:1px solid var(--grey-line);border-radius:var(--radius);
  padding:22px;cursor:pointer;text-align:left;
  display:flex;flex-direction:column;gap:10px;
  min-height:128px;
  transition:.15s;position:relative;overflow:hidden;
}
.tile:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--navy);}
.tile .icon{
  width:46px;height:46px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;background:var(--navy-soft);color:var(--navy);
  flex-shrink:0;
}
.tile.accent .icon{background:var(--navy);color:#fff;}
.tile h3{margin:0;font-size:16px;letter-spacing:.04em;}
.tile p{margin:0;font-size:13px;color:var(--grey-mid);line-height:1.4;}
.tile .badge-soon{
  position:absolute;top:14px;right:14px;
  background:var(--grey);color:var(--grey-mid);
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  padding:4px 9px;border-radius:20px;border:1px solid var(--grey-line);
}
.tile.soon{cursor:default;}
.tile.soon:hover{transform:none;box-shadow:none;border-color:var(--grey-line);}
.tile.soon h3,.tile.soon p{color:var(--grey-mid);}
.tile.soon .icon{background:var(--grey);color:var(--grey-mid);}

.worktool-grid{grid-template-columns:repeat(2,1fr);gap:18px;}
@media (max-width:560px){.worktool-grid{grid-template-columns:1fr;}}
.worktool-tile{
  min-height:160px;justify-content:center;align-items:center;text-align:center;
  gap:14px;padding:28px 20px;
}
.worktool-tile .icon{
  width:62px;height:62px;font-size:30px;border-radius:16px;
}
.worktool-tile h3{font-size:18px;}
.system-link-row{display:flex;justify-content:center;margin-top:28px;}
.system-link-btn{
  background:none;border:1.5px solid var(--grey-line);color:var(--grey-mid);
  font-size:13px;font-weight:600;padding:9px 18px;border-radius:20px;
  cursor:pointer;transition:.15s;
}
.system-link-btn:hover{border-color:var(--navy);color:var(--navy);background:var(--navy-soft);}
.worktool-tile p{font-size:13px;color:var(--grey-mid);}

/* ===== Cards / panels ===== */
.panel{background:#fff;border:1px solid var(--grey-line);border-radius:var(--radius);padding:24px;margin-bottom:18px;}
.panel h2{margin:0 0 18px;font-size:18px;color:var(--navy);display:flex;align-items:center;gap:10px;}
.panel h2 .num{
  width:28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-family:'JetBrains Mono',monospace;
  flex-shrink:0;
}

/* ===== Forms ===== */
.formgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
@media (max-width:700px){.formgrid{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:6px;}
.field.full{grid-column:1/-1;}
.field label{font-size:12px;font-weight:700;color:var(--grey-mid);text-transform:uppercase;letter-spacing:.08em;}
.field input,.field select,.field textarea{
  border:1.5px solid var(--grey-line);border-radius:var(--radius-sm);
  padding:13px 14px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink);
  width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--navy);outline-offset:1px;border-color:var(--navy);}
.field textarea{resize:vertical;min-height:70px;}

.btn{
  border:none;border-radius:12px;padding:14px 22px;font-size:15px;font-weight:700;
  cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-family:'Inter',sans-serif;transition:.15s;letter-spacing:.02em;
}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:var(--navy-2);}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:#268a4f;}
.btn-ghost{background:var(--grey);color:var(--ink);border:1.5px solid var(--grey-line);}
.btn-ghost:hover{background:#e8edf1;}
.btn-danger{background:var(--red-bg);color:var(--red);border:1.5px solid #f3c5cd;}
.btn-danger:hover{background:#f6d3da;}
.btn-block{width:100%;}
.btn-lg{padding:18px 28px;font-size:16px;}
.btn[disabled]{opacity:.45;cursor:not-allowed;}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px;}

/* ===== Wizard tabs ===== */
.wizard-head{
  background:#fff;border:1px solid var(--grey-line);border-radius:var(--radius);
  padding:18px 22px;margin-bottom:18px;
  display:flex;justify-content:space-between;align-items:flex-start;gap:18px;flex-wrap:wrap;
}
.wizard-head .meta h2{margin:0 0 4px;color:var(--navy);font-size:20px;}
.wizard-head .meta .sub{font-size:13px;color:var(--grey-mid);}
.wizard-head .meta .sub .mono{color:var(--ink);}
.tabbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.tab{
  background:#fff;border:1.5px solid var(--grey-line);border-radius:12px;
  padding:12px 18px;font-size:14px;font-weight:700;color:var(--grey-mid);
  cursor:pointer;display:flex;align-items:center;gap:8px;
}
.tab .tn{
  width:22px;height:22px;border-radius:50%;background:var(--grey);color:var(--grey-mid);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-family:'JetBrains Mono',monospace;
}
.tab.active{border-color:var(--navy);color:var(--navy);background:var(--navy-soft);}
.tab.active .tn{background:var(--navy);color:#fff;}
.tab.done .tn{background:var(--green);color:#fff;}

/* ===== Tables ===== */
table{width:100%;border-collapse:collapse;}
th{
  text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--grey-mid);
  padding:10px 12px;border-bottom:2px solid var(--grey-line);font-weight:700;
}
td{padding:13px 12px;border-bottom:1px solid var(--grey-line);font-size:14px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.tag-id{
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;
  background:var(--navy);color:#fff;border-radius:6px;padding:5px 9px;display:inline-block;
}
.icon-btn{
  border:1.5px solid var(--grey-line);background:#fff;border-radius:8px;
  width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;color:var(--grey-mid);
}
.icon-btn:hover{border-color:var(--red);color:var(--red);}

/* ===== Empty state ===== */
.empty{
  border:2px dashed var(--grey-line);border-radius:var(--radius);
  padding:40px 20px;text-align:center;color:var(--grey-mid);
}
.empty .icon{font-size:34px;margin-bottom:10px;display:block;}
.empty h3{margin:0 0 6px;color:var(--ink);font-size:16px;text-transform:none;font-family:'Inter',sans-serif;}
.empty p{margin:0;font-size:13px;}

/* ===== Damage tags (signature element) ===== */
.tagclass-row{display:flex;gap:14px;flex-wrap:wrap;}
.tagclass{
  flex:1;min-width:140px;
  border:3px solid transparent;border-radius:var(--radius);
  padding:18px 14px 16px;cursor:pointer;text-align:center;position:relative;
  font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.06em;
  transition:.15s;
}
.tagclass::before{
  content:'';position:absolute;top:-9px;left:50%;transform:translateX(-50%);
  width:16px;height:16px;border-radius:50%;background:var(--grey);
  border:3px solid var(--white);box-shadow:0 1px 3px rgba(0,0,0,.15);
}
.tagclass .lab{font-size:15px;}
.tagclass .desc{display:block;margin-top:4px;font-size:11px;font-family:'Inter',sans-serif;font-weight:500;text-transform:none;letter-spacing:0;}
.tagclass.green{background:var(--green-bg);color:#1f7a44;}
.tagclass.yellow{background:var(--yellow-bg);color:#9a6c00;}
.tagclass.red{background:var(--red-bg);color:#a8233a;}
.tagclass.green.sel{border-color:var(--green);box-shadow:0 0 0 4px rgba(46,158,91,.15);}
.tagclass.yellow.sel{border-color:var(--yellow);box-shadow:0 0 0 4px rgba(242,183,5,.18);}
.tagclass.red.sel{border-color:var(--red);box-shadow:0 0 0 4px rgba(214,51,74,.15);}

/* damage cards */
.dmg-card{
  background:#fff;border:1px solid var(--grey-line);border-radius:var(--radius-sm);
  display:flex;gap:14px;padding:14px;margin-bottom:10px;align-items:flex-start;
  border-left:6px solid var(--grey-line);
}
.dmg-card.green{border-left-color:var(--green);}
.dmg-card.yellow{border-left-color:var(--yellow);}
.dmg-card.red{border-left-color:var(--red);}
.dmg-card .thumb{
  width:64px;height:64px;border-radius:8px;background:var(--grey);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:22px;color:var(--grey-mid);
}
.dmg-card .thumb img{width:100%;height:100%;object-fit:cover;}
.dmg-card .body{flex:1;min-width:0;}
.dmg-card .body .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap;}
.dmg-card .body h4{margin:0;font-size:15px;}
.dmg-card .body .meta{font-size:12px;color:var(--grey-mid);margin-top:3px;}
.dmg-card .body .desc{font-size:13px;margin-top:6px;color:var(--ink);}
.pill{
  display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 11px;
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
}
.pill.green{background:var(--green-bg);color:#1f7a44;}
.pill.yellow{background:var(--yellow-bg);color:#9a6c00;}
.pill.red{background:var(--red-bg);color:#a8233a;}
.pill.grey{background:var(--grey);color:var(--grey-mid);}

/* ===== Dashboard ===== */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
@media (max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
.stat-card{
  background:#fff;border:1px solid var(--grey-line);border-radius:var(--radius);
  padding:18px 20px;
}
.stat-card .n{font-family:'Oswald',sans-serif;font-size:32px;font-weight:700;color:var(--navy);}
.stat-card .l{font-size:12px;color:var(--grey-mid);text-transform:uppercase;letter-spacing:.08em;margin-top:4px;}
.stat-card.green .n{color:var(--green);}
.stat-card.yellow .n{color:var(--yellow);}
.stat-card.red .n{color:var(--red);}
.bars{display:flex;flex-direction:column;gap:10px;}
.bar-row{display:flex;align-items:center;gap:12px;}
.bar-row .label{width:130px;font-size:13px;font-weight:600;flex-shrink:0;}
.bar-track{flex:1;height:14px;background:var(--grey);border-radius:8px;overflow:hidden;}
.bar-fill{height:100%;border-radius:8px;}
.bar-row .val{width:36px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;}

/* ===== Photo grid ===== */
.photo-grid{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}
.photo-thumb{
  width:84px;height:84px;border-radius:10px;overflow:hidden;position:relative;
  border:1.5px solid var(--grey-line);background:var(--grey);
}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-thumb .rm{
  position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;
  background:rgba(20,30,40,.65);color:#fff;border:none;font-size:13px;display:flex;
  align-items:center;justify-content:center;cursor:pointer;
}
.photo-add{
  width:84px;height:84px;border-radius:10px;border:2px dashed var(--grey-line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;color:var(--grey-mid);font-size:12px;gap:4px;background:#fff;
}
.photo-add .plus{font-size:22px;line-height:1;}
.photo-add:hover{border-color:var(--navy);color:var(--navy);}

/* ===== Modal ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(14,42,69,.55);
  display:flex;align-items:flex-end;justify-content:center;z-index:100;
  animation:fadein .15s ease;
}
@media (min-width:760px){.modal-overlay{align-items:center;}}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal{
  background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:640px;
  max-height:92vh;overflow-y:auto;padding:24px;
  animation:slideup .2s ease;
}
@media (min-width:760px){.modal{border-radius:var(--radius);}}
@keyframes slideup{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h2{margin:0 0 16px;color:var(--navy);font-size:18px;}
.modal-close{
  position:sticky;top:0;float:right;background:var(--grey);border:none;border-radius:50%;
  width:34px;height:34px;font-size:16px;cursor:pointer;color:var(--grey-mid);
}

/* ===== Signature pad ===== */
.sigpad-wrap{border:1.5px solid var(--grey-line);border-radius:var(--radius-sm);overflow:hidden;background:#fcfdfe;}
.sigpad-wrap canvas{display:block;width:100%;height:160px;touch-action:none;cursor:crosshair;}
.sigpad-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.sig-status{font-size:12px;color:var(--grey-mid);}
.sig-status.ok{color:var(--green);font-weight:700;}

/* ===== Toast ===== */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--navy);color:#fff;padding:14px 24px;border-radius:12px;
  font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:10px;z-index:200;
  transition:transform .25s ease;
}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast .dot{width:10px;height:10px;border-radius:50%;background:var(--green);flex-shrink:0;}

/* drawing canvas placeholder */
.drawing-area{
  border:2px dashed var(--grey-line);border-radius:var(--radius);
  min-height:300px;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:10px;color:var(--grey-mid);background:#fff;overflow:hidden;position:relative;
}
.drawing-area img,.drawing-area embed{width:100%;height:100%;object-fit:contain;}
.drawing-pin{
  position:absolute;width:30px;height:30px;border-radius:50%;
  background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
  transform:translate(-50%,-50%);border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);cursor:pointer;
}

.report-list-item{
  display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;
  padding:14px 0;border-bottom:1px solid var(--grey-line);
}
.report-list-item:last-child{border-bottom:none;}
.report-list-item .info h4{margin:0 0 4px;font-size:15px;}
.report-list-item .info .meta{font-size:12px;color:var(--grey-mid);}
.coming-soon-preview{
  background:var(--grey);border-radius:var(--radius-sm);padding:18px;margin-top:14px;
  filter:saturate(.5);opacity:.65;pointer-events:none;
}

footer.app-foot{
  text-align:center;padding:14px;font-size:11px;color:var(--grey-mid);
  border-top:1px solid var(--grey-line);background:#fff;
}

/* ===== History accordion ===== */
.hist-customer{border:1px solid var(--grey-line);border-radius:var(--radius-sm);margin-bottom:10px;overflow:hidden;}
.hist-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px;cursor:pointer;background:#fff;font-size:14px;
}
.hist-row:hover{background:var(--grey);}
.hist-row span{color:var(--grey-mid);font-size:13px;font-weight:600;}
.hist-year{border-top:1px solid var(--grey-line);background:var(--navy-soft);}
.hist-row.sub{padding-left:28px;font-weight:700;color:var(--navy);background:transparent;}
.hist-insp{
  background:#fff;margin:0 12px 12px 28px;padding:14px;border-radius:var(--radius-sm);
  border:1px solid var(--grey-line);
}

/* ===== Kundekort ===== */
.cust-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
@media (max-width:800px){.cust-grid{grid-template-columns:1fr;}}
.cust-card{background:#fff;border:1px solid var(--grey-line);border-radius:var(--radius);padding:20px;}
.cust-card h3{margin:0 0 4px;font-size:17px;color:var(--navy);text-transform:none;font-family:'Inter',sans-serif;font-weight:700;}
.cust-card .addr{font-size:13px;color:var(--grey-mid);margin-bottom:10px;}
.cust-card .kv{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:13px;margin:12px 0;}
.cust-card .kv b{display:block;color:var(--grey-mid);font-size:11px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;margin-bottom:2px;}
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.status-badge.ok{background:var(--green-bg);color:#1f7a44;}
.status-badge.followup{background:var(--yellow-bg);color:#9a6c00;}
.status-badge.overdue{background:var(--red-bg);color:#a8233a;}
.status-badge.none{background:var(--grey);color:var(--grey-mid);}

/* ===== Pin action modal & AI ===== */
.pin-actions{display:flex;flex-direction:column;gap:8px;}
.pin-actions .btn{justify-content:flex-start;}
.drawing-pin.zone{background:var(--grey-mid);}
.drawing-pin{cursor:pointer;}
.drawing-pin.pin-green{background:var(--green);}
.drawing-pin.pin-yellow{background:var(--yellow);color:var(--ink);}
.drawing-pin.pin-red{background:var(--red);}
.drawing-pin.pin-grey{background:#A7B2BD;}
.drawing-pin.zone{background:var(--grey-mid);}
.drawing-pin.highlight{
  outline:4px solid var(--navy); outline-offset:2px;
  animation:pulse 1.2s ease-in-out infinite;
  z-index:5;
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(14,42,69,.5)}50%{box-shadow:0 0 0 8px rgba(14,42,69,0)}}
.drawing-pin{white-space:nowrap;padding:2px 8px;border-radius:14px;width:auto;height:auto;font-size:10px;}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;}
.gallery-grid img{width:100%;height:110px;object-fit:cover;border-radius:8px;border:1px solid var(--grey-line);}
.mail-card{border:1px solid var(--grey-line);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px;}
.mail-card .mhead{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.mail-card .mhead h4{margin:0;font-size:14px;}
.mail-card .mmeta{font-size:12px;color:var(--grey-mid);margin-top:2px;}
.mail-preview{
  background:var(--grey);border-radius:8px;padding:10px 12px;margin-top:10px;
  font-size:12px;font-family:'JetBrains Mono',monospace;white-space:pre-wrap;color:var(--ink);
  line-height:1.5;
}

/* ===== Voice note (skjult talefunktion) ===== */
.voicebox{
  border:1.5px dashed var(--grey-line);border-radius:var(--radius-sm);
  padding:14px;margin:8px 0 14px;background:#fcfdfe;
}
.voice-recording{
  display:flex;align-items:center;gap:12px;color:var(--red);font-weight:700;font-size:14px;
}
.voice-recording .dot{
  width:12px;height:12px;border-radius:50%;background:var(--red);
  animation:pulseDot 1s infinite;
}
@keyframes pulseDot{0%,100%{opacity:1}50%{opacity:.25}}
.voice-suggestion{
  background:var(--navy-soft);border-radius:var(--radius-sm);padding:12px 14px;margin-top:10px;
}
.voice-suggestion h4{margin:0 0 8px;font-size:13px;color:var(--navy);text-transform:none;font-family:'Inter',sans-serif;}
.voice-suggestion .kv{font-size:13px;margin-bottom:4px}
.voice-suggestion .kv b{color:var(--grey-mid);font-weight:700;margin-right:6px}
.voicenote-summary{
  display:flex;align-items:flex-start;gap:10px;background:var(--grey);border-radius:var(--radius-sm);
  padding:10px 12px;margin-top:8px;font-size:13px;
}

/* ===== NY SKADE — work screen ===== */
.work-screen{max-width:640px;margin:0 auto;}
.work-step{margin-bottom:22px;}
.work-step-label{
  font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  font-size:13px;color:var(--grey-mid);margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.work-step-label .stepnum{
  width:24px;height:24px;border-radius:50%;background:var(--navy);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-family:'JetBrains Mono',monospace;
  flex-shrink:0;
}
.check-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media (max-width:480px){.check-grid{grid-template-columns:1fr;}}
.check-tile{
  display:flex;align-items:center;gap:12px;
  border:2px solid var(--grey-line);border-radius:var(--radius-sm);
  padding:18px 16px;background:#fff;cursor:pointer;font-size:16px;font-weight:600;
  min-height:60px;transition:.12s;
}
.check-tile .box{
  width:30px;height:30px;border-radius:8px;border:2px solid var(--grey-line);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;background:#fff;
}
.check-tile.checked{border-color:var(--navy);background:var(--navy-soft);}
.check-tile.checked .box{background:var(--navy);border-color:var(--navy);}
.priority-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.priority-tile{
  border:3px solid transparent;border-radius:var(--radius);padding:22px 10px;text-align:center;
  cursor:pointer;font-family:'Oswald',sans-serif;font-weight:700;font-size:17px;letter-spacing:.04em;
  min-height:78px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
}
.priority-tile .dot{width:22px;height:22px;border-radius:50%;}
.priority-tile.green{background:var(--green-bg);color:#1f7a44;}
.priority-tile.yellow{background:var(--yellow-bg);color:#9a6c00;}
.priority-tile.red{background:var(--red-bg);color:#a8233a;}
.priority-tile.green .dot{background:var(--green);}
.priority-tile.yellow .dot{background:var(--yellow);}
.priority-tile.red .dot{background:var(--red);}
.priority-tile.sel.green{border-color:var(--green);box-shadow:0 0 0 4px rgba(46,158,91,.15);}
.priority-tile.sel.yellow{border-color:var(--yellow);box-shadow:0 0 0 4px rgba(242,183,5,.18);}
.priority-tile.sel.red{border-color:var(--red);box-shadow:0 0 0 4px rgba(214,51,74,.15);}
.location-tabs{display:flex;gap:8px;margin-bottom:10px;}
.location-tab{
  flex:1;text-align:center;padding:12px;border-radius:10px;border:2px solid var(--grey-line);
  font-weight:700;font-size:14px;cursor:pointer;color:var(--grey-mid);background:#fff;
}
.location-tab.active{border-color:var(--navy);color:var(--navy);background:var(--navy-soft);}
.gemnaeste-bar{
  position:sticky;bottom:0;background:#fff;border-top:1.5px solid var(--grey-line);
  padding:14px 0 6px;margin-top:24px;z-index:10;
}
.huge-btn{
  width:100%;padding:22px;font-size:19px;font-weight:700;border-radius:18px;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.reol-context-bar{
  position:sticky;top:0;z-index:9;
  background:var(--navy);color:#fff;border-radius:14px;
  padding:14px 18px;margin-bottom:20px;
  display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
  box-shadow:var(--shadow);
}
.reol-context-bar .rcb-main{display:flex;flex-direction:column;gap:2px;}
.reol-context-bar .rcb-reol{font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;letter-spacing:.03em;}
.reol-context-bar .rcb-loc{font-size:12px;color:#AFC2D6;}
.reol-context-bar .rcb-qr{
  font-family:'JetBrains Mono',monospace;font-size:11px;background:rgba(255,255,255,.12);
  padding:5px 10px;border-radius:8px;flex-shrink:0;
}

/* ===== v3.1 — progressive one-task-at-a-time disclosure ===== */
.offline-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--green-bg);color:#1f7a44;font-size:12px;font-weight:700;
  padding:6px 12px;border-radius:20px;margin-bottom:12px;
}
.step-done{
  display:flex;align-items:center;gap:12px;
  background:var(--green-bg);border:1.5px solid #b9e3c8;border-radius:14px;
  padding:14px 16px;margin-bottom:14px;cursor:pointer;font-size:15px;font-weight:600;color:#1f7a44;
  min-height:48px;
}
.step-done-check{
  width:30px;height:30px;border-radius:50%;background:var(--green);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;font-weight:700;
}
.active-step{animation:stepIn .2s ease;}
@keyframes stepIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.big-step-label{
  font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.03em;
  font-size:22px;color:var(--navy);margin-bottom:14px;
}
.big-step-label-sm{
  font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.03em;
  font-size:15px;color:var(--grey-mid);margin-bottom:10px;text-transform:uppercase;
}
.optional-tag{
  font-family:'Inter',sans-serif;font-weight:500;text-transform:none;letter-spacing:0;
  font-size:12px;color:var(--grey-mid);margin-left:6px;
}
.big-input,.big-select{
  width:100%;border:2px solid var(--grey-line);border-radius:14px;
  padding:18px;font-size:18px;font-family:inherit;min-height:60px;
}
.big-input:focus,.big-select:focus{outline:none;border-color:var(--navy);}
#saveFlash{
  position:fixed;inset:0;background:rgba(46,158,91,.96);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:'Oswald',sans-serif;font-weight:700;font-size:32px;letter-spacing:.05em;
  z-index:500;opacity:0;pointer-events:none;transition:opacity .15s ease;
}
#saveFlash.show{opacity:1;}

function loadDB(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const db = JSON.parse(raw);
      // migration: ensure new fields exist on older saved data
      db.config = db.config || {};
      db.config.suppliers = db.config.suppliers || ['Constructor','Dexion','Stow','AJ Produkter','Reoler A/S','Andet'];
      db.config.roles = db.config.roles || ['Lagerchef','Produktionschef','Teknisk chef','Ekstern montør'];
      db.config.locationTypes = db.config.locationTypes || ['Hal A','Hal B','Produktion','Pakkeri','Fryselager'];
      db.config.reolTypes = db.config.reolTypes || ['Pallereol','Grenreol','Dækreol','Småvarelager','Gennemløbsreol','Specialreol'];
      db.config.defectTypes = db.config.defectTypes || ['Beskadiget stolpe','Beskadiget vange','Manglende sikringstap','Manglende ankerbolt','Beskadiget fodplade','Skæv diagonal','Korrosion','Påkørselsskade','Deformation','Manglende belastningsskilt','Manglende værn','Revne','Overbelastning','Andet'];
      ['Beskadiget stolpe','Beskadiget vange','Manglende sikringstap','Manglende ankerbolt','Beskadiget fodplade','Påkørselsskade','Deformation','Manglende værn','Revne','Overbelastning'].forEach(t=>{
        if(!db.config.defectTypes.includes(t)) db.config.defectTypes.push(t);
      });
      db.pilotFeedback = db.pilotFeedback || [];
      const codeMap = {'cust-carletti':'CA','cust-bramidan':'BA','cust-reoler':'RA'};
      db.customers.forEach(c=>{
        if(!c.code) c.code = codeMap[c.id] || c.name.replace(/[^A-ZÆØÅa-zæøå]/g,'').slice(0,2).toUpperCase();
        if(!c.documents) c.documents = [];
        if(!c.locations) c.locations = [{name:'Hal A',archived:false},{name:'Hal B',archived:false}];
        c.documents.forEach(d=>{ if(!d.id) d.id=uid('doc'); if(!d.uploadedBy) d.uploadedBy='John Finmann'; });
        if(!c.mailConfig) c.mailConfig = defaultMailConfig(c);
        if(c.phone===undefined) c.phone='';
        if(c.cvr===undefined) c.cvr='';
        if(c.active===undefined) c.active=true;
        if(c.favorite===undefined) c.favorite=false;
      });
      db.mailLog = db.mailLog || [];
      db.inspections.forEach(i=>{
        if(i.vurdering===undefined) i.vurdering = null;
        if(!i.checklist) i.checklist = {};
        i.reoler.forEach(r=>{ if(r.hal===undefined) r.hal=''; if(r.reolraekke===undefined) r.reolraekke=''; });
      });
      return db;
    }
  }catch(e){}
  const fresh = seedDB();
  saveDB(fresh);
  return fresh;
}
function saveDB(db){ localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }

  document.getElementById('f_name').value = c.name||'';
  document.getElementById('f_address').value = c.address||'';
  document.getElementById('f_cvr').value = c.cvr||'';
  document.getElementById('f_contact').value = c.contact||'';

      id:uid('cust'), code: name.replace(/[^A-ZÆØÅa-zæøå]/g,'').slice(0,2).toUpperCase(),
      name, address:val('f_address'), cvr:val('f_cvr'), contact:val('f_contact'), email:val('f_email'),

    };
    customer.mailConfig = defaultMailConfig(customer);

  const insp = {

    customerName:name,
    address:val('f_address')||customer.address,

  const insp = getInspection(state.currentInspectionId);
  if(!insp) return emptyState('⚠️','Eftersyn ikke fundet','Gå tilbage til forsiden.');

  const tabs = WIZARD_TABS.map(t=>{
    let done = false;
    if(t.key==='stamdata') done = !!insp.customerName;
    if(t.key==='tegning') done = !!insp.drawing;
    if(t.key==='reoler') done = insp.reoler.length>0;
    if(t.key==='skader') done = true; // optional
    if(t.key==='underskrift') done = !!(insp.signatures.inspector && insp.signatures.customer);
    if(t.key==='afslut') done = insp.status==='closed';
    return `<div class="tab ${state.wizardTab===t.key?'active':''} ${done?'done':''}" onclick="setWizardTab('${t.key}')">
      <span class="tn">${done?'✓':t.n}</span> ${t.label}
    </div>`;
  }).join('');

  return `

    <div class="meta">
      <h2>${esc(insp.customerName)}</h2>

const TEGNING_FILTERS = [
  {key:'alle', label:'Alle'},
  {key:'green', label:'Grøn'},
  {key:'yellow', label:'Gul'},
  {key:'red', label:'Rød'},
  {key:'open', label:'Åbne'},
  {key:'closed', label:'Lukkede'}
];

function reolStatus(insp, reolId){
  const sk = insp.skader.filter(s=>s.reolId===reolId);
  const everInspected = DB.inspections.some(i=>i.customerId===insp.customerId && i.skader.some(s=>s.reolId===reolId));
  if(sk.length===0 && !everInspected){
    return {color:'grey', label:'Ikke inspiceret', total:0, open:0, closed:0};
  }
  const open = sk.filter(s=>s.status!=='Lukket');
  let color='green';
  if(open.some(s=>s.classification==='red')) color='red';
  else if(open.some(s=>s.classification==='yellow')) color='yellow';
  const redCount = open.filter(s=>s.classification==='red').length;
  let label;
  if(sk.length===0) label='0 fejl';
  else if(redCount>0) label=`${redCount} kritisk${redCount>1?'e':''} fejl`;
  else label=`${sk.length} fejl`;
  return {color, label, total:sk.length, open:open.length, closed:sk.length-open.length};
}

function wizardTegning(insp){
  let content;
  if(insp.drawing){
    if(insp.drawing.type==='pdf'){
      content = `<embed src="${insp.drawing.data}" type="application/pdf">`;
    }else{
      content = `<img src="${insp.drawing.data}" alt="Tegning">`;
    }
  }else{
    content = `<span style="font-size:34px">🗺️</span><div><strong>Ingen tegning uploadet</strong></div><div style="font-size:13px">Upload lager-, produktions- eller bygningstegning (PDF, JPG, PNG)</div>`;
  }
  const isImage = insp.drawing && insp.drawing.type!=='pdf';
  const reolIds = insp.reoler.map(r=>r.id);
  const filter = state.tegningFilter || 'alle';

  const pinsHtml = isImage ? (insp.reolPins||[]).map(p=>{
    const isReol = reolIds.includes(p.name);
    let pinColor='grey', pinLabel=esc(p.name), match=true;
    if(isReol){
      const rs = reolStatus(insp, p.name);
      pinColor = rs.color;
      pinLabel = `${esc(p.name)} (${rs.label})`;
      if(filter==='green'||filter==='yellow'||filter==='red') match = (rs.color===filter);
      else if(filter==='open') match = rs.open>0;
      else if(filter==='closed') match = rs.total>0 && rs.open===0;
    }
    const dim = !match ? 'opacity:.2' : '';
    const hl = (state.tegningHighlight===p.uid) ? 'highlight' : '';
    return `<div class="drawing-pin pin-${isReol?pinColor:'zone'} ${hl}" style="left:${p.x}%;top:${p.y}%;${dim}" onclick="event.stopPropagation();onPinClick('${p.uid}')" title="${esc(p.name)}">${pinLabel}</div>`;
  }).join('') : '';

  const unplaced = insp.reoler.filter(r=>!(insp.reolPins||[]).some(p=>p.name===r.id));
  const hlPin = (insp.reolPins||[]).find(p=>p.uid===state.tegningHighlight);
  const zoomStyle = hlPin ? `transform:scale(2.2);transform-origin:${hlPin.x}% ${hlPin.y}%;transition:transform .3s ease;` : '';

  return `
  <div class="panel">
    <h2><span class="num">2</span> Tegninger og layout</h2>
    ${isImage ? `
    <div class="btn-row" style="margin-bottom:14px;margin-top:0">
      ${TEGNING_FILTERS.map(f=>`<button class="btn ${filter===f.key?'btn-primary':'btn-ghost'}" style="padding:9px 16px;font-size:13px" onclick="setTegningFilter('${f.key}')">${f.label}</button>`).join('')}
    </div>`:''}
    <div class="drawing-area" id="drawingArea" style="${hlPin?'overflow:hidden':''}" onclick="${isImage?'onDrawingClick(event)':''}">
      <div style="${zoomStyle}width:100%;height:100%;position:relative">${content}${pinsHtml}</div>
    </div>
    ${hlPin? `<div class="btn-row" style="margin-top:10px"><button class="btn btn-ghost" onclick="state.tegningHighlight=null;render()">🔍 Nulstil visning</button></div>`:''}
    <div class="btn-row">
      <label class="btn btn-ghost" style="cursor:pointer">
        📎 Upload tegning
        <input type="file" accept=".pdf,image/png,image/jpeg" style="display:none" onchange="uploadDrawing(event)">
      </label>
      ${insp.drawing? `<button class="btn btn-danger" onclick="removeDrawing()">Fjern tegning</button>` : ''}
      ${isImage? `<button class="btn ${state.pinAddMode?'btn-green':'btn-ghost'}" onclick="togglePinAddMode()">${state.pinAddMode?'📍 Tryk på tegningen for at placere pin':'➕ Tilføj reol-pin'}</button>`:''}
      ${state.pinMoveTarget? `<button class="btn btn-green" disabled style="cursor:default">📍 Tryk på tegningen for ny placering</button> <button class="btn btn-ghost" onclick="state.pinMoveTarget=null;render()">Annuller flyt</button>`:''}
      ${isImage? `<button class="btn btn-ghost" onclick="openScanQR()">📷 Scan QR</button>`:''}
      <button class="btn btn-ghost" onclick="suggestAI()">✨ AI foreslå reoler og zoner</button>
      <button class="btn btn-primary" onclick="setWizardTab('reoler')">Næste: Reolregister →</button>
    </div>
    ${isImage ? `<p style="font-size:12px;color:var(--grey-mid);margin-top:10px">Tegningen er hovednavigationen: grøn = OK, gul = reparation, rød = kritisk. Tryk på en reol-pin for at åbne reolkortet. Brug "Tilføj reol-pin" til at placere, omdøbe, flytte eller slette pins.</p>` : ''}
    ${isImage && unplaced.length ? `
      <div style="margin-top:14px">
        <div style="font-size:12px;font-weight:700;color:var(--grey-mid);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Reoler uden pin på tegningen</div>
        <div class="btn-row" style="margin-top:0">
          ${unplaced.map(r=>`<button class="btn btn-ghost" style="padding:8px 12px;font-size:13px" onclick="quickAddPin('${esc(r.id)}')">➕ ${esc(r.id)}</button>`).join('')}
        </div>
      </div>`:''}
  </div>`;
}
function setTegningFilter(key){ state.tegningFilter=key; render(); }
function quickAddPin(reolId){
  state.pendingPinName = reolId;
  state.pinAddMode = true;
  render();
  toast('Tryk på tegningen for at placere '+reolId);
}

function uploadDrawing(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const insp = getInspection(state.currentInspectionId);
    insp.drawing = {type: file.type==='application/pdf'?'pdf':'image', data: ev.target.result, name:file.name};
    insp.reolPins = insp.reolPins || [];
    saveDB(DB);
    render();
  };
  reader.readAsDataURL(file);
}
function removeDrawing(){
  const insp = getInspection(state.currentInspectionId);
  insp.drawing=null; insp.reolPins=[];
  state.pinAddMode=false; state.pinMoveTarget=null;
  saveDB(DB); render();
}
function togglePinAddMode(){
  state.pinAddMode = !state.pinAddMode;
  state.pinMoveTarget = null;
  render();
}
function onDrawingClick(e, dummy){
  const insp = getInspection(state.currentInspectionId);
  const area = document.getElementById('drawingArea');
  const rect = area.getBoundingClientRect();
  if(!e || !e.clientX) return; // safety for disabled placeholder button
  const x = ((e.clientX-rect.left)/rect.width*100).toFixed(1);
  const y = ((e.clientY-rect.top)/rect.height*100).toFixed(1);

  if(state.pinMoveTarget){
    const pin = (insp.reolPins||[]).find(p=>p.uid===state.pinMoveTarget);
    if(pin){ pin.x=x; pin.y=y; }
    state.pinMoveTarget=null;
    saveDB(DB); render();
    toast('Pin flyttet');
    return;
  }
  if(state.pinAddMode){
    let name = state.pendingPinName;
    if(!name){ name = prompt('Navn på pin (fx A1, Hal 1, Varemodtagelse):'); }
    if(name && name.trim()){
      insp.reolPins = insp.reolPins || [];
      insp.reolPins.push({uid:uid('pin'), name:name.trim(), x, y});
      saveDB(DB);
      toast('Pin "'+name.trim()+'" placeret');
    }
    state.pinAddMode=false;
    state.pendingPinName=null;
    render();
  }
}
function onPinClick(pinUid){
  const insp = getInspection(state.currentInspectionId);
  const pin = (insp.reolPins||[]).find(p=>p.uid===pinUid);
  if(!pin) return;
  const isReol = insp.reoler.some(r=>r.id===pin.name);
  const overlay = document.createElement('div');
  overlay.className='modal-overlay';
  overlay.id='pinModalOverlay';
  overlay.onclick=(e)=>{ if(e.target===overlay) closePinModal(); };
  overlay.innerHTML = `
    <div class="modal" style="max-width:380px">
      <button class="modal-close" onclick="closePinModal()">✕</button>
      <h2>Pin: ${esc(pin.name)}</h2>
      <div class="pin-actions">
        ${isReol? `<button class="btn btn-primary btn-block" onclick="closePinModal();showReolCard('${esc(pin.name)}')">🗄️ Åbn reolkort</button>`:''}
        <button class="btn btn-ghost btn-block" onclick="renamePin('${pinUid}')">✏️ Omdøb pin</button>
        <button class="btn btn-ghost btn-block" onclick="movePin('${pinUid}')">↔️ Flyt pin</button>
        <button class="btn btn-danger btn-block" onclick="deletePin('${pinUid}')">🗑️ Slet pin</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}
function closePinModal(){ const m=document.getElementById('pinModalOverlay'); if(m) m.remove(); }
function renamePin(pinUid){
  const insp = getInspection(state.currentInspectionId);
  const pin = (insp.reolPins||[]).find(p=>p.uid===pinUid);
  const name = prompt('Nyt navn for pin:', pin.name);
  if(name && name.trim()){ pin.name=name.trim(); saveDB(DB); }
  closePinModal(); render();
}
function movePin(pinUid){
  state.pinMoveTarget = pinUid;
  state.pinAddMode=false;
  closePinModal(); render();
  toast('Tryk på tegningen for at placere pinnen igen');
}
function deletePin(pinUid){
  const insp = getInspection(state.currentInspectionId);
  insp.reolPins = (insp.reolPins||[]).filter(p=>p.uid!==pinUid);
  saveDB(DB);
  closePinModal(); render();
}
function suggestAI(){
  alert('AI foreslå reoler og zoner\n\nKommer i version 2.\nAI vil kunne foreslå reoler, haller og zoner ud fra tegningen, men brugeren skal altid godkende før oprettelse.\n\nIngen reoler eller zoner oprettes automatisk.');
}

/* ---- Reol card (current + historical) ---- */
function showReolCard(reolId){
  const insp = getInspection(state.currentInspectionId);
  const reol = insp.reoler.find(r=>r.id===reolId);
  const rs = reolStatus(insp, reolId);
  // gather skader for this reolId across all inspections for the same customer
  const allForCustomer = DB.inspections.filter(i=>i.customerId===insp.customerId);
  const history = allForCustomer
    .flatMap(i=>i.skader.filter(s=>s.reolId===reolId).map(s=>({...s, reportNumber:i.reportNumber, inspDate:i.date, inspId:i.id, inspStatus:i.status})))
    .sort((a,b)=>b.inspDate.localeCompare(a.inspDate));
  const closedForCustomer = allForCustomer.filter(i=>i.status==='closed').sort((a,b)=>b.date.localeCompare(a.date));
  const last = closedForCustomer[0];

  const statusLabels = {green:'Grøn — OK',yellow:'Gul — Reparation',red:'Rød — Kritisk'};

  const overlay = document.createElement('div');
  overlay.className='modal-overlay';
  overlay.id='reolCardOverlay';
  overlay.onclick=(e)=>{ if(e.target===overlay) closeReolCard(); };
  overlay.innerHTML = `
    <div class="modal">
      <button class="modal-close" onclick="closeReolCard()">✕</button>
      <h2><span class="tag-id" style="font-size:15px">${esc(reolId)}</span> Reolkort 360 <span class="pill ${rs.color}" style="margin-left:8px">${statusLabels[rs.color]}</span></h2>
      ${reol? `
      <div class="formgrid" style="margin-bottom:10px">
        <div class="field"><label>Zone</label><input value="${esc(reol.zone)}" readonly></div>
        <div class="field"><label>Lokation</label><input value="${esc(reol.location)}" readonly></div>
        <div class="field"><label>Reoltype</label><input value="${esc(reol.type)}" readonly></div>
        <div class="field"><label>Producent</label><input value="${esc(reol.producer)}" readonly></div>
        <div class="field"><label>Belastningsskilt</label><input value="${reol.loadSign==='ja'?'Ja':'Nej'}" readonly></div>
        <div class="field"><label>Åbne skader</label><input value="${rs.open}" readonly></div>
        <div class="field"><label>Kritiske skader</label><input value="${insp.skader.filter(s=>s.reolId===reolId && s.status!=='Lukket' && s.classification==='red').length}" readonly></div>
      </div>` : `<p style="font-size:13px;color:var(--grey-mid)">Denne reol er ikke registreret i det aktuelle eftersyns reolregister, men har historiske data.</p>`}

      <div class="formgrid" style="margin-bottom:10px">
        <div class="field"><label>Seneste eftersyn</label><input value="${last?fmtDate(last.date)+' ('+last.reportNumber+')':'—'}" readonly></div>
        <div class="field"><label>Næste eftersyn</label><input value="${last?fmtDate(last.nextInspection):'—'}" readonly></div>
        <div class="field"><label>Antal fejl gennem tiden</label><input value="${history.length}" readonly></div>
      </div>

      ${(()=>{
        const openActions = history.filter(h=>h.status!=='Lukket');
        if(!openActions.length) return '';
        return `<h2 style="margin-top:18px;font-size:15px">Korrigerende handlinger (${openActions.length} åbne)</h2>
        ${openActions.map(h=>{
          const overdue = h.deadline && h.deadline<todayISO();
          return `<div class="report-list-item">
            <div class="info"><h4>${esc(h.defectType)} <span class="pill grey" style="margin-left:6px">${esc(h.status)}</span></h4>
            <div class="meta">${h.ansvarlig?'Ansvarlig: '+esc(h.ansvarlig):'Ingen ansvarlig'} ${h.deadline?'· Deadline: '+fmtDate(h.deadline):''}</div></div>
            ${overdue?'<span class="pill red">Overskredet</span>':''}
          </div>`;
        }).join('')}`;
      })()}

      <h2 style="margin-top:18px;font-size:15px">Historik — eftersyn, skader, billeder, kommentarer &amp; PDF'er (${history.length})</h2>
      ${history.length? (()=>{
        const byYear = {};
        history.forEach(h=>{ const y=h.inspDate.slice(0,4); (byYear[y]=byYear[y]||[]).push(h); });
        return Object.keys(byYear).sort((a,b)=>b-a).map(y=>`
          <div style="margin-bottom:10px">
            <div style="font-family:'Oswald',sans-serif;font-weight:700;color:var(--navy);font-size:15px;letter-spacing:.04em;margin-bottom:6px">${y}</div>
            ${byYear[y].map(h=>`
            <div class="dmg-card ${h.classification}" style="margin-bottom:8px">
              <div class="thumb">${h.photos&&h.photos[0]?`<img src="${h.photos[0]}">`:'📷'}</div>
              <div class="body">
                <div class="top">
                  <div><h4>${esc(h.defectType)}</h4><div class="meta">${fmtDate(h.inspDate)} · ${h.inspStatus==='closed'?'Rapport '+esc(h.reportNumber):'Igangværende eftersyn'}</div></div>
                  <span class="pill ${h.classification}">${({green:'Grøn',yellow:'Gul',red:'Rød'})[h.classification]}</span>
                </div>
                <div class="desc">${esc(h.desc)} <span class="pill grey" style="margin-left:6px">${esc(h.status)}</span></div>
                ${h.kommentar?`<div class="meta" style="margin-top:4px"><strong>Kommentar:</strong> ${esc(h.kommentar)}</div>`:''}
                ${h.photos&&h.photos.length?`<div class="photo-grid" style="margin-top:8px">${h.photos.map(p=>`<div class="photo-thumb"><img src="${p}"></div>`).join('')}</div>`:''}
                ${h.photosAfter&&h.photosAfter.length?`<div class="meta" style="margin-top:6px;font-weight:700">Efter reparation:</div><div class="photo-grid" style="margin-top:4px">${h.photosAfter.map(p=>`<div class="photo-thumb"><img src="${p}"></div>`).join('')}</div>`:''}
                ${h.inspStatus==='closed'?`<div class="btn-row" style="margin-top:8px"><button class="btn btn-ghost" style="padding:7px 12px;font-size:12px" onclick="generatePDF('${h.inspId}')">📄 ${esc(h.reportNumber)}</button></div>`:''}
              </div>
            </div>`).join('')}
          </div>`).join('');
      })() : `<p style="font-size:13px;color:var(--grey-mid)">Ingen tidligere skader registreret for denne reol.</p>`}

      <div class="btn-row">
        <button class="btn btn-green btn-lg" onclick="closeReolCard();startWorkScreen('${esc(reolId)}')">📷 Ny skade</button>
        <button class="btn btn-ghost" onclick="closeReolCard();showReolHistory('${insp.customerId}')">📚 Se historik</button>
        ${reol? `<button class="btn btn-ghost" onclick="zoomToReol('${esc(reolId)}')">🗺️ Vis på tegning</button>`:''}
        <button class="btn btn-ghost" onclick="showQRModal('${esc(reolId)}')">▦ QR-kode</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}
function closeReolCard(){ const m=document.getElementById('reolCardOverlay'); if(m) m.remove(); }
function showReolHistory(customerId){
  state.view='history';
  state.histExpand[customerId]=true;
  render();
}
function zoomToReol(reolId){
  const insp = getInspection(state.currentInspectionId);
  const pin = (insp.reolPins||[]).find(p=>p.name===reolId);
  closeReolCard();
  state.wizardTab='tegning';
  if(pin){ state.tegningHighlight = pin.uid; }
  else { toast('Reolen har ikke en pin på tegningen endnu'); }
  render();
}

/* ---- QR codes ---- */
function testQR(inspId){
  const insp = getInspection(inspId);
  if(!insp || !insp.reportNumber){ toast('Rapporten er ikke afsluttet endnu'); return; }
  window.open(reportUrl(insp), '_blank');
}
const REOLSCAN_BASE_URL = 'https://johnfinmann-ctrl.github.io/ReolScan-/';
function reportUrl(insp){
  return REOLSCAN_BASE_URL + '?report=' + encodeURIComponent(insp.reportNumber || insp.id);
}
function qrDataUrl(text, size){
  size = size||128;
  try{
    const div = document.createElement('div');
    div.style.position='fixed'; div.style.left='-9999px';
    document.body.appendChild(div);
    new QRCode(div, {text, width:size, height:size});
    const canvas = div.querySelector('canvas');
    const url = canvas ? canvas.toDataURL('image/png') : null;
    document.body.removeChild(div);
    return url;
  }catch(e){ return null; }
}
function showQRModal(reolId){
  const insp = getInspection(state.currentInspectionId);
  const cust = DB.customers.find(c=>c.id===insp.customerId);
  const code = `QR-${cust?cust.code:'XX'}-${reolId}`;
  const overlay = document.createElement('div');
  overlay.className='modal-overlay'; overlay.id='genericModalOverlay';
  overlay.onclick=(e)=>{ if(e.target===overlay) closeGenericModal(); };
  overlay.innerHTML = `
    <div class="modal" style="max-width:320px;text-align:center">
      <button class="modal-close" onclick="closeGenericModal()">✕</button>
      <h2 class="mono" style="font-size:16px">${esc(code)}</h2>
      <div id="qrTarget" style="display:flex;justify-content:center;margin:14px 0"></div>
      <p style="font-size:12px;color:var(--grey-mid)">Print og montér på reolen. Scanning åbner: <strong>Kunde → Hal ${esc(insp.reoler.find(r=>r.id===reolId)?.zone||'')} → Reol ${esc(reolId)}</strong> → Reolkort. Registreres en skade, vælges reolen automatisk.</p>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(()=>{
    const target = document.getElementById('qrTarget');
    if(target && window.QRCode){ new QRCode(target, {text:code, width:160, height:160}); }
    else if(target){ target.innerHTML = '<div class="mono" style="font-size:11px;color:var(--grey-mid)">QR: '+esc(code)+'</div>'; }
  },0);
}
function handleQRScan(code){
  code = (code||'').trim().toUpperCase();
  const m = code.match(/^QR-([A-Z0-9]+)-(.+)$/);
  if(!m){ toast('Ugyldig QR-kode'); return; }
  const [,custCode,reolId] = m;
  const insp = getInspection(state.currentInspectionId);
  const cust = DB.customers.find(c=>c.id===insp.customerId);
  if(cust && cust.code.toUpperCase()!==custCode){
    const other = DB.customers.find(c=>c.code.toUpperCase()===custCode);
    toast('QR hører til '+(other?other.name:'en anden kunde')+' — åbn dette eftersyn for at se reolkortet');
    return;
  }
  if(state.view==='workScreen' && state.workForm){
    // Aktiv registrering: ingen popup — reol, hal, zone, producent og belastningsskilt autoudfyldes direkte
    state.workForm.reolId = reolId;
    state.workForm.locationMode = 'reolid';
    closeGenericModal();
    const r = insp.reoler.find(x=>x.id===reolId);
    render();
    toast(`Scannet: ${reolId}${r?' · '+(r.hal||r.zone||'')+' · '+(r.producer||''):''}`);
    return;
  }
  closeGenericModal();
  toast(`${cust?cust.name:''} → Hal ${insp.reoler.find(r=>r.id===reolId)?.zone||'?'} → Reol ${reolId}`);
  showReolCard(reolId);
}
function openScanQR(){
  const insp = getInspection(state.currentInspectionId);
  if(!insp.reoler.length){ toast('Ingen reoler registreret endnu'); return; }
  const cust = DB.customers.find(c=>c.id===insp.customerId);
  const overlay = document.createElement('div');
  overlay.className='modal-overlay'; overlay.id='genericModalOverlay';
  overlay.onclick=(e)=>{ if(e.target===overlay) closeGenericModal(); };
  overlay.innerHTML = `
    <div class="modal" style="max-width:380px">
      <button class="modal-close" onclick="closeGenericModal()">✕</button>
      <h2>📷 Scan QR</h2>
      <p style="font-size:13px;color:var(--grey-mid)">Indtast/scan QR-koden (fx <span class="mono">QR-${esc(cust?cust.code:'')}-${esc(insp.reoler[0].id)}</span>) — eller vælg en reol direkte.</p>
      <div class="field full" style="margin-bottom:14px">
        <input id="qrScanInput" placeholder="QR-${esc(cust?cust.code:'XX')}-..." class="mono">
      </div>
      <div class="btn-row" style="margin-top:0;margin-bottom:16px">
        <button class="btn btn-primary btn-block" onclick="handleQRScan(val('qrScanInput'))">Åbn reolkort</button>
      </div>
      <div class="pin-actions">
        ${insp.reoler.map(r=>`<button class="btn btn-ghost btn-block" onclick="closeGenericModal();showReolCard('${esc(r.id)}')">${esc(r.id)} — ${esc(r.location)} <span class="mono" style="margin-left:auto;color:var(--grey-mid);font-size:11px">QR-${esc(cust?cust.code:'')}-${esc(r.id)}</span></button>`).join('')}
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

    ${insp.reoler.length? `

      <tbody>${rowsHtml}</tbody>
    </table>` : emptyState('🗄️','Ingen reoler registreret endnu','Tilføj reoler nedenfor — fx A1, A2, A3, B1, B2, B3.')}

    <h2 style="margin-top:24px"><span class="num">+</span> ${state.editingReolIndex!==null && state.editingReolIndex!==undefined ? 'Ret reol' : 'Tilføj reol'}</h2>
    <div class="formgrid">
      <div class="field"><label>Reol-ID</label><input id="r_id" placeholder="fx C1" value="${esc(state.reolForm?.id||'')}"></div>

      <div class="field"><label>Reoltype</label>
        <select id="r_type">${DB.config.reolTypes.map(t=>`<option ${state.reolForm?.type===t?'selected':''}>${t}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Producent</label><input id="r_producer" placeholder="fx Constructor" value="${esc(state.reolForm?.producer||'')}" list="supplierList"></div>
      <div class="field"><label>Belastningsskilt</label>
        <select id="r_loadsign"><option value="ja" ${state.reolForm?.loadSign==='ja'?'selected':''}>Ja</option><option value="nej" ${state.reolForm?.loadSign==='nej'?'selected':''}>Nej</option></select>
      </div>
      <div class="field full"><label>Bemærkninger</label><input id="r_notes" placeholder="Valgfrit" value="${esc(state.reolForm?.notes||'')}"></div>

    <div class="btn-row">

      ${state.editingReolIndex!==null && state.editingReolIndex!==undefined ? `<button class="btn btn-ghost" onclick="cancelEditReol()">Annuller</button>`:''}
      <button class="btn btn-primary" onclick="setWizardTab('skader')" ${insp.reoler.length?'':'disabled'}>Næste: Skader →</button>
    </div>

}
function saveReol(){
  const id = val('r_id').trim();
  if(!id){ toast('Indtast Reol-ID'); return; }
  const insp = getInspection(state.currentInspectionId);
  const editing = (state.editingReolIndex!==null && state.editingReolIndex!==undefined);
  const dup = insp.reoler.find((r,idx)=>r.id.toLowerCase()===id.toLowerCase() && idx!==state.editingReolIndex);
  if(dup){ toast('Reol-ID findes allerede'); return; }
  const data = {
    id, zone: val('r_zone'), hal: val('r_hal'), reolraekke: val('r_reolraekke'), location: val('r_location'), type: val('r_type'),
    producer: val('r_producer'), loadSign: val('r_loadsign'), notes: val('r_notes')
  };
  if(editing){
    const oldId = insp.reoler[state.editingReolIndex].id;
    insp.reoler[state.editingReolIndex] = data;
    if(oldId!==id){
      insp.skader.forEach(s=>{ if(s.reolId===oldId) s.reolId=id; });
      (insp.reolPins||[]).forEach(p=>{ if(p.name===oldId) p.name=id; });
    }
    toast('Reol '+id+' opdateret');
  }else{
    insp.reoler.push(data);
    toast('Reol '+id+' tilføjet');
  }
  saveDB(DB);
  state.editingReolIndex=null;
  state.reolForm=null;
  render();
}
function editReol(i){
  const insp = getInspection(state.currentInspectionId);
  state.editingReolIndex = i;
  state.reolForm = {...insp.reoler[i]};
  render();
}
function cancelEditReol(){
  state.editingReolIndex=null;
  state.reolForm=null;
  render();
}
function removeReol(i){
  const insp = getInspection(state.currentInspectionId);
  insp.reoler.splice(i,1);
  saveDB(DB); render();
}

/* ---- Skader tab ---- */
function wizardSkader(insp){
  const counts = {green:0,yellow:0,red:0};
  insp.skader.forEach(s=>counts[s.classification]++);
  return `
  <div class="panel">
    <h2><span class="num">4</span> Skader (${insp.skader.length})</h2>
    <div class="btn-row" style="margin-top:0;margin-bottom:18px">
      <span class="pill green">Grøn ${counts.green}</span>
      <span class="pill yellow">Gul ${counts.yellow}</span>
      <span class="pill red">Rød ${counts.red}</span>
    </div>
    ${insp.skader.length? renderGroupedSkadeCards(insp) : emptyState('📷','Ingen skader registreret','Tryk "Ny skade" for at registrere første skade.')}
    <div class="btn-row">
      <button class="btn btn-green btn-lg" onclick="startWorkScreen()">📷 Ny skade</button>
      <button class="btn btn-primary" onclick="setWizardTab('underskrift')">Næste: Underskrift →</button>
    </div>
  </div>`;
}
// Grupperer interne skade-rækker (én pr. afkrydset type) tilbage til én visuel registrering pr. groupId
function renderGroupedSkadeCards(insp){
  const seen = new Set();
  const groups = [];
  insp.skader.forEach(s=>{
    const gid = s.groupId || s.id;
    if(seen.has(gid)) return;
    seen.add(gid);
    groups.push(insp.skader.filter(x=>(x.groupId||x.id)===gid));
  });
  return groups.map(group=>renderDmgCard(group, insp)).join('');
}
function renderDmgCard(group, insp){
  // group: array of internal skade-rækker der deler samme groupId (én registrering, flere afkrydsede typer)
  const arr = Array.isArray(group) ? group : [group];
  const first = arr[0];
  const cls = first.classification;
  const labels = {green:'Grøn',yellow:'Gul',red:'Rød'};
  const overdue = first.deadline && first.status!=='Lukket' && first.deadline < todayISO();
  const typeNames = arr.map(s=>s.defectType).join(', ');
  const ids = arr.map(s=>s.id).join(',');
  return `
  <div class="dmg-card ${cls}">
    <div class="thumb">${first.photos&&first.photos[0]?`<img src="${first.photos[0]}">`:'📷'}</div>
    <div class="body">
      <div class="top">
        <div>
          <h4>${esc(typeNames)} <span class="tag-id" style="background:var(--grey);color:var(--ink);font-weight:700">${esc(first.reolId)}</span></h4>
          <div class="meta">${esc(first.location||'')} · ${fmtDate(first.date)}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <span class="pill ${cls}">${labels[cls]}</span>
          <span class="pill grey">${esc(first.status)}</span>
          ${overdue?'<span class="pill red">Deadline overskredet</span>':''}
        </div>
      </div>
      ${first.desc?`<div class="desc">${esc(first.desc)}</div>`:''}
      ${first.kommentar?`<div class="meta" style="margin-top:4px">Handling: <strong>${esc(first.kommentar)}</strong></div>`:''}
      <div class="meta" style="margin-top:6px">
        ${first.ansvarlig?`Ansvarlig: <strong>${esc(first.ansvarlig)}</strong>`:''}
        ${first.deadline?` · Deadline: <strong>${fmtDate(first.deadline)}</strong>`:''}
        ${first.udfortDato?` · Udført: <strong>${fmtDate(first.udfortDato)}</strong>`:''}
      </div>
      ${first.photos&&first.photos.length>1?`<div class="photo-grid" style="margin-top:8px">${first.photos.slice(1).map(p=>`<div class="photo-thumb"><img src="${p}"></div>`).join('')}</div>`:''}
      ${first.photosAfter&&first.photosAfter.length?`<div class="meta" style="margin-top:6px;font-weight:700">Efter reparation:</div><div class="photo-grid" style="margin-top:4px">${first.photosAfter.map(p=>`<div class="photo-thumb"><img src="${p}"></div>`).join('')}</div>`:''}
      ${first.voiceNote?renderVoiceNoteSummary(first.voiceNote,false):''}
      <div class="btn-row" style="margin-top:10px">
        <button class="btn btn-danger" style="padding:8px 14px;font-size:13px" onclick="removeSkadeGroup('${ids}')">Fjern</button>
      </div>
    </div>
  </div>`;
}
function removeSkadeGroup(idsStr){
  const ids = idsStr.split(',');
  const insp = getInspection(state.currentInspectionId);
  insp.skader = insp.skader.filter(s=>!ids.includes(s.id));
  saveDB(DB); render();
}
function removeSkade(id){
  const insp = getInspection(state.currentInspectionId);
  insp.skader = insp.skader.filter(s=>s.id!==id);
  saveDB(DB); render();
}

/* =========================================================
   NY SKADE — ét kontinuerligt arbejdsskærm. Ingen popups, ingen dialoger.
   Foto → Placering → Afkryds → Prioritet → Handling → Tale/Skrift → Gem & Næste.
========================================================= */
function startWorkScreen(prefillReolId){
  const insp = getInspection(state.currentInspectionId);
  state.workForm = {
    photos: [],
    locationMode: prefillReolId ? 'reolid' : 'reolid',
    reolId: prefillReolId || '',
    manualLocation: '',
    types: {}, // key -> true
    classification: null,
    actions: {}, // key -> true
    desc: '',
    voiceNote: null
  };
  voiceState='idle';
  state.voiceTranscript=''; state.voiceAudioData=null; state.voiceSuggestion=null;
  state.view='workScreen';
  render();
}

function renderWorkScreen(){
  const insp = getInspection(state.currentInspectionId);
  const f = state.workForm;
  if(!insp || !f) return emptyState('⚠️','Ingen aktiv registrering','Gå tilbage og start et eftersyn.');

  const cust = DB.customers.find(c=>c.id===insp.customerId);
  const currentReol = insp.reoler.find(r=>r.id===f.reolId);
  const hasPhoto = f.photos.length>0;
  const hasLocation = !!(f.reolId || (f.locationMode==='manual' && f.manualLocation.trim()));
  const hasType = Object.values(f.types).some(Boolean);
  const hasPriority = !!f.classification;
  const hasAction = Object.values(f.actions).some(Boolean);

  let html = `<div class="work-screen">`;

  html += `
    <div class="offline-pill" id="offlinePill">${navigator.onLine===false ? '🟢 Offline klar' : '🌐 Synkroniseret'}</div>
  `;

  if(f.reolId || f.manualLocation){
    html += `
    <div class="reol-context-bar">
      <div class="rcb-main">
        <span class="rcb-reol">${f.reolId ? esc(f.reolId) : esc(f.manualLocation)}</span>
        <span class="rcb-loc">${currentReol ? esc(currentReol.hal||currentReol.zone||'') + (currentReol.location?' · '+esc(currentReol.location):'') : esc(cust?cust.name:'')}</span>
      </div>
      ${currentReol?`<span class="rcb-qr">QR-${esc(cust?cust.code:'')}-${esc(currentReol.id)}</span>`:''}
    </div>`;
  }

  // ---- STEP 1: Foto ----
  if(hasPhoto){
    html += `
    <div class="step-done" onclick="workJumpToStep('photo')">
      <span class="step-done-check">✓</span>
      <div class="photo-grid" style="flex:1;margin:0">
        ${f.photos.slice(0,4).map(p=>`<div class="photo-thumb" style="width:44px;height:44px"><img src="${p}"></div>`).join('')}
        ${f.photos.length>4?`<div class="meta">+${f.photos.length-4}</div>`:''}
      </div>
    </div>`;
  }else{
    html += `
    <div class="work-step active-step" id="step-photo">
      <div class="big-step-label">📷 Tag billede</div>
      <div class="photo-grid">
        ${f.photos.map((p,i)=>`<div class="photo-thumb" style="width:104px;height:104px"><img src="${p}"><button class="rm" onclick="event.stopPropagation();workRemovePhoto(${i})">✕</button></div>`).join('')}
        <label class="photo-add" style="width:104px;height:104px">
          <span class="plus">＋</span>Tag billede
          <input type="file" accept="image/*" capture="environment" multiple style="display:none" onchange="workAddPhoto(event)">
        </label>
      </div>
    </div>`;
    html += `</div>`;
    return html;
  }

  // ---- STEP 2: Placering (skippes automatisk hvis QR allerede har identificeret reolen) ----
  if(hasLocation){
    html += `
    <div class="step-done" onclick="workJumpToStep('location')">
      <span class="step-done-check">✓</span>
      <div style="flex:1"><strong>${f.reolId?esc(f.reolId):esc(f.manualLocation)}</strong></div>
    </div>`;
  }else{
    html += `
    <div class="work-step active-step" id="step-location">
      <div class="big-step-label">📍 Placering</div>
      <div class="location-tabs">
        <div class="location-tab ${f.locationMode==='qr'?'active':''}" onclick="workSetLocationMode('qr')">QR-kode</div>
        <div class="location-tab ${f.locationMode==='reolid'?'active':''}" onclick="workSetLocationMode('reolid')">Reol-ID</div>
        <div class="location-tab ${f.locationMode==='manual'?'active':''}" onclick="workSetLocationMode('manual')">Manuel</div>
      </div>
      ${f.locationMode==='qr' ? `
        <button class="btn btn-primary btn-block huge-btn" onclick="workScanQR()">📷 Scan QR-kode</button>
      ` : f.locationMode==='reolid' ? `
        <select id="work_reolId" onchange="workSetReolId(this.value)" class="big-select">
          <option value="">Vælg reol...</option>
          ${insp.reoler.map(r=>`<option value="${esc(r.id)}">${esc(r.id)} — ${esc(r.location||r.hal||'')}</option>`).join('')}
        </select>
      ` : `
        <input id="work_manualLoc" oninput="workSetField('manualLocation', this.value)" placeholder="Skriv placering, fx Hal A, gang 3" class="big-input" onblur="render()">
      `}
    </div>`;
    html += `</div>`;
    return html;
  }

  if(hasLocation && f.reolId){
    const histPanel = renderReolHistoryInline(insp, f.reolId);
    if(histPanel) html += histPanel;
  }

  // ---- STEP 3: Skadetyper ----
  if(hasType){
    const checked = SKADE_TYPES.filter(t=>f.types[t.key]);
    html += `
    <div class="step-done" onclick="workJumpToStep('types')">
      <span class="step-done-check">✓</span>
      <div style="flex:1">${checked.map(t=>esc(t.label)).join(', ')}</div>
    </div>`;
  }else{
    html += `
    <div class="work-step active-step" id="step-types">
      <div class="big-step-label">✅ Skadetype</div>
      <div class="check-grid">
        ${SKADE_TYPES.map(t=>`
          <div class="check-tile ${f.types[t.key]?'checked':''}" onclick="workToggleType('${t.key}')">
            <div class="box">${f.types[t.key]?'✓':''}</div>${esc(t.label)}
          </div>`).join('')}
      </div>
    </div>`;
    html += `</div>`;
    return html;
  }

  // ---- STEP 4: Prioritet (forudvalgt, ingen "AI foreslår"-tekst) ----
  html += `
    <div class="work-step active-step" id="step-priority">
      <div class="big-step-label">🚦 Prioritet</div>
      <div class="priority-grid">
        <div class="priority-tile green ${f.classification==='green'?'sel':''}" onclick="workSetClassification('green')"><div class="dot"></div>Lav</div>
        <div class="priority-tile yellow ${f.classification==='yellow'?'sel':''}" onclick="workSetClassification('yellow')"><div class="dot"></div>Middel</div>
        <div class="priority-tile red ${f.classification==='red'?'sel':''}" onclick="workSetClassification('red')"><div class="dot"></div>Høj</div>
      </div>
    </div>`;

  // ---- STEP 5: Handling (forudvalgt) ----
  html += `
    <div class="work-step active-step" id="step-action">
      <div class="big-step-label">🔧 Handling</div>
      <div class="check-grid">
        ${SKADE_ACTIONS.map(a=>`
          <div class="check-tile ${f.actions[a.key]?'checked':''}" onclick="workToggleAction('${a.key}')">
            <div class="box">${f.actions[a.key]?'✓':''}</div>${esc(a.label)}
          </div>`).join('')}
      </div>
    </div>`;

  // ---- STEP 6+7: Tale / Skrift (valgfri, vises altid kompakt når vi når hertil) ----
  html += `
    <div class="work-step">
      <div class="big-step-label-sm">🎤 Tale <span class="optional-tag">valgfri</span></div>
      <button class="btn btn-ghost btn-block" style="padding:14px" onclick="toggleVoiceNote()">🎤 Indtal kommentar</button>
      <div id="voiceNoteArea"></div>
      ${f.voiceNote ? renderVoiceNoteSummary(f.voiceNote, true) : ''}
    </div>
    <div class="work-step">
      <div class="big-step-label-sm">✏️ Skrift <span class="optional-tag">valgfri</span></div>
      <textarea id="work_desc" oninput="workSetField('desc', this.value)" placeholder="Skriv kommentar (valgfri)..." class="big-input" style="min-height:56px"></textarea>
    </div>`;

  html += `
    <div class="gemnaeste-bar">
      <button class="btn btn-green huge-btn" onclick="saveAndNext()">💾 Gem &amp; Næste</button>
      <div class="btn-row" style="margin-top:10px;justify-content:center">
        <button class="btn btn-ghost" onclick="cancelWorkScreen()">Annuller</button>
        <button class="btn btn-ghost" onclick="finishFromWorkScreen()">✓ Afslut eftersyn</button>
      </div>
    </div>
  </div>`;
  return html;
}
function workJumpToStep(stepKey){
  // Tillader at gå tilbage og rette et tidligere trin, uden at miste resten af registreringen
  const f = state.workForm;
  if(stepKey==='photo'){ /* fotos kan altid tilføjes/fjernes, ingen reset nødvendig */ }
  if(stepKey==='location'){ f.reolId=''; f.manualLocation=''; }
  if(stepKey==='types'){ /* lad brugeren justere afkrydsning direkte, ingen reset */ state.forceShowTypes=true; }
  render();
  setTimeout(()=>{ const el = document.getElementById('step-'+stepKey); if(el && el.scrollIntoView) el.scrollIntoView({behavior:'smooth',block:'start'}); }, 50);
}

function workAddPhoto(e){
  const files = Array.from(e.target.files);
  let remaining = files.length;
  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = ev=>{
      state.workForm.photos.push(ev.target.result);
      remaining--;
      if(remaining<=0){ render(); scrollToActiveStep(); }
    };
    reader.readAsDataURL(file);
  });
}
function scrollToActiveStep(){
  setTimeout(()=>{
    const el = document.querySelector('.active-step');
    if(el && el.scrollIntoView) el.scrollIntoView({behavior:'smooth',block:'start'});
  }, 80);
}
function workRemovePhoto(i){ state.workForm.photos.splice(i,1); render(); }
function workSetLocationMode(mode){ state.workForm.locationMode = mode; render(); }
function workSetField(field, value){ state.workForm[field] = value; }
function workSetReolId(reolId){
  state.workForm.reolId = reolId;
  render();
  scrollToActiveStep();
}
function renderReolHistoryInline(insp, reolId){
  const allHistory = DB.inspections
    .filter(i=>i.customerId===insp.customerId)
    .flatMap(i=>i.skader.filter(s=>s.reolId===reolId).map(s=>({...s, inspDate:i.date})))
    .sort((a,b)=>b.inspDate.localeCompare(a.inspDate));
  if(!allHistory.length) return '';
  const history = allHistory.slice(0,3);
  return `
  <div class="work-step">
    <div class="big-step-label-sm">📚 Tidligere på denne reol</div>

function workAISuggest(){
  const f = state.workForm;
  const checked = SKADE_TYPES.filter(t=>f.types[t.key]);
  if(!checked.length) return;
  // Prioritet: kritiske typer -> Høj (rød), sikkerhedsudstyr -> Middel (gul), kosmetisk -> Lav (grøn) — kun forslag, ændrer ikke et allerede sat valg
  if(!f.classification){
    const highTypes = ['stolpe','bjaelke','diagonal','paakorsel','revne','overbelastning','deformation','skaevopstilling','gavl','afstiver'];
    const mediumTypes = ['vange','fodplade','ankerbolt','sikringssplit','belastningsskilt','beskyttelsesvaern'];
    if(checked.some(t=>highTypes.includes(t.key))) f.classification='red';
    else if(checked.some(t=>mediumTypes.includes(t.key))) f.classification='yellow';
    else f.classification='green';
  }
  // Handling: foreslå standardhandling pr. type, men rør ikke allerede afkrydsede
  const suggestAction = {
    stolpe:'reparer', vange:'reparer', bjaelke:'reparer', diagonal:'reparer', fodplade:'reparer',
    ankerbolt:'efterspaend', sikringssplit:'sikringssplit', belastningsskilt:'belastningsskilt',
    beskyttelsesvaern:'reparer', paakorsel:'afspaer', korrosion:'overvaag', revne:'nykontrol',
    deformation:'udskift', overbelastning:'stopbrug', skaevopstilling:'nykontrol',
    gavl:'reparer', afstiver:'kontaktleverandor', andet:'nykontrol'
  };
  const hasAnyAction = Object.values(f.actions).some(Boolean);
  if(!hasAnyAction){
    checked.forEach(t=>{ const a = suggestAction[t.key]; if(a) f.actions[a]=true; });
  }
}

let voiceRecognition = null;
let voiceMediaRecorder = null;
let voiceAudioChunks = [];
let voiceState = 'idle'; // idle | recording | review

function toggleVoiceNote(){
  const area = document.getElementById('voiceNoteArea');
  if(!area) return;
  if(voiceState==='idle'){
    startVoiceRecording();
  }else{
    cancelVoiceNote();
  }
}

function startVoiceRecording(){
  voiceState='recording';
  state.voiceTranscript='';
  state.voiceAudioData=null;
  renderVoiceArea();

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(SpeechRecognition){
    voiceRecognition = new SpeechRecognition();
    voiceRecognition.lang = 'da-DK';
    voiceRecognition.continuous = true;
    voiceRecognition.interimResults = true;
    voiceRecognition.onresult = (e)=>{
      let transcript='';
      for(let i=0;i<e.results.length;i++){ transcript += e.results[i][0].transcript; }
      state.voiceTranscript = transcript;
    };
    voiceRecognition.onerror = ()=>{ toast('Talegenkendelse ikke tilgængelig — indtast kommentaren manuelt'); };
    try{ voiceRecognition.start(); }catch(e){}
  }else{
    toast('Talegenkendelse er ikke understøttet i denne browser — indtast kommentaren manuelt');
  }

  if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia){
    navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
      voiceAudioChunks=[];
      voiceMediaRecorder = new MediaRecorder(stream);
      voiceMediaRecorder.ondataavailable = e=>voiceAudioChunks.push(e.data);
      voiceMediaRecorder.onstop = ()=>{
        const blob = new Blob(voiceAudioChunks, {type:'audio/webm'});
        const reader = new FileReader();
        reader.onload = ()=>{ state.voiceAudioData = reader.result; };
        reader.readAsDataURL(blob);
        stream.getTracks().forEach(t=>t.stop());
      };
      voiceMediaRecorder.start();
    }).catch(()=>{});
  }
}

function stopVoiceRecording(){
  if(voiceRecognition){ try{ voiceRecognition.stop(); }catch(e){} }
  if(voiceMediaRecorder && voiceMediaRecorder.state==='recording'){ voiceMediaRecorder.stop(); }
  voiceState='review';
  setTimeout(renderVoiceArea, 250); // allow final transcript/audio to settle
}

function cancelVoiceNote(){
  if(voiceRecognition){ try{ voiceRecognition.stop(); }catch(e){} }
  if(voiceMediaRecorder && voiceMediaRecorder.state==='recording'){ voiceMediaRecorder.stop(); }
  voiceState='idle';
  state.voiceTranscript=''; state.voiceAudioData=null; state.voiceSuggestion=null;
  renderVoiceArea();
}

function renderVoiceArea(){
  const area = document.getElementById('voiceNoteArea');
  if(!area) return;
  if(voiceState==='recording'){
    area.innerHTML = `
    <div class="voicebox">
      <div class="voice-recording"><span class="dot"></span> Optager…</div>
      <div class="btn-row" style="margin-top:10px">

        <button class="btn btn-ghost" style="padding:9px 16px;font-size:13px" onclick="cancelVoiceNote()">Annuller</button>

  }else if(voiceState==='review'){

    area.innerHTML = `

// AI-fortolkning: udtrækker Lokation (reol-ID), Skadetype, Beskrivelse, Prioritet og Anbefaling fra tale.
// Brugeren skal altid aktivt godkende eller redigere forslagene før Gem — intet gemmes automatisk.
const VOICE_DEFECT_MAP = [
  {kw:['sikringstap','sikringssplit','split'], type:'Manglende sikringstap'},
  {kw:['ankerbolt','anker'], type:'Manglende ankerbolt'},
  {kw:['fodplade'], type:'Beskadiget fodplade'},
  {kw:['skæv diagonal','diagonal'], type:'Skæv diagonal'},
  {kw:['korrosion','rust'], type:'Korrosion'},
  {kw:['påkørselsskade','påkørt stolpe','stolpe er påkørt','stolpe påkørt','påkørsel','påkørt'], type:'Påkørselsskade'},
  {kw:['deformeret','deformation','bulet','bøjet'], type:'Deformation'},
  {kw:['belastningsskilt','skilt'], type:'Manglende belastningsskilt'},
  {kw:['værn','rækværk','påkørselsværn'], type:'Manglende værn'},
  {kw:['revne','revnet'], type:'Revne'},
  {kw:['overbelastning','overbelastet'], type:'Overbelastning'},
  {kw:['stolpe'], type:'Beskadiget stolpe'},
  {kw:['vange'], type:'Beskadiget vange'}
];
function voiceExtractLocation(text){
  // matcher fx "reol a14", "a14", "reol-id a14", "på reol b3"
  const m = text.match(/reol\s*-?\s*([a-zæøå]{1,3}\s?-?\s?\d{1,4})/i) || text.match(/\b([a-zæøå]{1}\d{1,4})\b/i);
  if(!m) return null;
  return m[1].replace(/\s+/g,'').toUpperCase();
}
function voiceExtractDefectType(text){
  for(const entry of VOICE_DEFECT_MAP){
    for(const kw of entry.kw){
      if(text.includes(kw) && DB.config.defectTypes.includes(entry.type)) return entry.type;
    }
  }
  return null;
}
function voiceExtractClassification(text){
  if(text.match(/\brød\b|rød skade|kritisk|akut|straks|farlig|øjeblikkelig/)) return 'red';
  if(text.match(/\bgul\b|gul skade|udskift|reparer|bør|skal udbedres|inden \d+ dage|snarest/)) return 'yellow';
  if(text.match(/\bgrøn\b|grøn skade|ok|fint|ingen problem|kosmetisk/)) return 'green';
  return null;
}
function voiceExtractRecommendation(text, defectType){
  const dayMatch = text.match(/inden\s+(\d+)\s*dage/);
  if(dayMatch) return `Udbedring/udskiftning anbefales inden ${dayMatch[1]} dage.`;
  const standardRec = {
    'Manglende sikringstap':'Montering af ny sikringstap anbefales.',
    'Manglende ankerbolt':'Montering af ny ankerbolt anbefales.',
    'Manglende belastningsskilt':'Opsætning af nyt belastningsskilt anbefales.',
    'Manglende værn':'Montering af nyt værn anbefales.'
  };
  if(text.match(/udskift/)) return standardRec[defectType] || 'Udskiftning anbefales.';
  if(text.match(/monter/)) return 'Montering anbefales.';
  if(text.match(/reparer/)) return 'Reparation anbefales.';
  if(defectType && standardRec[defectType]) return standardRec[defectType];
  if(defectType==='Korrosion') return 'Afrensning og overfladebehandling anbefales.';
  if(defectType==='Revne') return 'Nærmere undersøgelse og evt. udskiftning anbefales.';
  if(defectType==='Overbelastning') return 'Aflastning og kontrol af belastningsgrænser anbefales.';
  if(defectType && (defectType.startsWith('Beskadiget')||defectType==='Deformation'||defectType==='Påkørselsskade'||defectType==='Skæv diagonal')) return 'Reparation eller udskiftning anbefales.';
  return null;
}
