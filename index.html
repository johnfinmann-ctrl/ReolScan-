function applyVoiceSuggestion(){
  const sug = state.voiceSuggestion;
  if(!sug) return;
  const f = state.workForm;
  if(f){
    if(sug.location){
      const insp = getInspection(state.currentInspectionId);
      const match = insp.reoler.find(r=>r.id.toUpperCase()===sug.location.toUpperCase());
      if(match){ f.locationMode='reolid'; f.reolId=match.id; }
      else { f.locationMode='manual'; f.manualLocation='Reol '+sug.location; }
    }
    if(sug.defectType){
      const typeDef = SKADE_TYPES.find(t=>t.type===sug.defectType);
      if(typeDef) f.types[typeDef.key]=true;
    }
    if(sug.description && !f.desc.trim()){ f.desc = sug.description; }
    if(sug.classification){ f.classification = sug.classification; }
    if(sug.action){ f.desc = (f.desc? f.desc+' ' : '') + sug.action; }
    toast('AI-forslag indsat — kontrollér før du gemmer');
    render();
    return;
  }
  if(sug.location){
    const reolSel = document.getElementById('m_reolId');
    if(reolSel){
      const insp = getInspection(state.currentInspectionId);
      const match = insp.reoler.find(r=>r.id.toUpperCase()===sug.location.toUpperCase());
      if(match){ reolSel.value = match.id; }
    }
    const locInput = document.getElementById('m_location');
    if(locInput && !locInput.value){ locInput.value = 'Reol '+sug.location; }
  }
  if(sug.defectType){
    const sel = document.getElementById('m_defectType');
    if(sel) sel.value = sug.defectType;
  }
  if(sug.description){
    const desc = document.getElementById('m_desc');
    if(desc && !desc.value.trim()){ desc.value = sug.description; }
  }
  if(sug.classification){ selectClass(sug.classification); }
  if(sug.action){
    const kom = document.getElementById('m_kommentar');
    if(kom){ kom.value = (kom.value? kom.value+' ' : '') + sug.action; }
  }
  document.getElementById('voiceSuggestionArea').innerHTML = `<p style="font-size:12px;color:var(--green);font-weight:700;margin-top:8px">✓ Forslag godkendt og indsat i formularen — kontrollér felterne og tryk Gem.</p>`;

}

let sigPads = {};
function setupSigPad(canvasId, existingDataUrl){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ratio = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth*ratio;
  canvas.height = canvas.offsetHeight*ratio;
  const ctx = canvas.getContext('2d');
  ctx.scale(ratio,ratio);
  ctx.strokeStyle = '#0E2A45';
  ctx.lineWidth = 2.5;
  ctx.lineCap='round';
  let drawing=false, last=null;
  function pos(e){
    const r = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return {x:t.clientX-r.left, y:t.clientY-r.top};
  }
  function start(e){ drawing=true; last=pos(e); e.preventDefault(); }
  function move(e){
    if(!drawing) return;
    const p = pos(e);
    ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke();
    last=p; e.preventDefault();
  }
  function end(){ drawing=false; }
  canvas.addEventListener('mousedown',start);
  canvas.addEventListener('mousemove',move);
  canvas.addEventListener('mouseup',end);
  canvas.addEventListener('mouseleave',end);
  canvas.addEventListener('touchstart',start,{passive:false});
  canvas.addEventListener('touchmove',move,{passive:false});
  canvas.addEventListener('touchend',end);
  sigPads[canvasId]=canvas;
  if(existingDataUrl){
    const img = new Image();
    img.onload=()=>ctx.drawImage(img,0,0,canvas.offsetWidth,canvas.offsetHeight);
    img.src=existingDataUrl;
  }
}

  next.setMonth(next.getMonth()+12);
  insp.nextInspection = next.toISOString().slice(0,10);
  insp.status='closed';
  if(!insp.vurdering){
    const counts={green:0,yellow:0,red:0}; insp.skader.forEach(s=>{ if(s.status!=='Lukket') counts[s.classification]++; });

    body,
    date: todayISO(),

}

/* =========================================================
   CUSTOMER ARCHIVE (basic, functional)
========================================================= */
function renderCustomerArchive(){
  const today = todayISO();
  return `
  <div class="panel">
    <h2>Kundearkiv (${DB.customers.length})</h2>
    <p style="font-size:13px;color:var(--grey-mid);margin-top:-6px">Status: <span class="status-badge ok" style="padding:2px 9px">OK</span> ingen åbne kritiske skader og eftersyn ikke overskredet · <span class="status-badge followup" style="padding:2px 9px">Kræver opfølgning</span> åbne røde/gule skader · <span class="status-badge overdue" style="padding:2px 9px">Eftersyn overskredet</span> næste eftersyn er passeret.</p>
  </div>
  <div class="cust-grid">
  ${DB.customers.map(c=>{
    const insps = DB.inspections.filter(i=>i.customerId===c.id);
    const closedInsps = insps.filter(i=>i.status==='closed').sort((a,b)=>b.date.localeCompare(a.date));
    const last = closedInsps[0];
    const next = last ? last.nextInspection : null;
    const allSkader = insps.flatMap(i=>i.skader);
    const openSkader = allSkader.filter(s=>s.status!=='Lukket');
    const critical = openSkader.filter(s=>s.classification==='red');

    let status, statusClass;
    if(!last){ status='Intet eftersyn endnu'; statusClass='none'; }
    else if(next && next < today){ status='Eftersyn overskredet'; statusClass='overdue'; }
    else if(critical.length>0){ status='Kræver opfølgning'; statusClass='followup'; }
    else if(openSkader.length>0){ status='Kræver opfølgning'; statusClass='followup'; }
    else{ status='OK'; statusClass='ok'; }

    return `
    <div class="cust-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap">
        <div>
          <h3>${esc(c.name)}</h3>
          <div class="addr">${esc(c.address||'Ingen adresse')}</div>
        </div>
        <span class="status-badge ${statusClass}">${status}</span>
        ${last && last.vurdering ? `<span class="pill ${last.vurdering}" style="font-size:11px">${VURDERING_META[last.vurdering].emoji} ${VURDERING_META[last.vurdering].label}</span>`:''}
      </div>
      <div class="kv">
        <div><b>CVR</b>${esc(c.cvr||'—')}</div>
        <div><b>Kontaktperson</b>${esc(c.contact||'—')}</div>
        <div><b>Fast eftersyns-mail</b>${esc(c.email||'—')}</div>
        <div><b>Sidste eftersyn</b>${last?fmtDate(last.date):'—'}</div>
        <div><b>Næste eftersyn</b>${next?fmtDate(next):'—'}</div>
        <div><b>Åbne / kritiske skader</b>${openSkader.length} / <span style="color:${critical.length?'var(--red)':'inherit'};font-weight:700">${critical.length}</span></div>
      </div>
      ${(()=>{
        if(closedInsps.length<1) return '';
        const byYear = closedInsps.slice().sort((a,b)=>a.date.localeCompare(b.date));
        const rows = byYear.map((i,idx)=>{
          const sk=i.skader; const crit=sk.filter(s=>s.classification==='red').length;
          const openN=sk.filter(s=>s.status!=='Lukket').length; const closedN=sk.length-openN;
          const prev = idx>0? byYear[idx-1].skader.length : null;
          const change = prev!==null && prev>0 ? Math.round((sk.length-prev)/prev*100) : null;
          return {year:i.date.slice(0,4), total:sk.length, crit, openN, closedN, change};
        });
        return `
        <div style="font-size:12px;font-weight:700;color:var(--grey-mid);text-transform:uppercase;letter-spacing:.08em;margin-top:10px;margin-bottom:6px">Benchmark mellem år</div>
        <table>
          <thead><tr><th>År</th><th>Fejl</th><th>Kritiske</th><th>Åbne</th><th>Lukkede</th><th>Udvikling</th></tr></thead>
          <tbody>
            ${rows.map(r=>`<tr>
              <td><strong>${r.year}</strong></td><td>${r.total}</td><td>${r.crit}</td><td>${r.openN}</td><td>${r.closedN}</td>
              <td>${r.change===null?'—':(r.change<=0?`<span class="pill green">↓ ${r.change}%</span>`:`<span class="pill red">↑ +${r.change}%</span>`)}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
      })()}
      ${closedInsps.length? `
      <div style="font-size:12px;font-weight:700;color:var(--grey-mid);text-transform:uppercase;letter-spacing:.08em;margin-top:10px;margin-bottom:6px">Tidligere rapporter</div>
      <div class="btn-row" style="margin-top:0">
        ${closedInsps.map(i=>`<button class="btn btn-ghost" style="padding:8px 12px;font-size:12px" onclick="generatePDF('${i.id}')">📄 ${esc(i.reportNumber)} · ${fmtDate(i.date)}</button>`).join('')}
      </div>` : `<p style="font-size:13px;color:var(--grey-mid);margin-top:10px">Ingen afsluttede eftersyn endnu.</p>`}

      <div style="font-size:12px;font-weight:700;color:var(--grey-mid);text-transform:uppercase;letter-spacing:.08em;margin-top:14px;margin-bottom:6px">
        Dokumentarkiv
        ${DOC_TYPES.map(dt=>{ const n=(c.documents||[]).filter(d=>d.type===dt.label).length; return n?`<span class="pill grey" style="font-size:10px;margin-left:4px">${dt.icon} ${n}</span>`:''; }).join('')}
        <span class="pill grey" style="font-size:10px;margin-left:4px">I alt ${(c.documents||[]).length}</span>
      </div>
      <input id="docsearch_${c.id}" placeholder="🔎 Søg i dokumenter (filnavn, type, uploadet af)..." oninput="filterCustomerDocs('${c.id}',this.value)" style="border:1.5px solid var(--grey-line);border-radius:10px;padding:9px 12px;font-size:13px;width:100%;margin-bottom:8px">
      <div id="docsList_${c.id}">${renderCustomerDocArchive(c)}</div>
      <div class="btn-row" style="margin-top:8px">
        ${DOC_TYPES.map(t=>`
          <label class="btn btn-ghost" style="padding:8px 12px;font-size:12px;cursor:pointer">
            ➕ ${t.icon} ${t.label}
            <input type="file" accept="application/pdf,image/*" style="display:none" onchange="uploadCustomerDoc('${c.id}','${t.label}',event)">
          </label>`).join('')}
      </div>
    </div>`;
  }).join('')}
  </div>`;
}
const DOC_TYPES = [
  {label:'Tegninger', icon:'🗺️'}, {label:'Belastningsskilte', icon:'🏷️'}, {label:'Certifikater', icon:'📜'},
  {label:'Montagevejledninger', icon:'🔧'}, {label:'Inspektionsrapporter', icon:'📋'}, {label:'Reparationsrapporter', icon:'🛠️'},
  {label:'Billeder', icon:'🖼️'}, {label:'Andet', icon:'📄'}
];
function renderCustomerDocArchive(c, filter){
  filter = (filter||'').toLowerCase();
  const docs = (c.documents||[]).filter(d=>
    !filter ||
    (d.name||'').toLowerCase().includes(filter) ||
    (d.type||'').toLowerCase().includes(filter) ||
    (d.uploadedBy||'').toLowerCase().includes(filter)
  );
  if(!(c.documents||[]).length) return `<p style="font-size:13px;color:var(--grey-mid);margin:0">Ingen dokumenter uploadet endnu.</p>`;
  if(!docs.length) return `<p style="font-size:13px;color:var(--grey-mid);margin:0">Ingen dokumenter matcher søgningen.</p>`;

  const byType = {};
  DOC_TYPES.forEach(t=>byType[t.label]=[]);
  docs.forEach(d=>{ const key = DOC_TYPES.find(t=>t.label===d.type)?.label||'Andet'; (byType[key]=byType[key]||[]).push(d); });

  return DOC_TYPES.map(dt=>{
    const group = byType[dt.label]||[];
    if(!group.length) return '';
    return `
    <div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:700;color:var(--grey-mid);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">${dt.icon} ${dt.label} <span class="pill grey" style="font-size:10px">${group.length}</span></div>
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="font-size:11px">
          <th style="text-align:left;padding:6px 8px;border-bottom:1px solid var(--grey-line);color:var(--grey-mid)">Filnavn</th>
          <th style="text-align:left;padding:6px 8px;border-bottom:1px solid var(--grey-line);color:var(--grey-mid)">Dato</th>
          <th style="text-align:left;padding:6px 8px;border-bottom:1px solid var(--grey-line);color:var(--grey-mid)">Uploadet af</th>
          <th style="padding:6px 8px;border-bottom:1px solid var(--grey-line)"></th>
        </tr></thead>
        <tbody>
          ${group.map(d=>`
          <tr style="font-size:13px">
            <td style="padding:8px 8px;border-bottom:1px solid var(--grey-line)">${dt.icon} ${esc(d.name)}</td>
            <td style="padding:8px 8px;border-bottom:1px solid var(--grey-line);color:var(--grey-mid)">${fmtDate(d.dateAdded||'')}</td>
            <td style="padding:8px 8px;border-bottom:1px solid var(--grey-line);color:var(--grey-mid)">${esc(d.uploadedBy||'—')}</td>
            <td style="padding:8px 8px;border-bottom:1px solid var(--grey-line);white-space:nowrap">
              <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px" onclick="viewCustomerDoc(${JSON.stringify(d).replace(/"/g,'&quot;')})">Åbn</button>
              <a class="btn btn-ghost" href="${d.data}" download="${esc(d.name)}" style="padding:5px 10px;font-size:12px;text-decoration:none;display:inline-flex;align-items:center">⬇️</a>
              <button class="icon-btn" onclick="removeCustomerDoc('${c.id}','${esc(d.id||String(c.documents.indexOf(d)))}')" title="Slet">✕</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  }).join('');
}
function renderCustomerDocButtons(c, filter){ return renderCustomerDocArchive(c, filter); }
function filterCustomerDocs(custId, term){
  const c = DB.customers.find(x=>x.id===custId);
  document.getElementById('docsList_'+custId).innerHTML = renderCustomerDocArchive(c, term);
}
function uploadCustomerDoc(custId, type, e){
  const file = e.target.files[0];
  if(!file) return;
  const insp = DB.inspections.filter(i=>i.customerId===custId && i.status==='open')[0];
  const inspector = insp ? insp.inspector : 'John Finmann';
  const reader = new FileReader();
  reader.onload = ev=>{
    const c = DB.customers.find(x=>x.id===custId);
    c.documents = c.documents || [];
    c.documents.push({
      id: uid('doc'),
      name: file.name,
      type,
      data: ev.target.result,
      dateAdded: todayISO(),
      uploadedBy: inspector,
      size: file.size
    });
    saveDB(DB); render();
    toast(type+' "'+file.name+'" uploadet');
  };
  reader.readAsDataURL(file);
}
function removeCustomerDoc(custId, docId){
  const c = DB.customers.find(x=>x.id===custId);
  const idx = c.documents.findIndex(d=>(d.id||'')===docId || c.documents.indexOf(d)===Number(docId));
  if(idx!==-1) c.documents.splice(idx,1);
  saveDB(DB); render();
}
function viewCustomerDoc(d){
  const overlay = document.createElement('div');
  overlay.className='modal-overlay'; overlay.id='genericModalOverlay';
  overlay.onclick=(e)=>{ if(e.target===overlay) closeGenericModal(); };
  const isPDF = d.data && (d.data.startsWith('data:application/pdf') || d.name.toLowerCase().endsWith('.pdf'));
  const isImage = d.data && d.data.startsWith('data:image');
  const preview = isPDF
    ? `<embed src="${d.data}" type="application/pdf" style="width:100%;height:420px;border-radius:8px">`
    : isImage
      ? `<img src="${d.data}" style="max-width:100%;border-radius:8px;border:1px solid var(--grey-line)">`
      : `<div class="empty" style="margin:20px 0"><span class="icon">📄</span><p>${esc(d.name)}</p></div>`;
  overlay.innerHTML = `
    <div class="modal" style="max-width:520px">
      <button class="modal-close" onclick="closeGenericModal()">✕</button>
      <h2 style="font-size:15px;text-transform:none;font-family:'Inter',sans-serif;font-weight:700">${esc(d.name)}</h2>
      ${preview}
      <div class="btn-row" style="margin-top:12px">
        <a class="btn btn-primary" href="${d.data}" download="${esc(d.name)}" style="text-decoration:none">⬇️ Download</a>
        <button class="btn btn-ghost" onclick="closeGenericModal()">Luk</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}
function viewCustomerDocImage(data){ viewCustomerDoc({data, name:'Billede'}); }

/* =========================================================

========================================================= */
function toggleHist(key){ state.histExpand[key] = !state.histExpand[key]; render(); }

function renderHistory(){
  const rows = DB.customers.map(c=>{
    const insps = DB.inspections.filter(i=>i.customerId===c.id && i.status==='closed').sort((a,b)=>b.date.localeCompare(a.date));
    if(!insps.length) return '';
    const years = [...new Set(insps.map(i=>i.date.slice(0,4)))].sort((a,b)=>b-a);
    const expC = !!state.histExpand[c.id];
    return `<div class="hist-customer">
      <div class="hist-row" onclick="toggleHist('${c.id}')">
        <strong>🏢 ${esc(c.name)}</strong>
        <span>${expC?'▾':'▸'} ${insps.length} arkiveret${insps.length===1?'':'e'} eftersyn</span>
      </div>
      ${expC ? years.map(y=>{
        const yearInsps = insps.filter(i=>i.date.startsWith(y));
        const key = c.id+'-'+y;
        const expY = !!state.histExpand[key];
        return `<div class="hist-year">
          <div class="hist-row sub" onclick="toggleHist('${key}')">📅 ${y}<span>${expY?'▾':'▸'} ${yearInsps.length}</span></div>
          ${expY ? yearInsps.map(i=>{
            const photoCount = i.skader.reduce((a,s)=>a+(s.photos?s.photos.length:0),0);
            return `<div class="hist-insp">
              <div><strong>Reoleftersyn ${fmtDate(i.date)}</strong> <span class="mono" style="font-size:12px;color:var(--grey-mid)">${esc(i.reportNumber)}</span></div>
              <div class="meta" style="font-size:12px;color:var(--grey-mid);margin-top:2px">${i.reoler.length} reoler · ${i.skader.length} skader · næste eftersyn ${fmtDate(i.nextInspection)}</div>
              <div class="btn-row" style="margin-top:10px">
                <button class="btn btn-ghost" style="padding:9px 14px;font-size:13px" onclick="generatePDF('${i.id}')">📄 PDF</button>

/* =========================================================
   STATISTIK (flere år)
========================================================= */
function renderStats(){
  const years = [...new Set(DB.inspections.map(i=>i.date.slice(0,4)))].sort();
  const skaderByYear = {};
  years.forEach(y=>skaderByYear[y]=[]);
  DB.inspections.forEach(i=>{
    const y = i.date.slice(0,4);
    i.skader.forEach(s=>skaderByYear[y].push({...s, customer:i.customerName}));
  });
  const allSkader = years.flatMap(y=>skaderByYear[y]);

  const eftersynByYear = {};
  years.forEach(y=>eftersynByYear[y]=DB.inspections.filter(i=>i.date.startsWith(y)).length);

  const maxTotal = Math.max(1, ...years.map(y=>skaderByYear[y].length));

  // top defects
  const defectCounts={};
  allSkader.forEach(s=>defectCounts[s.defectType]=(defectCounts[s.defectType]||0)+1);
  const topDefects = Object.entries(defectCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxDefect = topDefects.length? topDefects[0][1] : 1;

  // by location
  const locCounts={};
  allSkader.forEach(s=>locCounts[s.location||'Ukendt']=(locCounts[s.location||'Ukendt']||0)+1);
  const topLoc = Object.entries(locCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxLoc = topLoc.length? topLoc[0][1] : 1;

  // by reol
  const reolCounts={};
  allSkader.forEach(s=>reolCounts[s.reolId]=(reolCounts[s.reolId]||0)+1);
  const topReol = Object.entries(reolCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxReol = topReol.length? topReol[0][1] : 1;

  // by zone (lookup zone from any inspection's reolregister)
  const reolZone = {};
  DB.inspections.forEach(i=>i.reoler.forEach(r=>{ if(!reolZone[r.id]) reolZone[r.id]=r.hal||r.zone; }));
  const zoneCounts={};
  allSkader.forEach(s=>{ const z=reolZone[s.reolId]||'Ukendt'; zoneCounts[z]=(zoneCounts[z]||0)+1; });
  const topZone = Object.entries(zoneCounts).sort((a,b)=>b[1]-a[1]);
  const maxZone = topZone.length? topZone[0][1] : 1;

  // avg resolution time
  const resolved = allSkader.filter(s=>s.resolvedDate);
  const avgDays = resolved.length ? Math.round(resolved.reduce((a,s)=>a+daysBetween(s.date,s.resolvedDate),0)/resolved.length) : null;

  return `
  <div class="panel">
    <h2>Statistik — udvikling over flere år</h2>
    <table>
      <thead><tr><th>År</th><th>Eftersyn</th><th>Skader i alt</th><th>Grøn</th><th>Gul</th><th>Rød</th><th>Vurdering</th></tr></thead>
      <tbody>
        ${years.map(y=>{
          const sk=skaderByYear[y];
          const c={green:0,yellow:0,red:0}; sk.forEach(s=>c[s.classification]++);
          const yearInsps = DB.inspections.filter(i=>i.date.startsWith(y) && i.status==='closed' && i.vurdering);
          const vBadges = yearInsps.map(i=>`<span class="pill ${i.vurdering}" title="${esc(i.customerName)}" style="font-size:10px">${VURDERING_META[i.vurdering].emoji}</span>`).join(' ');
          return `<tr>
            <td><strong>${y}</strong></td>
            <td>${eftersynByYear[y]}</td>
            <td>${sk.length}</td>
            <td><span class="pill green">${c.green}</span></td>
            <td><span class="pill yellow">${c.yellow}</span></td>
            <td><span class="pill red">${c.red}</span></td>
            <td>${vBadges||'—'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    <div class="bars" style="margin-top:18px">
      ${years.map(y=>`<div class="bar-row"><div class="label">${y}</div><div class="bar-track"><div class="bar-fill" style="width:${skaderByYear[y].length/maxTotal*100}%;background:var(--navy)"></div></div><div class="val">${skaderByYear[y].length}</div></div>`).join('')}
    </div>
  </div>

  <div class="panel">
    <h2>Top 10 fejltyper (alle år)</h2>
    ${topDefects.length? `<div class="bars">
      ${topDefects.map(([d,c])=>`<div class="bar-row"><div class="label">${esc(d)}</div><div class="bar-track"><div class="bar-fill" style="width:${c/maxDefect*100}%;background:var(--navy)"></div></div><div class="val">${c}</div></div>`).join('')}
    </div>` : '<p style="font-size:13px;color:var(--grey-mid)">Ingen skader registreret endnu.</p>'}
  </div>

  <div class="formgrid">
    <div class="panel">
      <h2>Skader pr. lokation</h2>
      <div class="bars">
        ${topLoc.map(([l,c])=>`<div class="bar-row"><div class="label" title="${esc(l)}">${esc(l.length>22?l.slice(0,20)+'…':l)}</div><div class="bar-track"><div class="bar-fill" style="width:${c/maxLoc*100}%;background:var(--navy-2)"></div></div><div class="val">${c}</div></div>`).join('') || '<p style="font-size:13px;color:var(--grey-mid)">Ingen data.</p>'}
      </div>
    </div>
    <div class="panel">
      <h2>Skader pr. reol</h2>
      <div class="bars">
        ${topReol.map(([r,c])=>`<div class="bar-row"><div class="label mono">${esc(r)}</div><div class="bar-track"><div class="bar-fill" style="width:${c/maxReol*100}%;background:var(--navy-2)"></div></div><div class="val">${c}</div></div>`).join('') || '<p style="font-size:13px;color:var(--grey-mid)">Ingen data.</p>'}
      </div>
    </div>
  </div>

  <div class="formgrid">
    <div class="panel">
      <h2>Skader pr. afdeling/zone</h2>
      <div class="bars">
        ${topZone.map(([z,c])=>`<div class="bar-row"><div class="label">${esc(z)}</div><div class="bar-track"><div class="bar-fill" style="width:${c/maxZone*100}%;background:var(--navy-2)"></div></div><div class="val">${c}</div></div>`).join('') || '<p style="font-size:13px;color:var(--grey-mid)">Ingen data.</p>'}
      </div>
    </div>
    <div class="panel">
      <h2>Gennemsnitlig udbedringstid</h2>
      ${avgDays!==null ? `
        <div class="stat-card"><div class="n">${avgDays}</div><div class="l">Dage fra registrering til lukket skade</div></div>
        <p style="font-size:12px;color:var(--grey-mid);margin-top:10px">Baseret på ${resolved.length} lukkede skade${resolved.length===1?'':'r'} med registreret udbedringsdato.</p>
      ` : '<p style="font-size:13px;color:var(--grey-mid)">Ingen lukkede skader med udbedringsdato endnu.</p>'}
    </div>
  </div>`;
}

/* =========================================================
   AUTOMATISKE PÅMINDELSER (simuleret mail-log)
========================================================= */
function addDays(dateStr, days){
  const d = new Date(dateStr);
  d.setDate(d.getDate()+days);
  return d.toISOString().slice(0,10);
}
function buildMailLog(){
  const today = todayISO();
  const entries = [];
  DB.inspections.filter(i=>i.status==='closed' && i.nextInspection).forEach(i=>{
    [60,30,7].forEach(daysBefore=>{
      const sendDate = addDays(i.nextInspection, -daysBefore);
      const status = sendDate <= today ? 'sendt' : 'planlagt';
      entries.push({
        customer:i.customerName, to:i.email||'(ingen fast mail registreret)',
        subject:`Påmindelse: Reoleftersyn ${daysBefore===7?'inden 7 dage':'inden '+daysBefore+' dage'} — ${i.customerName}`,
        sendDate, status, daysBefore,
        body:`Til: ${i.email||'drift@firma.dk'}\nEmne: Påmindelse om kommende reoleftersyn\n\nKære ${i.contact||'kontaktperson'},\n\nDette er en automatisk påmindelse fra ReolScan Pro (Drift & Sikkerhed).\n\nSeneste reoleftersyn: ${fmtDate(i.date)}\nNæste planlagte eftersyn: ${fmtDate(i.nextInspection)} (om ${daysBefore} dage)\n\nKontakt: ${i.inspector}\nLink til booking: https://driftogsikkerhed.dk/book-eftersyn\n\nMed venlig hilsen\nReolScan Pro`
      });
    });
  });
  // one illustrative "fejl" example for demo richness
  entries.push({
    customer:'Bramidan A/S', to:'facility@bramidan.dk',
    subject:'Påmindelse: Reoleftersyn inden 60 dage — Bramidan A/S',
    sendDate:'2025-12-01', status:'fejl', daysBefore:60,
    body:'Til: facility@bramidan.dk\nEmne: Påmindelse om kommende reoleftersyn\n\nLevering mislykkedes — mailserver svarede ikke (timeout). Eftersynet for Bramidan A/S er endnu ikke afsluttet, så næste eftersynsdato er ikke fastlagt — påmindelse afventer afslutning af igangværende eftersyn.'
  });
  return entries.sort((a,b)=>a.sendDate.localeCompare(b.sendDate));
}
function renderReminders(){
  const log = buildMailLog();
  const statusPill = {planlagt:'grey', sendt:'green', fejl:'red'};
  const statusLabel = {planlagt:'Planlagt', sendt:'Sendt', fejl:'Fejl'};
  return `
  <div class="panel">
    <h2>Automatiske påmindelser — mail-log</h2>
    <p style="font-size:13px;color:var(--grey-mid)">Ved afslutning af et eftersyn beregnes næste eftersyn automatisk (seneste eftersyn + 12 måneder). Der sendes herefter automatisk en mail til virksomhedens <strong>faste eftersynsmail</strong> (fx drift@, lager@, sikkerhed@, facility@) 60 og 30 dage før næste eftersyn — aldrig til en enkelt persons private mail.</p>
  </div>
  <div class="panel">
    ${log.map(m=>`
      <div class="mail-card">
        <div class="mhead">
          <div>
            <h4>${esc(m.subject)}</h4>
            <div class="mmeta">Til: <span class="mono">${esc(m.to)}</span> · ${esc(m.customer)} · Planlagt udsendelse: ${fmtDate(m.sendDate)}</div>
          </div>
          <span class="pill ${statusPill[m.status]}">${statusLabel[m.status]}</span>
        </div>
        <div class="mail-preview">${esc(m.body)}</div>
      </div>
    `).join('')}
  </div>`;
}

function adminImportFile(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const imported = JSON.parse(ev.target.result);
      if(!imported.customers || !imported.inspections){ toast('Filen indeholder ikke gyldig ReolScan-data'); return; }
      DB = imported;
      DB.config = DB.config || seedDB().config;
      DB.pilotFeedback = DB.pilotFeedback || [];
      saveDB(DB);
      toast('Data importeret');
      render();
    }catch(err){ toast('Kunne ikke læse filen — ugyldig JSON'); }
  };
  reader.readAsText(file);
}
function adminBackupExport(){
  const dataStr = JSON.stringify(DB, null, 2);
  const blob = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
  const a = document.createElement('a');
  a.href = blob;
  a.download = 'reolscan-backup-'+todayISO()+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  toast('Backup eksporteret');
}

function changeAdminPin(){
  const current = val('sec_current');
  const next = val('sec_new');
  const repeat = val('sec_repeat');
  const err = document.getElementById('sec_error');
  const showErr = (msg)=>{ if(err) err.textContent = msg; toast(msg); };

  if(current !== getAdminPin()){ showErr('Forkert nuværende PIN'); return; }
  if(!/^\d{4}$/.test(next)){ showErr('Ny PIN skal være 4 cifre'); return; }
  if(next !== repeat){ showErr('De to nye PIN-koder matcher ikke'); return; }

  setAdminPin(next);
  if(err) err.textContent = '';
  toast('PIN ændret');
  state.view='admin';
  render();
}

/* =========================================================
   AI MØNSTERANALYSE
========================================================= */
function aiAnalyzeInspection(insp){
  const sameCustomerInsps = DB.inspections.filter(i=>i.customerId===insp.customerId);
  const allSkader = sameCustomerInsps.flatMap(i=>i.skader.map(s=>({...s, _date:i.date, _inspId:i.id})));

  // gentagne fejltyper (denne kunde, alle år)
  const defectCounts={};
  allSkader.forEach(s=>defectCounts[s.defectType]=(defectCounts[s.defectType]||0)+1);
  const repeatedDefects = Object.entries(defectCounts).filter(([,c])=>c>1).sort((a,b)=>b[1]-a[1]);

  // gentagne skader på samme reol
  const reolCounts={};
  allSkader.forEach(s=>reolCounts[s.reolId]=(reolCounts[s.reolId]||0)+1);
  const repeatedReoler = Object.entries(reolCounts).filter(([,c])=>c>1).sort((a,b)=>b[1]-a[1]);

  // risikoområder: reoler med kritiske/åbne skader på tværs af år
  const riskReoler = Object.entries(reolCounts).filter(([id,c])=>{
    const sk = allSkader.filter(s=>s.reolId===id);
    return c>1 && sk.some(s=>s.classification==='red');
  });

  // fejl pr. hal
  const reolHal={};
  sameCustomerInsps.forEach(i=>i.reoler.forEach(r=>{ if(!reolHal[r.id]) reolHal[r.id]=r.hal||r.zone||'Ukendt'; }));
  const halCounts={};
  allSkader.forEach(s=>{ const h=reolHal[s.reolId]||'Ukendt'; halCounts[h]=(halCounts[h]||0)+1; });
  const topHal = Object.entries(halCounts).sort((a,b)=>b[1]-a[1]);

  // fejl pr. reolrække
  const reolRaekke={};
  sameCustomerInsps.forEach(i=>i.reoler.forEach(r=>{ if(!reolRaekke[r.id]) reolRaekke[r.id]=r.reolraekke||'Ukendt'; }));
  const raekkeCounts={};
  allSkader.forEach(s=>{ const rk=reolRaekke[s.reolId]||'Ukendt'; raekkeCounts[rk]=(raekkeCounts[rk]||0)+1; });
  const topRaekke = Object.entries(raekkeCounts).sort((a,b)=>b[1]-a[1]);

  // udvikling år for år
  const byYear={};
  sameCustomerInsps.filter(i=>i.status==='closed').forEach(i=>{ byYear[i.date.slice(0,4)]=(byYear[i.date.slice(0,4)]||0)+i.skader.length; });
  const years = Object.entries(byYear).sort((a,b)=>a[0].localeCompare(b[0]));
  let trend = null;
  if(years.length>=2){
    const [,first]=years[0], [,last]=years[years.length-1];
    if(first>0) trend = Math.round((last-first)/first*100);
  }

  return {repeatedDefects, repeatedReoler, riskReoler, topHal, topRaekke, years, trend};
}

function aiManagementSummary(insp){
  const a = aiAnalyzeInspection(insp);
  const counts={green:0,yellow:0,red:0}; insp.skader.forEach(s=>counts[s.classification]++);
  const parts=[];
  parts.push(`Eftersynet identificerede ${insp.skader.length} afvigelse(r) på tværs af ${insp.reoler.length} reoler, heraf ${counts.red} kritisk(e), ${counts.yellow} med behov for udbedring og ${counts.green} uden akut handling.`);
  if(a.repeatedDefects.length){
    parts.push(`Gentagne fejltyper hos kunden: ${a.repeatedDefects.slice(0,3).map(([d,c])=>`${d} (${c}×)`).join(', ')}.`);
  }
  if(a.riskReoler.length){
    parts.push(`Følgende reoler udgør et risikoområde med tilbagevendende kritiske skader: ${a.riskReoler.slice(0,3).map(([id])=>id).join(', ')}.`);
  } else if(a.repeatedReoler.length){
    parts.push(`Gentagne skader er registreret på reol(er): ${a.repeatedReoler.slice(0,3).map(([id,c])=>`${id} (${c}×)`).join(', ')}.`);
  }
  if(a.topHal.length){
    parts.push(`Flest afvigelser er fundet i ${a.topHal[0][0]} (${a.topHal[0][1]} af i alt registrerede afvigelser hos kunden).`);
  }
  if(a.trend!==null){
    parts.push(`Udviklingen i antal fejl fra ${a.years[0][0]} til ${a.years[a.years.length-1][0]} er ${a.trend<=0?'et fald på '+Math.abs(a.trend)+'%':'en stigning på '+a.trend+'%'}.`);
  }
  const vurdering = insp.vurdering ? {green:'Eftersynet vurderes samlet godkendt.',yellow:'Eftersynet vurderes godkendt med bemærkninger — opfølgning på gule/røde punkter anbefales.',red:'Eftersynet vurderes ikke godkendt — kritiske afvigelser skal udbedres før næste eftersyn.'}[insp.vurdering] : '';
  if(vurdering) parts.push(vurdering);
  return parts.join(' ');
}

function generatePDF(inspId){
  const insp = getInspection(inspId);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'mm',format:'a4'});
  const W = 210, M = 15;
  const navy = [14,42,69];
  const colors = {green:[46,158,91], yellow:[242,183,5], red:[214,51,74]};

  function header(title){
    doc.setFillColor(...navy);
    doc.rect(0,0,W,22,'F');
    doc.setTextColor(255,255,255);
    doc.setFont('helvetica','bold');
    doc.setFontSize(14);
    doc.text('ReolScan Pro · Reoleftersyn', M, 14);
    doc.setFontSize(9);
    doc.setFont('helvetica','normal');
    doc.text(insp.reportNumber || '', W-M, 14, {align:'right'});
    doc.setTextColor(0,0,0);
  }
  function footer(){
    const p = doc.internal.getNumberOfPages();
    doc.setFontSize(8);
    doc.setTextColor(140,150,160);
    doc.text('Drift & Sikkerhed — ReolScan Pro · Side '+p, W/2, 290, {align:'center'});
    doc.setTextColor(0,0,0);
  }

  // --- Forside ---
  header('');
  // Logo box
  doc.setFillColor(...navy);
  doc.roundedRect(M, 30, 36, 14, 2, 2, 'F');
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(11);
  doc.text('REOLER A/S', M+18, 38.5, {align:'center'});
  doc.setTextColor(...navy); doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text('Drift & Sikkerhed · Reolinspektion', M+38, 38);

  // QR code -> opens report in ReolScan via report URL
  try{
    const qr = qrDataUrl(reportUrl(insp), 120);
    if(qr) doc.addImage(qr, 'PNG', W-M-26, 28, 26, 26);
    doc.setFontSize(7); doc.setTextColor(140,150,160);
    doc.text('Scan for at åbne rapport i ReolScan', W-M, 57, {align:'right'});
    doc.setTextColor(0,0,0);
  }catch(e){}

  doc.setFont('helvetica','bold'); doc.setFontSize(22);
  doc.setTextColor(...navy);
  doc.text('Reoleftersyn', M, 64);
  doc.setFontSize(16); doc.setTextColor(0,0,0);
  doc.text(insp.customerName, M, 75);

  doc.setFont('helvetica','normal'); doc.setFontSize(11);
  let y = 88;
  const rows = [
    ['Adresse', insp.address||'—'],
    ['CVR', insp.cvr||'—'],
    ['Kontaktperson', insp.contact||'—'],
    ['Mail', insp.email||'—'],
    ['Dato for eftersyn', fmtDate(insp.date)],
    ['Inspektør', insp.inspector],
    ['Rapportnummer', insp.reportNumber||'—'],
    ['Næste eftersyn', fmtDate(insp.nextInspection)]
  ];
  rows.forEach(([k,v])=>{
    doc.setFont('helvetica','bold'); doc.text(k+':', M, y);
    doc.setFont('helvetica','normal'); doc.text(String(v), M+50, y);
    y+=8;
  });

  // Konklusion
  const counts={green:0,yellow:0,red:0};
  insp.skader.forEach(s=>counts[s.classification]++);
  y+=6;
  doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.text('Konklusion', M, y); y+=8;
  doc.setFont('helvetica','normal'); doc.setFontSize(11);
  const conclusion = `Eftersynet omfatter ${insp.reoler.length} reoler og ${insp.skader.length} registrerede observationer. `+
    `${counts.red} kritisk(e) skade(r) kræver øjeblikkelig handling, ${counts.yellow} skade(r) skal udbedres, og ${counts.green} observation(er) er uden akut handling. `+
    `Næste eftersyn anbefales senest ${fmtDate(insp.nextInspection)}.`;
  const lines = doc.splitTextToSize(conclusion, W-2*M);
  doc.text(lines, M, y);
  y += lines.length*6 + 8;

  // klassifikation badges
  doc.setFontSize(11);
  const badge=(label,col,xx)=>{
    doc.setFillColor(...col); doc.roundedRect(xx,y,40,12,2,2,'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold');
    doc.text(label, xx+20, y+8, {align:'center'});
    doc.setTextColor(0,0,0); doc.setFont('helvetica','normal');
  };
  badge('GRØN: '+counts.green, colors.green, M);
  badge('GUL: '+counts.yellow, colors.yellow, M+45);
  badge('RØD: '+counts.red, colors.red, M+90);
  if(insp.vurdering){
    y+=18;
    const vm = {green:['🟢 GODKENDT',colors.green], yellow:['🟡 GODKENDT MED BEMÆRKNINGER',colors.yellow], red:['🔴 IKKE GODKENDT',colors.red]}[insp.vurdering];
    doc.setFillColor(...vm[1]); doc.roundedRect(M, y, 90, 12, 2, 2, 'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(11);
    doc.text('Samlet vurdering: '+vm[0].replace(/^[^ ]+ /,''), M+45, y+8, {align:'center'});
    doc.setTextColor(0,0,0); doc.setFont('helvetica','normal');
  }
  footer();

  // --- AI Ledelsesresumé + Tjekliste (afvigelser) ---
  doc.addPage(); header();
  doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(...navy);
  doc.text('AI Ledelsesresumé', M, 32); doc.setTextColor(0,0,0);
  doc.setFont('helvetica','normal'); doc.setFontSize(11);
  let sy=42;
  const summaryLines = doc.splitTextToSize(aiManagementSummary(insp), W-2*M);
  doc.text(summaryLines, M, sy); sy += summaryLines.length*6 + 10;

  const checklistDeviations = HOVEDOMRAADER.filter(h=>(insp.checklist||{})[h.key]==='fejl');
  if(checklistDeviations.length){
    doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.text('Tjekliste — afvigelser ('+checklistDeviations.length+' af '+HOVEDOMRAADER.length+' hovedområder)', M, sy); sy+=8;
    doc.setFont('helvetica','normal'); doc.setFontSize(10);
    checklistDeviations.forEach(h=>{
      doc.text('• '+h.label, M, sy); sy+=6;
    });
    sy+=4;
  } else {
    doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.text('Tjekliste', M, sy); sy+=8;
    doc.setFont('helvetica','normal'); doc.setFontSize(10);
    doc.text('Alle 14 hovedområder er godkendt uden afvigelser.', M, sy); sy+=8;
  }

  // AI mønsteranalyse
  const ai = aiAnalyzeInspection(insp);
  sy+=4;
  doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.text('AI Mønsteranalyse', M, sy); sy+=8;
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  const aiLines = [];
  if(ai.repeatedDefects.length) aiLines.push('Gentagne fejl: '+ai.repeatedDefects.slice(0,5).map(([d,c])=>`${d} (${c}×)`).join(', '));
  else aiLines.push('Gentagne fejl: ingen fundet.');
  if(ai.repeatedReoler.length) aiLines.push('Gentagne skader på samme reol: '+ai.repeatedReoler.slice(0,5).map(([id,c])=>`${id} (${c}×)`).join(', '));
  else aiLines.push('Gentagne skader på samme reol: ingen fundet.');
  if(ai.riskReoler.length) aiLines.push('Risikoområder (reoler med tilbagevendende kritiske skader): '+ai.riskReoler.map(([id])=>id).join(', '));
  else aiLines.push('Risikoområder: ingen identificeret.');
  if(ai.topHal.length) aiLines.push('Fejl pr. hal: '+ai.topHal.map(([h,c])=>`${h} (${c})`).join(', '));
  if(ai.topRaekke.length) aiLines.push('Fejl pr. reolrække: '+ai.topRaekke.map(([r,c])=>`${r} (${c})`).join(', '));
  if(ai.years.length) aiLines.push('Udvikling år for år: '+ai.years.map(([y,c])=>`${y}: ${c}`).join(' · ')+(ai.trend!==null?` (${ai.trend<=0?'↓ ':'↑ +'}${ai.trend}%)`:''));
  aiLines.forEach(line=>{
    const wrapped = doc.splitTextToSize('• '+line, W-2*M);
    doc.text(wrapped, M, sy); sy += wrapped.length*6;
  });
  footer();

  // --- Reoloversigt ---
  doc.addPage(); header();
  doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(...navy);
  doc.text('Reoloversigt', M, 32); doc.setTextColor(0,0,0);
  y=42;
  doc.setFontSize(9); doc.setFont('helvetica','bold');
  const cols=['Reol-ID','Zone','Lokation','Type','Producent','Skilt','Bemærk.'];
  const colW=[18,12,42,28,28,16,30];
  let x=M;
  cols.forEach((c,i)=>{ doc.text(c,x,y); x+=colW[i]; });
  y+=2; doc.setDrawColor(...navy); doc.line(M,y,W-M,y); y+=6;
  doc.setFont('helvetica','normal');
  insp.reoler.forEach(r=>{
    if(y>270){ footer(); doc.addPage(); header(); y=32; }
    x=M;
    const vals=[r.id,r.zone,r.location,r.type,r.producer, r.loadSign==='ja'?'Ja':'Nej', r.notes||'—'];
    vals.forEach((v,i)=>{
      const t = doc.splitTextToSize(String(v), colW[i]-2);
      doc.text(t[0]||'', x, y);
      x+=colW[i];
    });
    y+=7;
  });
  footer();

  // --- Skader (grupperet pr. registrering — flere afkrydsede typer vises samlet) ---
  const skadeGroups = (()=>{
    const seen = new Set(); const groups = [];
    insp.skader.forEach(s=>{
      const gid = s.groupId || s.id;
      if(seen.has(gid)) return;
      seen.add(gid);
      groups.push(insp.skader.filter(x=>(x.groupId||x.id)===gid));
    });
    return groups;
  })();

  skadeGroups.forEach((group,idx)=>{
    const s = group[0]; // fælles felter: reol, lokation, prioritet, foto, kommentar, tale
    doc.addPage(); header();
    doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(...navy);
    doc.text('Skade '+(idx+1)+' af '+skadeGroups.length, M, 32);
    doc.setTextColor(0,0,0);
    const col = colors[s.classification];
    doc.setFillColor(...col);
    doc.roundedRect(M, 38, 30, 9, 2, 2, 'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(10);
    const labels={green:'GRØN',yellow:'GUL',red:'RØD'};
    doc.text(labels[s.classification], M+15, 44.5, {align:'center'});
    doc.setTextColor(0,0,0);

    doc.setFont('helvetica','normal'); doc.setFontSize(11);
    y=55;
    const anbefaling = {
      red:'Kritisk skade — udbedres straks. Reolen bør aflastes/spærres til reparation er udført.',
      yellow:'Skal udbedres ved næste planlagte vedligehold. Følg op på deadline.',
      green:'Ingen akut handling. Hold under observation ved næste eftersyn.'
    }[s.classification];
    const prioritet = {red:'Høj',yellow:'Middel',green:'Lav'}[s.classification];
    const fejltyper = group.map(g=>g.defectType).join(', ');
    const handling = `${s.status}${s.kommentar?' · '+s.kommentar:''}${s.ansvarlig?' · Ansvarlig: '+s.ansvarlig:''}${s.deadline?' · Deadline: '+fmtDate(s.deadline):''}${s.udfortDato?' · Udført: '+fmtDate(s.udfortDato):''}`;
    [['Reol-ID',s.reolId],['Lokation',s.location||'—'],['Fejltyper',fejltyper],['Prioritet',prioritet]].forEach(([k,v])=>{
      doc.setFont('helvetica','bold'); doc.text(k+':', M, y);
      doc.setFont('helvetica','normal');
      const vl = doc.splitTextToSize(String(v), W-2*M-32);
      doc.text(vl, M+32, y);
      y+=6*vl.length+1;
    });
    y+=2;
    if(s.desc){
      doc.setFont('helvetica','bold'); doc.text('Beskrivelse:', M, y); y+=6;
      doc.setFont('helvetica','normal');
      const dl = doc.splitTextToSize(s.desc, W-2*M);
      doc.text(dl, M, y); y += dl.length*6 + 4;
    }
    doc.setFont('helvetica','bold'); doc.text('Anbefaling:', M, y); y+=6;
    doc.setFont('helvetica','normal');
    const al = doc.splitTextToSize(anbefaling, W-2*M);
    doc.text(al, M, y); y += al.length*6 + 4;
    doc.setFont('helvetica','bold'); doc.text('Handling:', M, y); y+=6;
    doc.setFont('helvetica','normal');
    const hl = doc.splitTextToSize(handling, W-2*M);
    doc.text(hl, M, y); y += hl.length*6 + 4;

    if(s.voiceNote && s.voiceNote.text){
      doc.setFont('helvetica','bold'); doc.text('Kommentar (inspektør):', M, y); y+=6;
      doc.setFont('helvetica','normal');
      const vnl = doc.splitTextToSize(s.voiceNote.text+'  ('+fmtDate(s.voiceNote.date)+' '+(s.voiceNote.time||'')+', '+s.voiceNote.inspector+')', W-2*M);
      doc.text(vnl, M, y); y += vnl.length*6 + 4;
    }

    if(s.photos && s.photos.length){
      let px=M, py=y;
      s.photos.slice(0,4).forEach((p,i)=>{
        try{ doc.addImage(p, 'JPEG', px, py, 45, 45); }catch(e){ try{ doc.addImage(p,'PNG',px,py,45,45);}catch(e2){} }
        px += 50;
        if((i+1)%3===0){ px=M; py+=50; }
      });
    }
    footer();
  });

  // --- Underskrifter & konklusion ---
  doc.addPage(); header();
  doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(...navy);
  doc.text('Underskrifter & konklusion', M, 32); doc.setTextColor(0,0,0);
  doc.setFont('helvetica','normal'); doc.setFontSize(11);
  doc.text('Inspektør: '+insp.inspector, M, 45);
  if(insp.signatures.inspector){ try{doc.addImage(insp.signatures.inspector,'PNG',M,50,80,30);}catch(e){} }
  doc.line(M,82,M+80,82);
  doc.text('Kunde: '+(insp.contact||''), M, 100);
  if(insp.signatures.customer){ try{doc.addImage(insp.signatures.customer,'PNG',M,105,80,30);}catch(e){} }
  doc.line(M,137,M+80,137);

  let fy=150;
  doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.text('Konklusion', M, fy); fy+=8;
  doc.setFont('helvetica','normal'); doc.setFontSize(11);
  const fl = doc.splitTextToSize(conclusion, W-2*M);
  doc.text(fl, M, fy); fy += fl.length*6 + 6;
  const overall = counts.red>0 ? 'Kræver opfølgning — kritiske skader skal udbedres.' : (counts.yellow>0 ? 'Tilfredsstillende — mindre udbedringer planlagt.' : 'Godkendt — ingen udestående skader.');
  doc.setFont('helvetica','bold'); doc.text('Samlet vurdering:', M, fy);
  doc.setFont('helvetica','normal'); doc.text(overall, M+45, fy); fy+=10;
  doc.setFont('helvetica','bold'); doc.text('Anbefalet næste eftersyn:', M, fy);
  doc.setFont('helvetica','normal'); doc.text(fmtDate(insp.nextInspection), M+62, fy);
  footer();

  doc.save((insp.reportNumber||'eftersyn')+'_'+insp.customerName.replace(/[^a-z0-9]+/gi,'_')+'.pdf');
  toast('PDF-rapport downloadet');
}

function val(id){ const el=document.getElementById(id); return el?el.value:''; }
function esc(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function fmtDate(d){
  if(!d) return '—';
  const [y,m,day] = d.split('-');
  return `${day}-${m}-${y}`;
}
function emptyState(icon,title,text){
  return `<div class="empty"><span class="icon">${icon}</span><h3>${title}</h3><p>${text}</p></div>`;
}
let toastTimer;
function toast(msg){
  const t = document.getElementById('toast');
  document.getElementById('toastText').textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}

/* init */
resolveReportDeepLink();
render();

function resolveReportDeepLink(){
  try{
    const params = new URLSearchParams(window.location.search);
    const reportNumber = params.get('report');
    if(!reportNumber) return;
    const insp = DB.inspections.find(i=>i.reportNumber===reportNumber);
    if(insp){
      state.currentInspectionId = insp.id;
      state.view='wizard';
      state.wizardTab = insp.status==='closed' ? 'afslut' : 'stamdata';
    }else{
      state.view='reportNotFound';
      state.reportNotFoundNumber = reportNumber;
    }
  }catch(e){}
}
</script>
