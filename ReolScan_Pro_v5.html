<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ReolScan Pro · Drift &amp; Sikkerhed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --navy:#0E2A45;
  --navy-2:#16385A;
  --navy-soft:#EAF0F6;
  --grey:#F4F6F8;
  --grey-line:#D7DEE5;
  --grey-mid:#7C8A99;
  --ink:#16222E;
  --white:#FFFFFF;
  --green:#2E9E5B;
  --green-bg:#E5F6EC;
  --yellow:#F2B705;
  --yellow-bg:#FFF6DD;
  --red:#D6334A;
  --red-bg:#FBE6EA;
  --radius:16px;
  --radius-sm:10px;
  --shadow:0 2px 10px rgba(14,42,69,.08);
  --shadow-lg:0 12px 30px rgba(14,42,69,.18);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--grey);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
h1,h2,h3,.display{font-family:'Oswald',sans-serif;letter-spacing:.02em;text-transform:uppercase;}
.mono{font-family:'JetBrains Mono',monospace;}

/* ===== App shell ===== */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

header.topbar{
  background:var(--navy);
  color:#fff;
  display:flex;align-items:center;gap:14px;
  padding:14px 20px;
  flex-shrink:0;
  box-shadow:var(--shadow);
  z-index:20;
}
header.topbar .brand{
  display:flex;align-items:center;gap:10px;
  font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;letter-spacing:.06em;
  text-transform:uppercase;
}
header.topbar .brand .mark{
  width:34px;height:34px;border-radius:8px;
  background:linear-gradient(135deg,var(--yellow) 0 50%, var(--green) 50% 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--navy);font-size:13px;
  flex-shrink:0;
}
header.topbar .brand small{
  display:block;font-family:'Inter',sans-serif;text-transform:none;letter-spacing:0;
  font-size:11px;font-weight:500;color:#9FB3C8;
}
header.topbar .spacer{flex:1;}
header.topbar .crumb{
  font-size:13px;color:#AFC2D6;font-weight:500;
  display:none;
}
.topbtn{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.18);
  color:#fff;border-radius:10px;
  padding:10px 16px;font-size:14px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:.15s;
}
.topbtn:hover{background:rgba(255,255,255,.18);}
.topbtn.primary{background:var(--green);border-color:var(--green);}
.topbtn.primary:hover{background:#268a4f;}

main{flex:1;overflow-y:auto;padding:24px;}
.wrap{max-width:1100px;margin:0 auto;}

/* ===== Home grid ===== */
.home-hero{
  background:linear-gradient(120deg,var(--navy) 0%, var(--navy-2) 100%);
  color:#fff;border-radius:var(--radius);
  padding:28px 32px;margin-bottom:24px;
  display:flex;justify-content:space-between;align-items:center;gap:24px;
  flex-wrap:wrap;
}
.home-hero h1{margin:0 0 6px;font-size:26px;}
.home-hero p{margin:0;color:#AFC2D6;font-size:14px;max-width:520px;line-height:1.5;}
.home-hero .stat-strip{display:flex;gap:18px;}
.home-hero .stat-strip div{text-align:center;}
.home-hero .stat-strip .n{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;}
.home-hero .stat-strip .l{font-size:11px;color:#AFC2D6;text-transform:uppercase;letter-spacing:.08em;}

.section-label{
  font-size:12px;font-weight:700;color:var(--grey-mid);
  text-transform:uppercase;letter-spacing:.12em;
  margin:28px 0 12px;
}
.tile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
@media (max-width:900px){.tile-grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:560px){.tile-grid{grid-template-columns:1fr;}}
.tile{
  background:#fff;border:1px solid var(--grey-line);border-radius:var(--radius);
  padding:22px;cursor:pointer;text-align:left;
  display:flex;flex-direction:column;gap:10px;
  min-height:128px;
  transition:.15s;position:relative;overflow:hidden;
}
.tile:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--navy);}
.tile .icon{
  width:46px;height:46px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;background:var(--navy-soft);color:var(--navy);
  flex-shrink:0;
}
.tile.accent .icon{background:var(--navy);color:#fff;}
.tile h3{margin:0;font-size:16px;letter-spacing:.04em;}
.tile p{margin:0;font-size:13px;color:var(--grey-mid);line-height:1.4;}
.tile .badge-soon{
  position:absolute;top:14px;right:14px;
  background:var(--grey);color:var(--grey-mid);
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  padding:4px 9px;border-radius:20px;border:1px solid var(--grey-line);
}
.tile.soon{cursor:default;}
.tile.soon:hover{transform:none;box-shadow:none;border-color:var(--grey-line);}
.tile.soon h3,.tile.soon p{color:var(--grey-mid);}
.tile.soon .icon{background:var(--grey);color:var(--grey-mid);}

/* ===== Cards / panels ===== */
.panel{background:#fff;border:1px solid var(--grey-line);border-radius:var(--radius);padding:24px;margin-bottom:18px;}
.panel h2{margin:0 0 18px;font-size:18px;color:var(--navy);display:flex;align-items:center;gap:10px;}
.panel h2 .num{
  width:28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-family:'JetBrains Mono',monospace;
  flex-shrink:0;
}

/* ===== Forms ===== */
.formgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
@media (max-width:700px){.formgrid{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:6px;}
.field.full{grid-column:1/-1;}
.field label{font-size:12px;font-weight:700;color:var(--grey-mid);text-transform:uppercase;letter-spacing:.08em;}
.field input,.field select,.field textarea{
  border:1.5px solid var(--grey-line);border-radius:var(--radius-sm);
  padding:13px 14px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink);
  width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--navy);outline-offset:1px;border-color:var(--navy);}
.field textarea{resize:vertical;min-height:70px;}

.btn{
  border:none;border-radius:12px;padding:14px 22px;font-size:15px;font-weight:700;
  cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-family:'Inter',sans-serif;transition:.15s;letter-spacing:.02em;
}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:var(--navy-2);}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:#268a4f;}
.btn-ghost{background:var(--grey);color:var(--ink);border:1.5px solid var(--grey-line);}
.btn-ghost:hover{background:#e8edf1;}
.btn-danger{background:var(--red-bg);color:var(--red);border:1.5px solid #f3c5cd;}
.btn-danger:hover{background:#f6d3da;}
.btn-block{width:100%;}
.btn-lg{padding:18px 28px;font-size:16px;}
.btn[disabled]{opacity:.45;cursor:not-allowed;}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px;}

/* ===== Wizard tabs ===== */
.wizard-head{
  background:#fff;border:1px solid var(--grey-line);border-radius:var(--radius);
  padding:18px 22px;margin-bottom:18px;
  display:flex;justify-content:space-between;align-items:flex-start;gap:18px;flex-wrap:wrap;
}
.wizard-head .meta h2{margin:0 0 4px;color:var(--navy);font-size:20px;}
.wizard-head .meta .sub{font-size:13px;color:var(--grey-mid);}
.wizard-head .meta .sub .mono{color:var(--ink);}
.tabbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.tab{
  background:#fff;border:1.5px solid var(--grey-line);border-radius:12px;
  padding:12px 18px;font-size:14px;font-weight:700;color:var(--grey-mid);
  cursor:pointer;display:flex;align-items:center;gap:8px;
}
.tab .tn{
  width:22px;height:22px;border-radius:50%;background:var(--grey);color:var(--grey-mid);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-family:'JetBrains Mono',monospace;
}
.tab.active{border-color:var(--navy);color:var(--navy);background:var(--navy-soft);}
.tab.active .tn{background:var(--navy);color:#fff;}
.tab.done .tn{background:var(--green);color:#fff;}

/* ===== Tables ===== */
table{width:100%;border-collapse:collapse;}
th{
  text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--grey-mid);
  padding:10px 12px;border-bottom:2px solid var(--grey-line);font-weight:700;
}
td{padding:13px 12px;border-bottom:1px solid var(--grey-line);font-size:14px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.tag-id{
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;
  background:var(--navy);color:#fff;border-radius:6px;padding:5px 9px;display:inline-block;
}
.icon-btn{
  border:1.5px solid var(--grey-line);background:#fff;border-radius:8px;
  width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;color:var(--grey-mid);
}
.icon-btn:hover{border-color:var(--red);color:var(--red);}

/* ===== Empty state ===== */
.empty{
  border:2px dashed var(--grey-line);border-radius:var(--radius);
  padding:40px 20px;text-align:center;color:var(--grey-mid);
}
.empty .icon{font-size:34px;margin-bottom:10px;display:block;}
.empty h3{margin:0 0 6px;color:var(--ink);font-size:16px;text-transform:none;font-family:'Inter',sans-serif;}
.empty p{margin:0;font-size:13px;}

/* ===== Damage tags (signature element) ===== */
.tagclass-row{display:flex;gap:14px;flex-wrap:wrap;}
.tagclass{
  flex:1;min-width:140px;
  border:3px solid transparent;border-radius:var(--radius);
  padding:18px 14px 16px;cursor:pointer;text-align:center;position:relative;
  font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.06em;
  transition:.15s;
}
.tagclass::before{
  content:'';position:absolute;top:-9px;left:50%;transform:translateX(-50%);
  width:16px;height:16px;border-radius:50%;background:var(--grey);
  border:3px solid var(--white);box-shadow:0 1px 3px rgba(0,0,0,.15);
}
.tagclass .lab{font-size:15px;}
.tagclass .desc{display:block;margin-top:4px;font-size:11px;font-family:'Inter',sans-serif;font-weight:500;text-transform:none;letter-spacing:0;}
.tagclass.green{background:var(--green-bg);color:#1f7a44;}
.tagclass.yellow{background:var(--yellow-bg);color:#9a6c00;}
.tagclass.red{background:var(--red-bg);color:#a8233a;}
.tagclass.green.sel{border-color:var(--green);box-shadow:0 0 0 4px rgba(46,158,91,.15);}
.tagclass.yellow.sel{border-color:var(--yellow);box-shadow:0 0 0 4px rgba(242,183,5,.18);}
.tagclass.red.sel{border-color:var(--red);box-shadow:0 0 0 4px rgba(214,51,74,.15);}

/* damage cards */
.dmg-card{
  background:#fff;border:1px solid var(--grey-line);border-radius:var(--radius-sm);
  display:flex;gap:14px;padding:14px;margin-bottom:10px;align-items:flex-start;
  border-left:6px solid var(--grey-line);
}
.dmg-card.green{border-left-color:var(--green);}
.dmg-card.yellow{border-left-color:var(--yellow);}
.dmg-card.red{border-left-color:var(--red);}
.dmg-card .thumb{
  width:64px;height:64px;border-radius:8px;background:var(--grey);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:22px;color:var(--grey-mid);
}
.dmg-card .thumb img{width:100%;height:100%;object-fit:cover;}
.dmg-card .body{flex:1;min-width:0;}
.dmg-card .body .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap;}
.dmg-card .body h4{margin:0;font-size:15px;}
.dmg-card .body .meta{font-size:12px;color:var(--grey-mid);margin-top:3px;}
.dmg-card .body .desc{font-size:13px;margin-top:6px;color:var(--ink);}
.pill{
  display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 11px;
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
}
.pill.green{background:var(--green-bg);color:#1f7a44;}
.pill.yellow{background:var(--yellow-bg);color:#9a6c00;}
.pill.red{background:var(--red-bg);color:#a8233a;}
.pill.grey{background:var(--grey);color:var(--grey-mid);}

/* ===== Dashboard ===== */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
@media (max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
.stat-card{
  background:#fff;border:1px solid var(--grey-line);border-radius:var(--radius);
  padding:18px 20px;
}
.stat-card .n{font-family:'Oswald',sans-serif;font-size:32px;font-weight:700;color:var(--navy);}
.stat-card .l{font-size:12px;color:var(--grey-mid);text-transform:uppercase;letter-spacing:.08em;margin-top:4px;}
.stat-card.green .n{color:var(--green);}
.stat-card.yellow .n{color:var(--yellow);}
.stat-card.red .n{color:var(--red);}
.bars{display:flex;flex-direction:column;gap:10px;}
.bar-row{display:flex;align-items:center;gap:12px;}
.bar-row .label{width:130px;font-size:13px;font-weight:600;flex-shrink:0;}
.bar-track{flex:1;height:14px;background:var(--grey);border-radius:8px;overflow:hidden;}
.bar-fill{height:100%;border-radius:8px;}
.bar-row .val{width:36px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;}

/* ===== Photo grid ===== */
.photo-grid{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}
.photo-thumb{
  width:84px;height:84px;border-radius:10px;overflow:hidden;position:relative;
  border:1.5px solid var(--grey-line);background:var(--grey);
}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-thumb .rm{
  position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;
  background:rgba(20,30,40,.65);color:#fff;border:none;font-size:13px;display:flex;
  align-items:center;justify-content:center;cursor:pointer;
}
.photo-add{
  width:84px;height:84px;border-radius:10px;border:2px dashed var(--grey-line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;color:var(--grey-mid);font-size:12px;gap:4px;background:#fff;
}
.photo-add .plus{font-size:22px;line-height:1;}
.photo-add:hover{border-color:var(--navy);color:var(--navy);}

/* ===== Modal ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(14,42,69,.55);
  display:flex;align-items:flex-end;justify-content:center;z-index:100;
  animation:fadein .15s ease;
}
@media (min-width:760px){.modal-overlay{align-items:center;}}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal{
  background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:640px;
  max-height:92vh;overflow-y:auto;padding:24px;
  animation:slideup .2s ease;
}
@media (min-width:760px){.modal{border-radius:var(--radius);}}
@keyframes slideup{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h2{margin:0 0 16px;color:var(--navy);font-size:18px;}
.modal-close{
  position:sticky;top:0;float:right;background:var(--grey);border:none;border-radius:50%;
  width:34px;height:34px;font-size:16px;cursor:pointer;color:var(--grey-mid);
}

/* ===== Signature pad ===== */
.sigpad-wrap{border:1.5px solid var(--grey-line);border-radius:var(--radius-sm);overflow:hidden;background:#fcfdfe;}
.sigpad-wrap canvas{display:block;width:100%;height:160px;touch-action:none;cursor:crosshair;}
.sigpad-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.sig-status{font-size:12px;color:var(--grey-mid);}
.sig-status.ok{color:var(--green);font-weight:700;}

/* ===== Toast ===== */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--navy);color:#fff;padding:14px 24px;border-radius:12px;
  font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:10px;z-index:200;
  transition:transform .25s ease;
}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast .dot{width:10px;height:10px;border-radius:50%;background:var(--green);flex-shrink:0;}

/* drawing canvas placeholder */
.drawing-area{
  border:2px dashed var(--grey-line);border-radius:var(--radius);
  min-height:300px;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:10px;color:var(--grey-mid);background:#fff;overflow:hidden;position:relative;
}
.drawing-area img,.drawing-area embed{width:100%;height:100%;object-fit:contain;}
.drawing-pin{
  position:absolute;width:30px;height:30px;border-radius:50%;
  background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
  transform:translate(-50%,-50%);border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);cursor:pointer;
}

.report-list-item{
  display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;
  padding:14px 0;border-bottom:1px solid var(--grey-line);
}
.report-list-item:last-child{border-bottom:none;}
.report-list-item .info h4{margin:0 0 4px;font-size:15px;}
.report-list-item .info .meta{font-size:12px;color:var(--grey-mid);}
.coming-soon-preview{
  background:var(--grey);border-radius:var(--radius-sm);padding:18px;margin-top:14px;
  filter:saturate(.5);opacity:.65;pointer-events:none;
}

footer.app-foot{
  text-align:center;padding:14px;font-size:11px;color:var(--grey-mid);
  border-top:1px solid var(--grey-line);background:#fff;
}

/* ===== History accordion ===== */
.hist-customer{border:1px solid var(--grey-line);border-radius:var(--radius-sm);margin-bottom:10px;overflow:hidden;}
.hist-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px;cursor:pointer;background:#fff;font-size:14px;
}
.hist-row:hover{background:var(--grey);}
.hist-row span{color:var(--grey-mid);font-size:13px;font-weight:600;}
.hist-year{border-top:1px solid var(--grey-line);background:var(--navy-soft);}
.hist-row.sub{padding-left:28px;font-weight:700;color:var(--navy);background:transparent;}
.hist-insp{
  background:#fff;margin:0 12px 12px 28px;padding:14px;border-radius:var(--radius-sm);
  border:1px solid var(--grey-line);
}

/* ===== Kundekort ===== */
.cust-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
@media (max-width:800px){.cust-grid{grid-template-columns:1fr;}}
.cust-card{background:#fff;border:1px solid var(--grey-line);border-radius:var(--radius);padding:20px;}
.cust-card h3{margin:0 0 4px;font-size:17px;color:var(--navy);text-transform:none;font-family:'Inter',sans-serif;font-weight:700;}
.cust-card .addr{font-size:13px;color:var(--grey-mid);margin-bottom:10px;}
.cust-card .kv{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:13px;margin:12px 0;}
.cust-card .kv b{display:block;color:var(--grey-mid);font-size:11px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;margin-bottom:2px;}
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.status-badge.ok{background:var(--green-bg);color:#1f7a44;}
.status-badge.followup{background:var(--yellow-bg);color:#9a6c00;}
.status-badge.overdue{background:var(--red-bg);color:#a8233a;}
.status-badge.none{background:var(--grey);color:var(--grey-mid);}

/* ===== Pin action modal & AI ===== */
.pin-actions{display:flex;flex-direction:column;gap:8px;}
.pin-actions .btn{justify-content:flex-start;}
.drawing-pin.zone{background:var(--grey-mid);}
.drawing-pin{cursor:pointer;}
.drawing-pin.pin-green{background:var(--green);}
.drawing-pin.pin-yellow{background:var(--yellow);color:var(--ink);}

function loadDB(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const db = JSON.parse(raw);
      // migration: ensure new fields exist on older saved data
      db.config = db.config || {};
      db.config.suppliers = db.config.suppliers || ['Constructor','Dexion','Stow','AJ Produkter','Reoler A/S','Andet'];
      db.config.roles = db.config.roles || ['Lagerchef','Produktionschef','Teknisk chef','Ekstern montør'];
      db.config.locationTypes = db.config.locationTypes || ['Hal A','Hal B','Produktion','Pakkeri','Fryselager'];
      db.config.reolTypes = db.config.reolTypes || ['Pallereol','Grenreol','Dækreol','Småvarelager','Gennemløbsreol','Specialreol'];
      db.config.defectTypes = db.config.defectTypes || ['Påkørsel','Deformeret stolpe','Deformeret vange','Manglende bolt','Manglende sikringssplit','Manglende anker','Skæv diagonal','Rust/korrosion','Manglende belastningsskilt','Manglende påkørselsværn','Manglende rækværk','Andet'];
      db.pilotFeedback = db.pilotFeedback || [];
      const codeMap = {'cust-carletti':'CA','cust-bramidan':'BA','cust-reoler':'RA'};
      db.customers.forEach(c=>{
        if(!c.code) c.code = codeMap[c.id] || c.name.replace(/[^A-ZÆØÅa-zæøå]/g,'').slice(0,2).toUpperCase();
        if(!c.documents) c.documents = [];
        if(!c.locations) c.locations = [{name:'Hal A',archived:false},{name:'Hal B',archived:false}];
      });
      db.inspections.forEach(i=>{
        if(i.vurdering===undefined) i.vurdering = null;
        i.reoler.forEach(r=>{ if(r.hal===undefined) r.hal=''; if(r.reolraekke===undefined) r.reolraekke=''; });
      });
      return db;
    }
  }catch(e){}
  const fresh = seedDB();
  saveDB(fresh);
  return fresh;
}
function saveDB(db){ localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }

}

        <label>Fast virksomheds-mail (til automatiske påmindelser)</label>
        <input id="f_email" placeholder="fx drift@virksomhed.dk / lager@virksomhed.dk / facility@virksomhed.dk / sikkerhed@virksomhed.dk">

}

function createInspection(){
  const name = val('f_name').trim();
  if(!name){ toast('Indtast virksomhedsnavn'); return; }
  let customer = DB.customers.find(c=>c.name.toLowerCase()===name.toLowerCase());
  if(!customer){
    customer = {id:uid('cust'), name, address:val('f_address'), cvr:val('f_cvr'), contact:val('f_contact'), email:val('f_email')};
    DB.customers.push(customer);
  }
  const insp = {
    id:uid('insp'),
    customerId:customer.id,
    customerName:name,
    address:val('f_address')||customer.address,
    cvr:val('f_cvr')||customer.cvr,
    contact:val('f_contact')||customer.contact,
    email:val('f_email')||customer.email,
    date:val('f_date')||todayISO(),
    inspector:val('f_inspector')||'John Finmann',
    status:'open', vurdering:null,
    reportNumber:null,
    nextInspection:null,
    drawing:null,
    reoler:[],
    skader:[],
    signatures:{inspector:null, customer:null}
  };
  DB.inspections.push(insp);
  saveDB(DB);
  state.currentInspectionId = insp.id;
  state.wizardTab='stamdata';
  state.view='wizard';
  render();
  toast('Eftersyn oprettet — udfyld reolregister og skader');
}

function openInspection(id){

/* =========================================================
   WIZARD
========================================================= */
const WIZARD_TABS = [
  {key:'stamdata', n:1, label:'Stamdata'},
  {key:'tegning', n:2, label:'Tegning'},
  {key:'reoler', n:3, label:'Reolregister'},
  {key:'skader', n:4, label:'Skader'},
  {key:'underskrift', n:5, label:'Underskrift'},
  {key:'afslut', n:6, label:'Afslut'}
];

function renderWizard(){
  const insp = getInspection(state.currentInspectionId);
  if(!insp) return emptyState('⚠️','Eftersyn ikke fundet','Gå tilbage til forsiden.');

  const tabs = WIZARD_TABS.map(t=>{
    let done = false;
    if(t.key==='stamdata') done = !!insp.customerName;
    if(t.key==='tegning') done = !!insp.drawing;
    if(t.key==='reoler') done = insp.reoler.length>0;
    if(t.key==='skader') done = true; // optional
    if(t.key==='underskrift') done = !!(insp.signatures.inspector && insp.signatures.customer);
    if(t.key==='afslut') done = insp.status==='closed';
    return `<div class="tab ${state.wizardTab===t.key?'active':''} ${done?'done':''}" onclick="setWizardTab('${t.key}')">
      <span class="tn">${done?'✓':t.n}</span> ${t.label}
    </div>`;
  }).join('');

  return `
  <div class="wizard-head">
    <div class="meta">
      <h2>${esc(insp.customerName)}</h2>
      <div class="sub">${esc(insp.address||'')} · CVR <span class="mono">${esc(insp.cvr||'—')}</span> · Inspektør ${esc(insp.inspector)} · ${fmtDate(insp.date)}
      ${insp.status==='closed' ? `<br><span class="pill green" style="margin-top:6px">Afsluttet · Rapport ${esc(insp.reportNumber)}</span>`:''}
      </div>
    </div>
    ${insp.status==='open' ? `<button class="topbtn primary" onclick="state.view='openList';render()">📂 Åbne eftersyn</button>`:''}
  </div>
  <div class="tabbar">${tabs}</div>
  <div id="wizardContent">${renderWizardTab(insp)}</div>
  `;
}

function setWizardTab(key){
  if(key!=='reoler'){ state.editingReolIndex=null; state.reolForm=null; }
  state.wizardTab=key; render();
}

function renderWizardTab(insp){
  switch(state.wizardTab){
    case 'stamdata': return wizardStamdata(insp);
    case 'tegning': return wizardTegning(insp);
    case 'reoler': return wizardReoler(insp);
    case 'skader': return wizardSkader(insp);
    case 'underskrift': return wizardUnderskrift(insp);
    case 'afslut': return wizardAfslut(insp);
  }
}

/* ---- Tegning tab ---- */
const TEGNING_FILTERS = [
  {key:'alle', label:'Alle'},
  {key:'green', label:'Grøn'},
  {key:'yellow', label:'Gul'},
  {key:'red', label:'Rød'},
  {key:'open', label:'Åbne'},
  {key:'closed', label:'Lukkede'}
];

function reolStatus(insp, reolId){
  const sk = insp.skader.filter(s=>s.reolId===reolId);
  const everInspected = DB.inspections.some(i=>i.customerId===insp.customerId && i.skader.some(s=>s.reolId===reolId));
  if(sk.length===0 && !everInspected){
    return {color:'grey', label:'Ikke inspiceret', total:0, open:0, closed:0};
  }
  const open = sk.filter(s=>s.status!=='Lukket');
  let color='green';
  if(open.some(s=>s.classification==='red')) color='red';
  else if(open.some(s=>s.classification==='yellow')) color='yellow';
  const redCount = open.filter(s=>s.classification==='red').length;
  let label;
  if(sk.length===0) label='0 fejl';
  else if(redCount>0) label=`${redCount} kritisk${redCount>1?'e':''} fejl`;
  else label=`${sk.length} fejl`;
  return {color, label, total:sk.length, open:open.length, closed:sk.length-open.length};
}

function wizardTegning(insp){
  let content;
  if(insp.drawing){
    if(insp.drawing.type==='pdf'){
      content = `<embed src="${insp.drawing.data}" type="application/pdf">`;
    }else{
      content = `<img src="${insp.drawing.data}" alt="Tegning">`;
    }
  }else{
    content = `<span style="font-size:34px">🗺️</span><div><strong>Ingen tegning uploadet</strong></div><div style="font-size:13px">Upload lager-, produktions- eller bygningstegning (PDF, JPG, PNG)</div>`;
  }
  const isImage = insp.drawing && insp.drawing.type!=='pdf';
  const reolIds = insp.reoler.map(r=>r.id);
  const filter = state.tegningFilter || 'alle';

  const pinsHtml = isImage ? (insp.reolPins||[]).map(p=>{
    const isReol = reolIds.includes(p.name);
    let pinColor='grey', pinLabel=esc(p.name), match=true;
    if(isReol){
      const rs = reolStatus(insp, p.name);
      pinColor = rs.color;
      pinLabel = `${esc(p.name)} (${rs.label})`;
      if(filter==='green'||filter==='yellow'||filter==='red') match = (rs.color===filter);
      else if(filter==='open') match = rs.open>0;
      else if(filter==='closed') match = rs.total>0 && rs.open===0;
    }
    const dim = !match ? 'opacity:.2' : '';
    const hl = (state.tegningHighlight===p.uid) ? 'highlight' : '';
    return `<div class="drawing-pin pin-${isReol?pinColor:'zone'} ${hl}" style="left:${p.x}%;top:${p.y}%;${dim}" onclick="event.stopPropagation();onPinClick('${p.uid}')" title="${esc(p.name)}">${pinLabel}</div>`;
  }).join('') : '';

  const unplaced = insp.reoler.filter(r=>!(insp.reolPins||[]).some(p=>p.name===r.id));
  const hlPin = (insp.reolPins||[]).find(p=>p.uid===state.tegningHighlight);
  const zoomStyle = hlPin ? `transform:scale(2.2);transform-origin:${hlPin.x}% ${hlPin.y}%;transition:transform .3s ease;` : '';

  return `
  <div class="panel">
    <h2><span class="num">2</span> Tegninger og layout</h2>
    ${isImage ? `
    <div class="btn-row" style="margin-bottom:14px;margin-top:0">
      ${TEGNING_FILTERS.map(f=>`<button class="btn ${filter===f.key?'btn-primary':'btn-ghost'}" style="padding:9px 16px;font-size:13px" onclick="setTegningFilter('${f.key}')">${f.label}</button>`).join('')}
    </div>`:''}
    <div class="drawing-area" id="drawingArea" style="${hlPin?'overflow:hidden':''}" onclick="${isImage?'onDrawingClick(event)':''}">
      <div style="${zoomStyle}width:100%;height:100%;position:relative">${content}${pinsHtml}</div>
    </div>
    ${hlPin? `<div class="btn-row" style="margin-top:10px"><button class="btn btn-ghost" onclick="state.tegningHighlight=null;render()">🔍 Nulstil visning</button></div>`:''}
    <div class="btn-row">
      <label class="btn btn-ghost" style="cursor:pointer">
        📎 Upload tegning
        <input type="file" accept=".pdf,image/png,image/jpeg" style="display:none" onchange="uploadDrawing(event)">
      </label>
      ${insp.drawing? `<button class="btn btn-danger" onclick="removeDrawing()">Fjern tegning</button>` : ''}
      ${isImage? `<button class="btn ${state.pinAddMode?'btn-green':'btn-ghost'}" onclick="togglePinAddMode()">${state.pinAddMode?'📍 Tryk på tegningen for at placere pin':'➕ Tilføj reol-pin'}</button>`:''}
      ${state.pinMoveTarget? `<button class="btn btn-green" disabled style="cursor:default">📍 Tryk på tegningen for ny placering</button> <button class="btn btn-ghost" onclick="state.pinMoveTarget=null;render()">Annuller flyt</button>`:''}
      ${isImage? `<button class="btn btn-ghost" onclick="openScanQR()">📷 Scan QR</button>`:''}
      <button class="btn btn-ghost" onclick="suggestAI()">✨ AI foreslå reoler og zoner</button>
      <button class="btn btn-primary" onclick="setWizardTab('reoler')">Næste: Reolregister →</button>
    </div>
    ${isImage ? `<p style="font-size:12px;color:var(--grey-mid);margin-top:10px">Tegningen er hovednavigationen: grøn = OK, gul = reparation, rød = kritisk. Tryk på en reol-pin for at åbne reolkortet. Brug "Tilføj reol-pin" til at placere, omdøbe, flytte eller slette pins.</p>` : ''}
    ${isImage && unplaced.length ? `
      <div style="margin-top:14px">
        <div style="font-size:12px;font-weight:700;color:var(--grey-mid);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Reoler uden pin på tegningen</div>
        <div class="btn-row" style="margin-top:0">
          ${unplaced.map(r=>`<button class="btn btn-ghost" style="padding:8px 12px;font-size:13px" onclick="quickAddPin('${esc(r.id)}')">➕ ${esc(r.id)}</button>`).join('')}
        </div>
      </div>`:''}
  </div>`;
}
function setTegningFilter(key){ state.tegningFilter=key; render(); }
function quickAddPin(reolId){
  state.pendingPinName = reolId;
  state.pinAddMode = true;
  render();
  toast('Tryk på tegningen for at placere '+reolId);
}

function uploadDrawing(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const insp = getInspection(state.currentInspectionId);
    insp.drawing = {type: file.type==='application/pdf'?'pdf':'image', data: ev.target.result, name:file.name};
    insp.reolPins = insp.reolPins || [];
    saveDB(DB);
    render();
  };
  reader.readAsDataURL(file);
}
function removeDrawing(){
  const insp = getInspection(state.currentInspectionId);
  insp.drawing=null; insp.reolPins=[];
  state.pinAddMode=false; state.pinMoveTarget=null;
  saveDB(DB); render();
}
function togglePinAddMode(){
  state.pinAddMode = !state.pinAddMode;
  state.pinMoveTarget = null;
  render();
}
function onDrawingClick(e, dummy){
  const insp = getInspection(state.currentInspectionId);
  const area = document.getElementById('drawingArea');
  const rect = area.getBoundingClientRect();
  if(!e || !e.clientX) return; // safety for disabled placeholder button
  const x = ((e.clientX-rect.left)/rect.width*100).toFixed(1);
  const y = ((e.clientY-rect.top)/rect.height*100).toFixed(1);

  if(state.pinMoveTarget){
    const pin = (insp.reolPins||[]).find(p=>p.uid===state.pinMoveTarget);
    if(pin){ pin.x=x; pin.y=y; }
    state.pinMoveTarget=null;
    saveDB(DB); render();
    toast('Pin flyttet');
    return;
  }
  if(state.pinAddMode){
    let name = state.pendingPinName;
    if(!name){ name = prompt('Navn på pin (fx A1, Hal 1, Varemodtagelse):'); }
    if(name && name.trim()){
      insp.reolPins = insp.reolPins || [];
      insp.reolPins.push({uid:uid('pin'), name:name.trim(), x, y});
      saveDB(DB);
      toast('Pin "'+name.trim()+'" placeret');
    }
    state.pinAddMode=false;
    state.pendingPinName=null;
    render();
  }
}
function onPinClick(pinUid){
  const insp = getInspection(state.currentInspectionId);
  const pin = (insp.reolPins||[]).find(p=>p.uid===pinUid);
  if(!pin) return;
  const isReol = insp.reoler.some(r=>r.id===pin.name);
  const overlay = document.createElement('div');
  overlay.className='modal-overlay';
  overlay.id='pinModalOverlay';
  overlay.onclick=(e)=>{ if(e.target===overlay) closePinModal(); };
  overlay.innerHTML = `
    <div class="modal" style="max-width:380px">
      <button class="modal-close" onclick="closePinModal()">✕</button>
      <h2>Pin: ${esc(pin.name)}</h2>
      <div class="pin-actions">
        ${isReol? `<button class="btn btn-primary btn-block" onclick="closePinModal();showReolCard('${esc(pin.name)}')">🗄️ Åbn reolkort</button>`:''}
        <button class="btn btn-ghost btn-block" onclick="renamePin('${pinUid}')">✏️ Omdøb pin</button>
        <button class="btn btn-ghost btn-block" onclick="movePin('${pinUid}')">↔️ Flyt pin</button>
        <button class="btn btn-danger btn-block" onclick="deletePin('${pinUid}')">🗑️ Slet pin</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}
function closePinModal(){ const m=document.getElementById('pinModalOverlay'); if(m) m.remove(); }
function renamePin(pinUid){
  const insp = getInspection(state.currentInspectionId);
  const pin = (insp.reolPins||[]).find(p=>p.uid===pinUid);
  const name = prompt('Nyt navn for pin:', pin.name);
  if(name && name.trim()){ pin.name=name.trim(); saveDB(DB); }
  closePinModal(); render();
}
function movePin(pinUid){
  state.pinMoveTarget = pinUid;
  state.pinAddMode=false;
  closePinModal(); render();
  toast('Tryk på tegningen for at placere pinnen igen');
}
function deletePin(pinUid){
  const insp = getInspection(state.currentInspectionId);
  insp.reolPins = (insp.reolPins||[]).filter(p=>p.uid!==pinUid);
  saveDB(DB);
  closePinModal(); render();
}
function suggestAI(){
  alert('AI foreslå reoler og zoner\n\nKommer i version 2.\nAI vil kunne foreslå reoler, haller og zoner ud fra tegningen, men brugeren skal altid godkende før oprettelse.\n\nIngen reoler eller zoner oprettes automatisk.');
}

/* ---- Reol card (current + historical) ---- */
function showReolCard(reolId){
  const insp = getInspection(state.currentInspectionId);
  const reol = insp.reoler.find(r=>r.id===reolId);
  const rs = reolStatus(insp, reolId);
  // gather skader for this reolId across all inspections for the same customer
  const allForCustomer = DB.inspections.filter(i=>i.customerId===insp.customerId);
  const history = allForCustomer
    .flatMap(i=>i.skader.filter(s=>s.reolId===reolId).map(s=>({...s, reportNumber:i.reportNumber, inspDate:i.date, inspId:i.id, inspStatus:i.status})))
    .sort((a,b)=>b.inspDate.localeCompare(a.inspDate));
  const closedForCustomer = allForCustomer.filter(i=>i.status==='closed').sort((a,b)=>b.date.localeCompare(a.date));
  const last = closedForCustomer[0];

  const statusLabels = {green:'Grøn — OK',yellow:'Gul — Reparation',red:'Rød — Kritisk'};

  const overlay = document.createElement('div');
  overlay.className='modal-overlay';
  overlay.id='reolCardOverlay';
  overlay.onclick=(e)=>{ if(e.target===overlay) closeReolCard(); };
  overlay.innerHTML = `
    <div class="modal">
      <button class="modal-close" onclick="closeReolCard()">✕</button>
      <h2><span class="tag-id" style="font-size:15px">${esc(reolId)}</span> Reolkort 360 <span class="pill ${rs.color}" style="margin-left:8px">${statusLabels[rs.color]}</span></h2>
      ${reol? `
      <div class="formgrid" style="margin-bottom:10px">
        <div class="field"><label>Zone</label><input value="${esc(reol.zone)}" readonly></div>
        <div class="field"><label>Lokation</label><input value="${esc(reol.location)}" readonly></div>
        <div class="field"><label>Reoltype</label><input value="${esc(reol.type)}" readonly></div>
        <div class="field"><label>Producent</label><input value="${esc(reol.producer)}" readonly></div>
        <div class="field"><label>Belastningsskilt</label><input value="${reol.loadSign==='ja'?'Ja':'Nej'}" readonly></div>
        <div class="field"><label>Åbne skader</label><input value="${rs.open}" readonly></div>
        <div class="field"><label>Kritiske skader</label><input value="${insp.skader.filter(s=>s.reolId===reolId && s.status!=='Lukket' && s.classification==='red').length}" readonly></div>
      </div>` : `<p style="font-size:13px;color:var(--grey-mid)">Denne reol er ikke registreret i det aktuelle eftersyns reolregister, men har historiske data.</p>`}

      <div class="formgrid" style="margin-bottom:10px">
        <div class="field"><label>Seneste eftersyn</label><input value="${last?fmtDate(last.date)+' ('+last.reportNumber+')':'—'}" readonly></div>
        <div class="field"><label>Næste eftersyn</label><input value="${last?fmtDate(last.nextInspection):'—'}" readonly></div>
        <div class="field"><label>Antal fejl gennem tiden</label><input value="${history.length}" readonly></div>
      </div>

      ${(()=>{
        const openActions = history.filter(h=>h.status!=='Lukket');
        if(!openActions.length) return '';
        return `<h2 style="margin-top:18px;font-size:15px">Korrigerende handlinger (${openActions.length} åbne)</h2>
        ${openActions.map(h=>{
          const overdue = h.deadline && h.deadline<todayISO();
          return `<div class="report-list-item">
            <div class="info"><h4>${esc(h.defectType)} <span class="pill grey" style="margin-left:6px">${esc(h.status)}</span></h4>
            <div class="meta">${h.ansvarlig?'Ansvarlig: '+esc(h.ansvarlig):'Ingen ansvarlig'} ${h.deadline?'· Deadline: '+fmtDate(h.deadline):''}</div></div>
            ${overdue?'<span class="pill red">Overskredet</span>':''}
          </div>`;
        }).join('')}`;
      })()}

      <h2 style="margin-top:18px;font-size:15px">Historik — eftersyn, skader, billeder, kommentarer &amp; PDF'er (${history.length})</h2>
      ${history.length? (()=>{
        const byYear = {};
        history.forEach(h=>{ const y=h.inspDate.slice(0,4); (byYear[y]=byYear[y]||[]).push(h); });
        return Object.keys(byYear).sort((a,b)=>b-a).map(y=>`
          <div style="margin-bottom:10px">
            <div style="font-family:'Oswald',sans-serif;font-weight:700;color:var(--navy);font-size:15px;letter-spacing:.04em;margin-bottom:6px">${y}</div>
            ${byYear[y].map(h=>`
            <div class="dmg-card ${h.classification}" style="margin-bottom:8px">
              <div class="thumb">${h.photos&&h.photos[0]?`<img src="${h.photos[0]}">`:'📷'}</div>
              <div class="body">
                <div class="top">
                  <div><h4>${esc(h.defectType)}</h4><div class="meta">${fmtDate(h.inspDate)} · ${h.inspStatus==='closed'?'Rapport '+esc(h.reportNumber):'Igangværende eftersyn'}</div></div>

/* ---- QR codes ---- */
function qrDataUrl(text, size){
  size = size||128;
  try{
    const div = document.createElement('div');
    div.style.position='fixed'; div.style.left='-9999px';
    document.body.appendChild(div);
    new QRCode(div, {text, width:size, height:size});
    const canvas = div.querySelector('canvas');
    const url = canvas ? canvas.toDataURL('image/png') : null;
    document.body.removeChild(div);
    return url;
  }catch(e){ return null; }
}
function showQRModal(reolId){
  const insp = getInspection(state.currentInspectionId);
  const cust = DB.customers.find(c=>c.id===insp.customerId);
  const code = `QR-${cust?cust.code:'XX'}-${reolId}`;
  const overlay = document.createElement('div');
  overlay.className='modal-overlay'; overlay.id='genericModalOverlay';
  overlay.onclick=(e)=>{ if(e.target===overlay) closeGenericModal(); };
  overlay.innerHTML = `
    <div class="modal" style="max-width:320px;text-align:center">
      <button class="modal-close" onclick="closeGenericModal()">✕</button>
      <h2 class="mono" style="font-size:16px">${esc(code)}</h2>
      <div id="qrTarget" style="display:flex;justify-content:center;margin:14px 0"></div>
      <p style="font-size:12px;color:var(--grey-mid)">Print og montér på reolen. Scanning åbner: <strong>Kunde → Hal ${esc(insp.reoler.find(r=>r.id===reolId)?.zone||'')} → Reol ${esc(reolId)}</strong> → Reolkort. Registreres en skade, vælges reolen automatisk.</p>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(()=>{
    const target = document.getElementById('qrTarget');
    if(target && window.QRCode){ new QRCode(target, {text:code, width:160, height:160}); }
    else if(target){ target.innerHTML = '<div class="mono" style="font-size:11px;color:var(--grey-mid)">QR: '+esc(code)+'</div>'; }
  },0);
}
function handleQRScan(code){
  code = (code||'').trim().toUpperCase();
  const m = code.match(/^QR-([A-Z0-9]+)-(.+)$/);
  if(!m){ toast('Ugyldig QR-kode'); return; }
  const [,custCode,reolId] = m;
  const insp = getInspection(state.currentInspectionId);
  const cust = DB.customers.find(c=>c.id===insp.customerId);
  if(cust && cust.code.toUpperCase()!==custCode){
    const other = DB.customers.find(c=>c.code.toUpperCase()===custCode);
    toast('QR hører til '+(other?other.name:'en anden kunde')+' — åbn dette eftersyn for at se reolkortet');
    return;
  }
  closeGenericModal();
  toast(`${cust?cust.name:''} → Hal ${insp.reoler.find(r=>r.id===reolId)?.zone||'?'} → Reol ${reolId}`);
  showReolCard(reolId);
}

  const insp = getInspection(state.currentInspectionId);

  const cust = DB.customers.find(c=>c.id===insp.customerId);

  overlay.className='modal-overlay'; overlay.id='genericModalOverlay';
  overlay.onclick=(e)=>{ if(e.target===overlay) closeGenericModal(); };
  overlay.innerHTML = `
    <div class="modal" style="max-width:380px">

      <div class="field full" style="margin-bottom:14px">

        ${insp.reoler.map(r=>`<button class="btn btn-ghost btn-block" onclick="closeGenericModal();showReolCard('${esc(r.id)}')">${esc(r.id)} — ${esc(r.location)} <span class="mono" style="margin-left:auto;color:var(--grey-mid);font-size:11px">QR-${esc(cust?cust.code:'')}-${esc(r.id)}</span></button>`).join('')}

}

function saveReol(){
  const id = val('r_id').trim();
  if(!id){ toast('Indtast Reol-ID'); return; }
  const insp = getInspection(state.currentInspectionId);
  const editing = (state.editingReolIndex!==null && state.editingReolIndex!==undefined);
  const dup = insp.reoler.find((r,idx)=>r.id.toLowerCase()===id.toLowerCase() && idx!==state.editingReolIndex);
  if(dup){ toast('Reol-ID findes allerede'); return; }
  const data = {
    id, zone: val('r_zone'), hal: val('r_hal'), reolraekke: val('r_reolraekke'), location: val('r_location'), type: val('r_type'),
    producer: val('r_producer'), loadSign: val('r_loadsign'), notes: val('r_notes')
  };
  if(editing){
    const oldId = insp.reoler[state.editingReolIndex].id;
    insp.reoler[state.editingReolIndex] = data;
    if(oldId!==id){
      insp.skader.forEach(s=>{ if(s.reolId===oldId) s.reolId=id; });
      (insp.reolPins||[]).forEach(p=>{ if(p.name===oldId) p.name=id; });
    }
    toast('Reol '+id+' opdateret');
  }else{
    insp.reoler.push(data);
    toast('Reol '+id+' tilføjet');
  }
  saveDB(DB);
  state.editingReolIndex=null;
  state.reolForm=null;
  render();
}
function editReol(i){
  const insp = getInspection(state.currentInspectionId);
  state.editingReolIndex = i;
  state.reolForm = {...insp.reoler[i]};
  render();
}
function cancelEditReol(){
  state.editingReolIndex=null;
  state.reolForm=null;
  render();
}
function removeReol(i){
  const insp = getInspection(state.currentInspectionId);
  insp.reoler.splice(i,1);
  saveDB(DB); render();
}

function saveSkade(){
  const insp = getInspection(state.currentInspectionId);
  const cls = document.getElementById('tagclassRow').dataset.selected;
  if(!cls){ toast('Vælg skadeklassificering (grøn/gul/rød)'); return; }
  const reolId = val('m_reolId');
  if(!reolId){ toast('Vælg en reol'); return; }
  const data = {
    reolId, location: val('m_location'), desc: val('m_desc'),
    defectType: val('m_defectType'), classification: cls, status: val('m_status'),
    ansvarlig: val('m_ansvarlig'), deadline: val('m_deadline')||null,
    udfortDato: val('m_udfort')||null, kommentar: val('m_kommentar'),
    photos: state.newSkadePhotos.length ? state.newSkadePhotos.slice() : [placeholderPhoto('#7C8A99','Intet foto')],
    photosAfter: (state.newSkadePhotosAfter||[]).slice(),
    date: insp.date || todayISO()
  };
  if(val('m_status')==='Lukket' && !data.resolvedDate){ data.resolvedDate = data.udfortDato || todayISO(); }
  if(state.editingSkadeId){
    const idx = insp.skader.findIndex(s=>s.id===state.editingSkadeId);
    insp.skader[idx] = {...insp.skader[idx], ...data};
  }else{
    insp.skader.push({id:uid('sk'), ...data});
  }
  saveDB(DB);
  closeModal();
  render();
  toast('Skade gemt');
}

let sigPads = {};
function setupSigPad(canvasId, existingDataUrl){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ratio = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth*ratio;
  canvas.height = canvas.offsetHeight*ratio;
  const ctx = canvas.getContext('2d');
  ctx.scale(ratio,ratio);
  ctx.strokeStyle = '#0E2A45';
  ctx.lineWidth = 2.5;
  ctx.lineCap='round';
  let drawing=false, last=null;
  function pos(e){
    const r = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return {x:t.clientX-r.left, y:t.clientY-r.top};
  }
  function start(e){ drawing=true; last=pos(e); e.preventDefault(); }
  function move(e){
    if(!drawing) return;
    const p = pos(e);
    ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke();
    last=p; e.preventDefault();
  }
  function end(){ drawing=false; }
  canvas.addEventListener('mousedown',start);
  canvas.addEventListener('mousemove',move);
  canvas.addEventListener('mouseup',end);
  canvas.addEventListener('mouseleave',end);
  canvas.addEventListener('touchstart',start,{passive:false});
  canvas.addEventListener('touchmove',move,{passive:false});
  canvas.addEventListener('touchend',end);
  sigPads[canvasId]=canvas;
  if(existingDataUrl){
    const img = new Image();
    img.onload=()=>ctx.drawImage(img,0,0,canvas.offsetWidth,canvas.offsetHeight);
    img.src=existingDataUrl;
  }
}
function clearSig(which){
  const canvas = document.getElementById('sig'+which);
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  document.getElementById('sigStatus'+which).textContent='Ikke underskrevet';
  document.getElementById('sigStatus'+which).classList.remove('ok');
}

}

function selectVurdering(key){
  const insp = getInspection(state.currentInspectionId);
  insp.vurdering = key;
  saveDB(DB);
  document.querySelectorAll('#vurderingRow .tagclass').forEach(el=>el.classList.toggle('sel', el.dataset.cls===key));
}
function finishInspection(){
  const insp = getInspection(state.currentInspectionId);
  const closedCount = DB.inspections.filter(i=>i.status==='closed').length;
  insp.reportNumber = 'RS-'+ (new Date(insp.date)).getFullYear() + '-' + String(closedCount+1).padStart(4,'0');
  const next = new Date(insp.date);
  next.setMonth(next.getMonth()+12);
  insp.nextInspection = next.toISOString().slice(0,10);
  insp.status='closed';
  if(!insp.vurdering){
    const counts={green:0,yellow:0,red:0}; insp.skader.forEach(s=>{ if(s.status!=='Lukket') counts[s.classification]++; });
    insp.vurdering = counts.red>0 ? 'red' : (counts.yellow>0 ? 'yellow' : 'green');
  }
  saveDB(DB);
  render();
  toast('Eftersyn afsluttet — rapport '+insp.reportNumber+' oprettet');
}

function renderDashboard(){
  const all = DB.inspections;
  const allSkader = all.flatMap(i=>i.skader);
  const allReoler = all.flatMap(i=>i.reoler);
  const counts = {green:0,yellow:0,red:0};
  allSkader.forEach(s=>counts[s.classification]++);
  const open = allSkader.filter(s=>s.status!=='Lukket').length;
  const closedSk = allSkader.filter(s=>s.status==='Lukket').length;
  const total = allSkader.length || 1;
  const today = todayISO();

  const critical = allSkader.filter(s=>s.classification==='red' && s.status!=='Lukket');
  const overdue = allSkader.filter(s=>s.deadline && s.status!=='Lukket' && s.deadline<today);

  // Top fejl
  const defectCounts = {};
  allSkader.forEach(s=>defectCounts[s.defectType]=(defectCounts[s.defectType]||0)+1);

  // Customers: upcoming inspections & follow-up needed
  const customerInfo = DB.customers.map(c=>{
    const insps = DB.inspections.filter(i=>i.customerId===c.id);
    const closedInsps = insps.filter(i=>i.status==='closed').sort((a,b)=>b.date.localeCompare(a.date));
    const next = closedInsps[0]?closedInsps[0].nextInspection:null;
    const allSk = insps.flatMap(i=>i.skader);
    const openSk = allSk.filter(s=>s.status!=='Lukket');
    // year-over-year improvement (latest two closed inspections)
    let improvement = null;
    if(closedInsps.length>=2){
      const latest = closedInsps[0].skader.length, prev = closedInsps[1].skader.length;
      if(prev>0) improvement = Math.round((latest-prev)/prev*100);
    }
    return {id:c.id, name:c.name, next, openCount:openSk.length, critCount:openSk.filter(s=>s.classification==='red').length, totalSkader:allSk.length, improvement};
  });
  const upcoming = customerInfo.filter(c=>c.next && c.next>=today && daysBetween(today,c.next)<=60).sort((a,b)=>a.next.localeCompare(b.next));
  const needsFollowup = customerInfo.filter(c=>c.openCount>0);
  const overdueCustomers = customerInfo.filter(c=>c.next && c.next<today);
  const improved = customerInfo.filter(c=>c.improvement!==null && c.improvement<0).sort((a,b)=>a.improvement-b.improvement);

  // top10 lokationer / reoler (all years)
  const locCounts={}, reolCounts={};
  allSkader.forEach(s=>{
    locCounts[s.location||'Ukendt']=(locCounts[s.location||'Ukendt']||0)+1;
    reolCounts[s.reolId]=(reolCounts[s.reolId]||0)+1;
  });
  const top10Loc = Object.entries(locCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const top10Reol = Object.entries(reolCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxLoc10 = top10Loc.length? top10Loc[0][1]:1;
  const maxReol10 = top10Reol.length? top10Reol[0][1]:1;

  // kritiske fejl pr. måned
  const monthCounts={};
  allSkader.filter(s=>s.classification==='red').forEach(s=>{ const mo=s.date.slice(0,7); monthCounts[mo]=(monthCounts[mo]||0)+1; });
  const months = Object.entries(monthCounts).sort((a,b)=>a[0].localeCompare(b[0]));
  const maxMonth = months.length? Math.max(...months.map(m=>m[1])):1;

  const allKpiClosed = DB.inspections.filter(i=>i.status==='closed' && i.nextInspection).map(i=>i.nextInspection).sort();
  const nextEftersyn = allKpiClosed.find(d=>d>=today) || allKpiClosed[0] || null;

  const top10 = Object.entries(defectCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxTop10 = top10.length? top10[0][1] : 1;

  const reolZone={}; DB.inspections.forEach(i=>i.reoler.forEach(r=>{ if(!reolZone[r.id]) reolZone[r.id]=r.hal||r.zone; }));
  const haleCounts={};
  allSkader.forEach(s=>{ const hal=reolZone[s.reolId]||'Ukendt'; haleCounts[hal]=(haleCounts[hal]||0)+1; });
  const topHal = Object.entries(haleCounts).sort((a,b)=>b[1]-a[1]);
  const maxHal = topHal.length? topHal[0][1] : 1;

  const closedInspsAll = DB.inspections.filter(i=>i.status==='closed');
  const vurderingCounts = {green:0,yellow:0,red:0};
  closedInspsAll.forEach(i=>{ if(i.vurdering) vurderingCounts[i.vurdering]++; });

  return `
  <div class="stat-grid">
    <div class="stat-card"><div class="n">${DB.customers.length}</div><div class="l">Kunder</div></div>
    <div class="stat-card"><div class="n">${all.length}</div><div class="l">Eftersyn</div></div>
    <div class="stat-card"><div class="n">${allReoler.length}</div><div class="l">Reoler</div></div>
    <div class="stat-card"><div class="n">${allSkader.length}</div><div class="l">Skader i alt</div></div>
    <div class="stat-card red"><div class="n">${critical.length}</div><div class="l">Kritiske fejl (åbne)</div></div>
    <div class="stat-card"><div class="n">${open}</div><div class="l">Åbne fejl</div></div>
    <div class="stat-card green"><div class="n">${closedSk}</div><div class="l">Lukkede fejl</div></div>
    <div class="stat-card red"><div class="n">${overdue.length}</div><div class="l">Overskredne deadlines</div></div>
    <div class="stat-card"><div class="n" style="font-size:22px">${nextEftersyn?fmtDate(nextEftersyn):'—'}</div><div class="l">Næste eftersyn</div></div>
  </div>

  <div class="formgrid">
    <div class="panel">
      <h2>Top 10 fejl</h2>
      ${top10.length? `<div class="bars">${top10.map(([d,c])=>`<div class="bar-row"><div class="label">${esc(d)}</div><div class="bar-track"><div class="bar-fill" style="width:${c/maxTop10*100}%;background:var(--navy)"></div></div><div class="val">${c}</div></div>`).join('')}</div>` : '<p style="font-size:13px;color:var(--grey-mid)">Ingen skader registreret endnu.</p>'}
    </div>
    <div class="panel">
      <h2>Top fejl pr. hal</h2>
      ${topHal.length? `<div class="bars">${topHal.map(([h,c])=>`<div class="bar-row"><div class="label">${esc(h)}</div><div class="bar-track"><div class="bar-fill" style="width:${c/maxHal*100}%;background:var(--navy-2)"></div></div><div class="val">${c}</div></div>`).join('')}</div>` : '<p style="font-size:13px;color:var(--grey-mid)">Ingen data.</p>'}
    </div>
  </div>

  <div class="formgrid">
    <div class="panel">
      <h2>Samlet vurdering (alle afsluttede eftersyn)</h2>
      <div class="formgrid">
        <div class="stat-card green"><div class="n">${vurderingCounts.green}</div><div class="l">🟢 Godkendt</div></div>
        <div class="stat-card yellow"><div class="n">${vurderingCounts.yellow}</div><div class="l">🟡 Med bemærkninger</div></div>
        <div class="stat-card red"><div class="n">${vurderingCounts.red}</div><div class="l">🔴 Ikke godkendt</div></div>
      </div>
    </div>
    <div class="panel">
      <h2>Kunder med flest fejl</h2>
      ${customerInfo.length? customerInfo.slice().sort((a,b)=>b.totalSkader-a.totalSkader).slice(0,5).map(c=>`<div class="report-list-item"><div class="info"><h4>${esc(c.name)}</h4><div class="meta">${c.totalSkader} skader i alt</div></div>${c.critCount?`<span class="pill red">${c.critCount} kritisk</span>`:''}</div>`).join('') : '<p style="font-size:13px;color:var(--grey-mid)">Ingen data.</p>'}
    </div>
  </div>

  <div class="formgrid">
    <div class="panel">
      <h2>Top 10 lokationer</h2>
      ${top10Loc.length? `<div class="bars">${top10Loc.map(([l,c])=>`<div class="bar-row"><div class="label" title="${esc(l)}">${esc(l.length>22?l.slice(0,20)+'…':l)}</div><div class="bar-track"><div class="bar-fill" style="width:${c/maxLoc10*100}%;background:var(--navy)"></div></div><div class="val">${c}</div></div>`).join('')}</div>` : '<p style="font-size:13px;color:var(--grey-mid)">Ingen data.</p>'}
    </div>
    <div class="panel">
      <h2>Top 10 reoler</h2>
      ${top10Reol.length? `<div class="bars">${top10Reol.map(([r,c])=>`<div class="bar-row"><div class="label mono">${esc(r)}</div><div class="bar-track"><div class="bar-fill" style="width:${c/maxReol10*100}%;background:var(--navy)"></div></div><div class="val">${c}</div></div>`).join('')}</div>` : '<p style="font-size:13px;color:var(--grey-mid)">Ingen data.</p>'}
    </div>
  </div>

  <div class="formgrid">
    <div class="panel">
      <h2>Kritiske fejl pr. måned</h2>
      ${months.length? `<div class="bars">${months.map(([mo,c])=>`<div class="bar-row"><div class="label">${mo}</div><div class="bar-track"><div class="bar-fill" style="width:${c/maxMonth*100}%;background:var(--red)"></div></div><div class="val">${c}</div></div>`).join('')}</div>` : '<p style="font-size:13px;color:var(--grey-mid)">Ingen kritiske skader registreret endnu.</p>'}

      ${improved.length? improved.slice(0,5).map(c=>`<div class="report-list-item"><div class="info"><h4>${esc(c.name)}</h4><div class="meta">Færre skader end ved seneste eftersyn</div></div><span class="pill green">${c.improvement}%</span></div>`).join('') : '<p style="font-size:13px;color:var(--grey-mid)">Endnu ikke nok historik (kræver mindst 2 afsluttede eftersyn pr. kunde).</p>'}

  <div class="formgrid">
    <div class="panel">
      <h2>Overskredne eftersyn</h2>
      ${overdueCustomers.length? overdueCustomers.map(c=>`<div class="report-list-item"><div class="info"><h4>${esc(c.name)}</h4><div class="meta">Næste eftersyn var ${fmtDate(c.next)}</div></div><span class="pill red">${daysBetween(c.next,today)} dage forsinket</span></div>`).join('') : '<p style="font-size:13px;color:var(--grey-mid)">Ingen overskredne eftersyn.</p>'}
    </div>
    <div class="panel">
      <h2>Kunder med kommende eftersyn (60 dage)</h2>
      ${upcoming.length? upcoming.map(c=>`<div class="report-list-item"><div class="info"><h4>${esc(c.name)}</h4><div class="meta">Næste eftersyn ${fmtDate(c.next)}</div></div><span class="pill grey">${daysBetween(today,c.next)} dage</span></div>`).join('') : '<p style="font-size:13px;color:var(--grey-mid)">Ingen eftersyn forfalder inden for 60 dage.</p>'}
    </div>
    <div class="panel">
      <h2>Kunder med manglende opfølgning</h2>
      ${needsFollowup.length? needsFollowup.map(c=>`<div class="report-list-item"><div class="info"><h4>${esc(c.name)}</h4><div class="meta">${c.openCount} åbne skade${c.openCount===1?'':'r'}${c.critCount?', heraf '+c.critCount+' kritisk':''}</div></div><span class="pill ${c.critCount?'red':'yellow'}">${c.critCount?'Kritisk':'Opfølgning'}</span></div>`).join('') : '<p style="font-size:13px;color:var(--grey-mid)">Alle kunder er ajour — ingen åbne skader.</p>'}
    </div>
  </div>

  <div class="panel">
    <h2>Skadeklassificering</h2>
    <div class="bars">
      <div class="bar-row"><div class="label">Grøn</div><div class="bar-track"><div class="bar-fill" style="width:${counts.green/total*100}%;background:var(--green)"></div></div><div class="val">${counts.green}</div></div>
      <div class="bar-row"><div class="label">Gul</div><div class="bar-track"><div class="bar-fill" style="width:${counts.yellow/total*100}%;background:var(--yellow)"></div></div><div class="val">${counts.yellow}</div></div>
      <div class="bar-row"><div class="label">Rød</div><div class="bar-track"><div class="bar-fill" style="width:${counts.red/total*100}%;background:var(--red)"></div></div><div class="val">${counts.red}</div></div>
    </div>
  </div>
  `;
}

/* =========================================================
   CUSTOMER ARCHIVE (basic, functional)
========================================================= */
function renderCustomerArchive(){
  const today = todayISO();
  return `
  <div class="panel">
    <h2>Kundearkiv (${DB.customers.length})</h2>
    <p style="font-size:13px;color:var(--grey-mid);margin-top:-6px">Status: <span class="status-badge ok" style="padding:2px 9px">OK</span> ingen åbne kritiske skader og eftersyn ikke overskredet · <span class="status-badge followup" style="padding:2px 9px">Kræver opfølgning</span> åbne røde/gule skader · <span class="status-badge overdue" style="padding:2px 9px">Eftersyn overskredet</span> næste eftersyn er passeret.</p>
  </div>
  <div class="cust-grid">
  ${DB.customers.map(c=>{
    const insps = DB.inspections.filter(i=>i.customerId===c.id);
    const closedInsps = insps.filter(i=>i.status==='closed').sort((a,b)=>b.date.localeCompare(a.date));
    const last = closedInsps[0];
    const next = last ? last.nextInspection : null;
    const allSkader = insps.flatMap(i=>i.skader);
    const openSkader = allSkader.filter(s=>s.status!=='Lukket');
    const critical = openSkader.filter(s=>s.classification==='red');

    let status, statusClass;
    if(!last){ status='Intet eftersyn endnu'; statusClass='none'; }
    else if(next && next < today){ status='Eftersyn overskredet'; statusClass='overdue'; }
    else if(critical.length>0){ status='Kræver opfølgning'; statusClass='followup'; }
    else if(openSkader.length>0){ status='Kræver opfølgning'; statusClass='followup'; }
    else{ status='OK'; statusClass='ok'; }

    return `
    <div class="cust-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap">
        <div>
          <h3>${esc(c.name)}</h3>
          <div class="addr">${esc(c.address||'Ingen adresse')}</div>
        </div>
        <span class="status-badge ${statusClass}">${status}</span>
        ${last && last.vurdering ? `<span class="pill ${last.vurdering}" style="font-size:11px">${VURDERING_META[last.vurdering].emoji} ${VURDERING_META[last.vurdering].label}</span>`:''}
      </div>
      <div class="kv">
        <div><b>CVR</b>${esc(c.cvr||'—')}</div>
        <div><b>Kontaktperson</b>${esc(c.contact||'—')}</div>
        <div><b>Fast eftersyns-mail</b>${esc(c.email||'—')}</div>
        <div><b>Sidste eftersyn</b>${last?fmtDate(last.date):'—'}</div>
        <div><b>Næste eftersyn</b>${next?fmtDate(next):'—'}</div>
        <div><b>Åbne / kritiske skader</b>${openSkader.length} / <span style="color:${critical.length?'var(--red)':'inherit'};font-weight:700">${critical.length}</span></div>
      </div>
      ${(()=>{
        if(closedInsps.length<1) return '';
        const byYear = closedInsps.slice().sort((a,b)=>a.date.localeCompare(b.date));
        const rows = byYear.map((i,idx)=>{
          const sk=i.skader; const crit=sk.filter(s=>s.classification==='red').length;
          const openN=sk.filter(s=>s.status!=='Lukket').length; const closedN=sk.length-openN;
          const prev = idx>0? byYear[idx-1].skader.length : null;
          const change = prev!==null && prev>0 ? Math.round((sk.length-prev)/prev*100) : null;
          return {year:i.date.slice(0,4), total:sk.length, crit, openN, closedN, change};
        });
        return `
        <div style="font-size:12px;font-weight:700;color:var(--grey-mid);text-transform:uppercase;letter-spacing:.08em;margin-top:10px;margin-bottom:6px">Benchmark mellem år</div>
        <table>
          <thead><tr><th>År</th><th>Fejl</th><th>Kritiske</th><th>Åbne</th><th>Lukkede</th><th>Udvikling</th></tr></thead>
          <tbody>
            ${rows.map(r=>`<tr>
              <td><strong>${r.year}</strong></td><td>${r.total}</td><td>${r.crit}</td><td>${r.openN}</td><td>${r.closedN}</td>
              <td>${r.change===null?'—':(r.change<=0?`<span class="pill green">↓ ${r.change}%</span>`:`<span class="pill red">↑ +${r.change}%</span>`)}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
      })()}
      ${closedInsps.length? `
      <div style="font-size:12px;font-weight:700;color:var(--grey-mid);text-transform:uppercase;letter-spacing:.08em;margin-top:10px;margin-bottom:6px">Tidligere rapporter</div>
      <div class="btn-row" style="margin-top:0">
        ${closedInsps.map(i=>`<button class="btn btn-ghost" style="padding:8px 12px;font-size:12px" onclick="generatePDF('${i.id}')">📄 ${esc(i.reportNumber)} · ${fmtDate(i.date)}</button>`).join('')}
      </div>` : `<p style="font-size:13px;color:var(--grey-mid);margin-top:10px">Ingen afsluttede eftersyn endnu.</p>`}

      <div style="font-size:12px;font-weight:700;color:var(--grey-mid);text-transform:uppercase;letter-spacing:.08em;margin-top:14px;margin-bottom:6px">Dokumentarkiv (${(c.documents||[]).length})</div>
      ${(c.documents||[]).length>3 ? `<input id="docsearch_${c.id}" placeholder="🔎 Søg i dokumenter..." oninput="filterCustomerDocs('${c.id}',this.value)" style="border:1.5px solid var(--grey-line);border-radius:10px;padding:9px 12px;font-size:13px;width:100%;margin-bottom:8px">`:''}
      <div id="docsList_${c.id}" class="btn-row" style="margin-top:0">${renderCustomerDocButtons(c)}</div>
      ${!(c.documents||[]).length? `<p style="font-size:13px;color:var(--grey-mid);margin-top:0">Ingen dokumenter uploadet.</p>`:''}
      <div class="btn-row" style="margin-top:8px">
        ${DOC_TYPES.map(t=>`
          <label class="btn btn-ghost" style="padding:8px 12px;font-size:12px;cursor:pointer">
            ➕ ${t.label}
            <input type="file" accept="application/pdf,image/*" style="display:none" onchange="uploadCustomerDoc('${c.id}','${t.label}',event)">
          </label>`).join('')}
      </div>
    </div>`;
  }).join('')}
  </div>`;
}
const DOC_TYPES = [
  {label:'Tegninger', icon:'🗺️'}, {label:'Belastningsskilte', icon:'🏷️'}, {label:'Certifikater', icon:'📜'},
  {label:'Montagevejledninger', icon:'🔧'}, {label:'Inspektionsrapporter', icon:'📋'}, {label:'Reparationsrapporter', icon:'🛠️'},
  {label:'Billeder', icon:'🖼️'}, {label:'Andet', icon:'📄'}
];
function renderCustomerDocButtons(c, filter){
  filter = (filter||'').toLowerCase();
  const docs = (c.documents||[]).filter(d=>!filter || d.name.toLowerCase().includes(filter) || d.type.toLowerCase().includes(filter));
  if(!docs.length) return filter ? `<p style="font-size:13px;color:var(--grey-mid)">Ingen dokumenter matcher "${esc(filter)}".</p>` : '';
  return docs.map(d=>{
    const di = c.documents.indexOf(d);
    const icon = (DOC_TYPES.find(t=>t.label===d.type)||{}).icon || '📄';
    return `<button class="btn btn-ghost" style="padding:8px 12px;font-size:12px" onclick="${d.data&&d.data.startsWith('data:image')?`viewCustomerDocImage('${esc(d.data)}')`:`toast('${esc(d.name)}')`}">${icon} ${esc(d.name)} <span class="pill grey" style="margin-left:6px;font-size:10px">${esc(d.type)}</span> <span style="margin-left:6px;opacity:.5" onclick="event.stopPropagation();removeCustomerDoc('${c.id}',${di})">✕</span></button>`;
  }).join('');
}
function filterCustomerDocs(custId, term){
  const c = DB.customers.find(x=>x.id===custId);
  document.getElementById('docsList_'+custId).innerHTML = renderCustomerDocButtons(c, term);
}
function uploadCustomerDoc(custId, type, e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    const c = DB.customers.find(x=>x.id===custId);
    c.documents = c.documents || [];
    c.documents.push({name:file.name, type, data:ev.target.result, dateAdded:todayISO()});
    saveDB(DB); render();
    toast(type+' "'+file.name+'" uploadet');
  };
  reader.readAsDataURL(file);
}
function removeCustomerDoc(custId, idx){
  const c = DB.customers.find(x=>x.id===custId);
  c.documents.splice(idx,1);
  saveDB(DB); render();
}
function viewCustomerDocImage(data){
  const overlay = document.createElement('div');
  overlay.className='modal-overlay'; overlay.id='genericModalOverlay';
  overlay.onclick=(e)=>{ if(e.target===overlay) closeGenericModal(); };
  overlay.innerHTML = `<div class="modal" style="max-width:480px;text-align:center"><button class="modal-close" onclick="closeGenericModal()">✕</button><img src="${data}" style="max-width:100%;border-radius:8px;border:1px solid var(--grey-line)"></div>`;
  document.body.appendChild(overlay);
}

/* =========================================================
   HISTORIK (Kunde -> År -> Eftersyn -> Rapport/Billeder/Skader/Underskrifter)
========================================================= */
function toggleHist(key){ state.histExpand[key] = !state.histExpand[key]; render(); }

function renderHistory(){
  const rows = DB.customers.map(c=>{
    const insps = DB.inspections.filter(i=>i.customerId===c.id && i.status==='closed').sort((a,b)=>b.date.localeCompare(a.date));
    if(!insps.length) return '';
    const years = [...new Set(insps.map(i=>i.date.slice(0,4)))].sort((a,b)=>b-a);
    const expC = !!state.histExpand[c.id];
    return `<div class="hist-customer">
      <div class="hist-row" onclick="toggleHist('${c.id}')">
        <strong>🏢 ${esc(c.name)}</strong>
        <span>${expC?'▾':'▸'} ${insps.length} arkiveret${insps.length===1?'':'e'} eftersyn</span>
      </div>
      ${expC ? years.map(y=>{
        const yearInsps = insps.filter(i=>i.date.startsWith(y));
        const key = c.id+'-'+y;
        const expY = !!state.histExpand[key];
        return `<div class="hist-year">
          <div class="hist-row sub" onclick="toggleHist('${key}')">📅 ${y}<span>${expY?'▾':'▸'} ${yearInsps.length}</span></div>
          ${expY ? yearInsps.map(i=>{
            const photoCount = i.skader.reduce((a,s)=>a+(s.photos?s.photos.length:0),0);
            return `<div class="hist-insp">
              <div><strong>Reoleftersyn ${fmtDate(i.date)}</strong> <span class="mono" style="font-size:12px;color:var(--grey-mid)">${esc(i.reportNumber)}</span></div>
              <div class="meta" style="font-size:12px;color:var(--grey-mid);margin-top:2px">${i.reoler.length} reoler · ${i.skader.length} skader · næste eftersyn ${fmtDate(i.nextInspection)}</div>
              <div class="btn-row" style="margin-top:10px">
                <button class="btn btn-ghost" style="padding:9px 14px;font-size:13px" onclick="generatePDF('${i.id}')">📄 PDF</button>
                <button class="btn btn-ghost" style="padding:9px 14px;font-size:13px" onclick="showImagesModal('${i.id}')">🖼️ Billeder (${photoCount})</button>
                <button class="btn btn-ghost" style="padding:9px 14px;font-size:13px" onclick="state.currentInspectionId='${i.id}';state.wizardTab='skader';state.view='wizard';render()">⚠️ Skader (${i.skader.length})</button>
                <button class="btn btn-ghost" style="padding:9px 14px;font-size:13px" onclick="showSignaturesModal('${i.id}')">✍️ Underskrifter</button>
              </div>
            </div>`;
          }).join('') : ''}
        </div>`;
      }).join('') : ''}
    </div>`;
  }).join('');

  return `
  <div class="panel">
    <h2>Historik</h2>
    <p style="font-size:13px;color:var(--grey-mid)">Struktur: <strong>Kunde → år → eftersyn</strong> → rapport (PDF), billeder, skader og underskrifter. Alt arkiveres automatisk ved afslutning af et eftersyn — intet kan slettes herfra.</p>
    ${rows || emptyState('📚','Ingen arkiverede eftersyn','Afslut et eftersyn for at se det i historikken.')}
  </div>`;
}

function closeGenericModal(){ const m=document.getElementById('genericModalOverlay'); if(m) m.remove(); }

/* =========================================================
   STATISTIK (flere år)
========================================================= */
function renderStats(){
  const years = [...new Set(DB.inspections.map(i=>i.date.slice(0,4)))].sort();
  const skaderByYear = {};
  years.forEach(y=>skaderByYear[y]=[]);
  DB.inspections.forEach(i=>{
    const y = i.date.slice(0,4);
    i.skader.forEach(s=>skaderByYear[y].push({...s, customer:i.customerName}));
  });
  const allSkader = years.flatMap(y=>skaderByYear[y]);

  const eftersynByYear = {};
  years.forEach(y=>eftersynByYear[y]=DB.inspections.filter(i=>i.date.startsWith(y)).length);

  const maxTotal = Math.max(1, ...years.map(y=>skaderByYear[y].length));

  // top defects
  const defectCounts={};
  allSkader.forEach(s=>defectCounts[s.defectType]=(defectCounts[s.defectType]||0)+1);
  const topDefects = Object.entries(defectCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxDefect = topDefects.length? topDefects[0][1] : 1;

  // by location
  const locCounts={};
  allSkader.forEach(s=>locCounts[s.location||'Ukendt']=(locCounts[s.location||'Ukendt']||0)+1);
  const topLoc = Object.entries(locCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxLoc = topLoc.length? topLoc[0][1] : 1;

  // by reol
  const reolCounts={};
  allSkader.forEach(s=>reolCounts[s.reolId]=(reolCounts[s.reolId]||0)+1);
  const topReol = Object.entries(reolCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxReol = topReol.length? topReol[0][1] : 1;

  // by zone (lookup zone from any inspection's reolregister)
  const reolZone = {};
  DB.inspections.forEach(i=>i.reoler.forEach(r=>{ if(!reolZone[r.id]) reolZone[r.id]=r.hal||r.zone; }));
  const zoneCounts={};
  allSkader.forEach(s=>{ const z=reolZone[s.reolId]||'Ukendt'; zoneCounts[z]=(zoneCounts[z]||0)+1; });
  const topZone = Object.entries(zoneCounts).sort((a,b)=>b[1]-a[1]);
  const maxZone = topZone.length? topZone[0][1] : 1;

  // avg resolution time
  const resolved = allSkader.filter(s=>s.resolvedDate);
  const avgDays = resolved.length ? Math.round(resolved.reduce((a,s)=>a+daysBetween(s.date,s.resolvedDate),0)/resolved.length) : null;

  return `
  <div class="panel">
    <h2>Statistik — udvikling over flere år</h2>
    <table>
      <thead><tr><th>År</th><th>Eftersyn</th><th>Skader i alt</th><th>Grøn</th><th>Gul</th><th>Rød</th><th>Vurdering</th></tr></thead>
      <tbody>
        ${years.map(y=>{
          const sk=skaderByYear[y];
          const c={green:0,yellow:0,red:0}; sk.forEach(s=>c[s.classification]++);
          const yearInsps = DB.inspections.filter(i=>i.date.startsWith(y) && i.status==='closed' && i.vurdering);
          const vBadges = yearInsps.map(i=>`<span class="pill ${i.vurdering}" title="${esc(i.customerName)}" style="font-size:10px">${VURDERING_META[i.vurdering].emoji}</span>`).join(' ');
          return `<tr>
            <td><strong>${y}</strong></td>
            <td>${eftersynByYear[y]}</td>
            <td>${sk.length}</td>
            <td><span class="pill green">${c.green}</span></td>
            <td><span class="pill yellow">${c.yellow}</span></td>
            <td><span class="pill red">${c.red}</span></td>
            <td>${vBadges||'—'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    <div class="bars" style="margin-top:18px">
      ${years.map(y=>`<div class="bar-row"><div class="label">${y}</div><div class="bar-track"><div class="bar-fill" style="width:${skaderByYear[y].length/maxTotal*100}%;background:var(--navy)"></div></div><div class="val">${skaderByYear[y].length}</div></div>`).join('')}
    </div>
  </div>

  <div class="panel">
    <h2>Top 10 fejltyper (alle år)</h2>
    ${topDefects.length? `<div class="bars">
      ${topDefects.map(([d,c])=>`<div class="bar-row"><div class="label">${esc(d)}</div><div class="bar-track"><div class="bar-fill" style="width:${c/maxDefect*100}%;background:var(--navy)"></div></div><div class="val">${c}</div></div>`).join('')}
    </div>` : '<p style="font-size:13px;color:var(--grey-mid)">Ingen skader registreret endnu.</p>'}
  </div>

  <div class="formgrid">
    <div class="panel">
      <h2>Skader pr. lokation</h2>
      <div class="bars">
        ${topLoc.map(([l,c])=>`<div class="bar-row"><div class="label" title="${esc(l)}">${esc(l.length>22?l.slice(0,20)+'…':l)}</div><div class="bar-track"><div class="bar-fill" style="width:${c/maxLoc*100}%;background:var(--navy-2)"></div></div><div class="val">${c}</div></div>`).join('') || '<p style="font-size:13px;color:var(--grey-mid)">Ingen data.</p>'}
      </div>
    </div>
    <div class="panel">
      <h2>Skader pr. reol</h2>
      <div class="bars">
        ${topReol.map(([r,c])=>`<div class="bar-row"><div class="label mono">${esc(r)}</div><div class="bar-track"><div class="bar-fill" style="width:${c/maxReol*100}%;background:var(--navy-2)"></div></div><div class="val">${c}</div></div>`).join('') || '<p style="font-size:13px;color:var(--grey-mid)">Ingen data.</p>'}
      </div>
    </div>
  </div>

  <div class="formgrid">
    <div class="panel">

/* =========================================================
   AUTOMATISKE PÅMINDELSER (simuleret mail-log)
========================================================= */
function addDays(dateStr, days){
  const d = new Date(dateStr);
  d.setDate(d.getDate()+days);
  return d.toISOString().slice(0,10);
}
function buildMailLog(){
  const today = todayISO();
  const entries = [];
  DB.inspections.filter(i=>i.status==='closed' && i.nextInspection).forEach(i=>{
    [60,30,7].forEach(daysBefore=>{
      const sendDate = addDays(i.nextInspection, -daysBefore);
      const status = sendDate <= today ? 'sendt' : 'planlagt';
      entries.push({
        customer:i.customerName, to:i.email||'(ingen fast mail registreret)',
        subject:`Påmindelse: Reoleftersyn ${daysBefore===7?'inden 7 dage':'inden '+daysBefore+' dage'} — ${i.customerName}`,
        sendDate, status, daysBefore,
        body:`Til: ${i.email||'drift@firma.dk'}\nEmne: Påmindelse om kommende reoleftersyn\n\nKære ${i.contact||'kontaktperson'},\n\nDette er en automatisk påmindelse fra ReolScan Pro (Drift & Sikkerhed).\n\nSeneste reoleftersyn: ${fmtDate(i.date)}\nNæste planlagte eftersyn: ${fmtDate(i.nextInspection)} (om ${daysBefore} dage)\n\nKontakt: ${i.inspector}\nLink til booking: https://driftogsikkerhed.dk/book-eftersyn\n\nMed venlig hilsen\nReolScan Pro`
      });
    });
  });
  // one illustrative "fejl" example for demo richness
  entries.push({
    customer:'Bramidan A/S', to:'facility@bramidan.dk',
    subject:'Påmindelse: Reoleftersyn inden 60 dage — Bramidan A/S',
    sendDate:'2025-12-01', status:'fejl', daysBefore:60,
    body:'Til: facility@bramidan.dk\nEmne: Påmindelse om kommende reoleftersyn\n\nLevering mislykkedes — mailserver svarede ikke (timeout). Eftersynet for Bramidan A/S er endnu ikke afsluttet, så næste eftersynsdato er ikke fastlagt — påmindelse afventer afslutning af igangværende eftersyn.'
  });
  return entries.sort((a,b)=>a.sendDate.localeCompare(b.sendDate));
}
function renderReminders(){
  const log = buildMailLog();
  const statusPill = {planlagt:'grey', sendt:'green', fejl:'red'};
  const statusLabel = {planlagt:'Planlagt', sendt:'Sendt', fejl:'Fejl'};
  return `
  <div class="panel">
    <h2>Automatiske påmindelser — mail-log</h2>
    <p style="font-size:13px;color:var(--grey-mid)">Ved afslutning af et eftersyn beregnes næste eftersyn automatisk (seneste eftersyn + 12 måneder). Der sendes herefter automatisk en mail til virksomhedens <strong>faste eftersynsmail</strong> (fx drift@, lager@, sikkerhed@, facility@) 60 og 30 dage før næste eftersyn — aldrig til en enkelt persons private mail.</p>
  </div>
  <div class="panel">
    ${log.map(m=>`
      <div class="mail-card">
        <div class="mhead">
          <div>
            <h4>${esc(m.subject)}</h4>
            <div class="mmeta">Til: <span class="mono">${esc(m.to)}</span> · ${esc(m.customer)} · Planlagt udsendelse: ${fmtDate(m.sendDate)}</div>
          </div>
          <span class="pill ${statusPill[m.status]}">${statusLabel[m.status]}</span>
        </div>
        <div class="mail-preview">${esc(m.body)}</div>
      </div>
    `).join('')}
  </div>`;
}

function addCustomerLocation(custId){
  const v = val('loc_'+custId).trim();
